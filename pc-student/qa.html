<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>即问即答 · 学风建设 · 学生端</title>
<style>
:root{
  --primary:#3087CC;
  --primary-light:#E3F1F9;
  --primary-dark:#006DAD;
  --primary-50:#F4FAFE;
  --text-1:#3C444F;
  --text-2:#696F7D;
  --text-3:#9096A2;
  --text-4:#ABB0BA;
  --border:#E5E8EE;
  --border-light:#EFF1F5;
  --bg:#F4F6FA;
  --bg-card:#FFFFFF;
  --success:#1BB975;
  --success-bg:#E8FCF4;
  --success-border:#A7F3D0;
  --warning:#F29100;
  --warning-bg:#FFF5E5;
  --warning-border:#FFE0B3;
  --danger:#DF2027;
  --danger-bg:#FCE8EA;
  --danger-border:#F6BCBE;
  --shadow-sm:0 1px 3px rgba(15,32,55,.05);
  --shadow-md:0 6px 20px rgba(15,32,55,.06);
  --shadow-lg:0 12px 32px rgba(15,32,55,.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:"OPPOSans","PingFang SC","Microsoft YaHei",-apple-system,sans-serif;color:var(--text-1);background:var(--bg);font-size:14px;-webkit-font-smoothing:antialiased;}
body{min-height:100vh;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
svg{display:block;flex-shrink:0;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:#D9DDE3;border-radius:4px;}
::-webkit-scrollbar-track{background:transparent;}

/* ===== Layout ===== */
.layout{
  max-width:1480px;margin:0 auto;display:grid;grid-template-columns:240px 1fr;gap:24px;padding:0 24px;
}
.s-sidebar{
  position:sticky;top:24px;align-self:start;height:calc(100vh - 48px);overflow-y:auto;padding-top:24px;
}
.brand-stu{
  display:flex;align-items:center;gap:10px;margin-bottom:24px;
}
.brand-stu .logo{
  width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#3087CC,#006DAD);
  display:flex;align-items:center;justify-content:center;color:#fff;
  box-shadow:0 6px 16px rgba(48,135,204,.28);
}
.brand-stu strong{font-size:14px;font-weight:600;display:block;}
.brand-stu span{font-size:10px;color:var(--text-3);letter-spacing:.4px;display:block;margin-top:2px;}

.user-stu{
  background:linear-gradient(135deg,#3087CC,#006DAD);color:#fff;
  border-radius:14px;padding:14px;margin-bottom:18px;position:relative;overflow:hidden;
  box-shadow:0 12px 28px rgba(48,135,204,.3);
}
.user-stu::before{
  content:"";position:absolute;width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.18),transparent 70%);right:-30px;top:-40px;
}
.user-stu .row{display:flex;align-items:center;gap:10px;position:relative;}
.user-stu .ava{
  width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#FFD68F,#F29100);
  display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;
  border:2px solid rgba(255,255,255,.4);
}
.user-stu strong{font-size:14px;font-weight:600;display:block;}
.user-stu p{font-size:11px;opacity:.85;margin-top:2px;}
.user-stu .stars{margin-top:8px;display:inline-flex;gap:2px;align-items:center;font-size:11px;opacity:.85;}
.user-stu .stars svg{width:12px;height:12px;color:#FFD43B;}
.user-stu .progress{margin-top:10px;height:4px;background:rgba(255,255,255,.18);border-radius:2px;overflow:hidden;}
.user-stu .progress .fill{height:100%;background:linear-gradient(90deg,#FFD68F,#FFC53D);border-radius:2px;}

.s-nav{display:flex;flex-direction:column;gap:2px;}
.s-nav-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:8px;color:var(--text-2);
  font-size:13px;cursor:pointer;transition:all .15s;text-decoration:none;
}
.s-nav-item:hover{background:#fff;color:var(--text-1);}
.s-nav-item.active{background:var(--primary-light);color:var(--primary);font-weight:500;box-shadow:var(--shadow-sm);}
.s-nav-item.active svg{color:var(--primary);}
.s-nav-item .badge{
  margin-left:auto;background:linear-gradient(135deg,#FF6B6B,#DF2027);color:#fff;font-size:10px;
  padding:1px 6px;border-radius:8px;font-weight:600;letter-spacing:.2px;
}

.s-quick{
  background:#fff;border-radius:14px;padding:14px;margin-top:18px;border:1px solid var(--border-light);
}
.s-quick h6{font-size:12px;font-weight:600;color:var(--text-3);margin-bottom:10px;}
.s-quick .item{
  display:flex;align-items:center;gap:8px;padding:8px;border-radius:7px;cursor:pointer;font-size:12px;color:var(--text-2);
}
.s-quick .item:hover{background:var(--primary-50);color:var(--primary);}

.s-main{padding:24px 0 60px;min-width:0;}

/* ===== Topbar ===== */
.s-topbar{
  background:#fff;border-radius:14px;padding:8px 14px;display:flex;align-items:center;gap:14px;
  margin-bottom:18px;box-shadow:var(--shadow-sm);
}
.s-search{
  flex:1;height:38px;background:var(--bg);border-radius:10px;display:flex;align-items:center;padding:0 12px;gap:8px;
  border:1px solid transparent;transition:all .15s;
}
.s-search:focus-within{border-color:var(--primary);background:#fff;}
.s-search input{flex:1;border:none;outline:none;background:transparent;font-size:13px;color:var(--text-1);font-family:inherit;}
.s-search input::placeholder{color:var(--text-4);}
.s-search .kbd{font-size:11px;color:var(--text-4);background:#fff;padding:2px 6px;border-radius:4px;border:1px solid var(--border);}
.s-topbar .icon-btn{
  width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  color:var(--text-2);background:var(--bg);position:relative;transition:all .15s;
}
.s-topbar .icon-btn:hover{background:var(--primary-light);color:var(--primary);}
.s-topbar .icon-btn .red-dot{
  position:absolute;top:7px;right:8px;width:8px;height:8px;border-radius:50%;background:var(--danger);
  border:2px solid var(--bg);
}
.s-topbar .icon-btn .badge-num{
  position:absolute;top:4px;right:4px;min-width:16px;height:16px;border-radius:8px;
  background:var(--danger);color:#fff;font-size:10px;font-weight:600;
  display:flex;align-items:center;justify-content:center;padding:0 3px;border:1.5px solid #fff;
}

/* ===== Generic panel ===== */
.panel-stu{
  background:#fff;border-radius:14px;padding:20px;border:1px solid var(--border-light);
  margin-bottom:14px;
}
.panel-stu h4{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.panel-stu h4 a{font-size:12px;color:var(--text-3);font-weight:400;}

/* ===== Forms ===== */
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.f-item{margin-bottom:0;}
.f-item label{display:block;font-size:12px;color:var(--text-2);margin-bottom:6px;font-weight:500;}
.f-item label .req{color:var(--danger);}
.f-item input,.f-item select,.f-item textarea{
  width:100%;height:38px;padding:0 12px;border-radius:8px;border:1px solid var(--border);
  font-size:13px;background:#fff;outline:none;font-family:inherit;color:var(--text-1);
}
.f-item textarea{height:auto;padding:10px 12px;resize:vertical;}
.f-item input:focus,.f-item select:focus,.f-item textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(48,135,204,.12);}
.f-actions{display:flex;justify-content:flex-end;gap:10px;}
.btn-stu{
  height:38px;padding:0 22px;border-radius:8px;font-size:13px;font-weight:500;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;
  border:1px solid transparent;font-family:inherit;transition:all .15s;
}
.btn-primary-stu{background:var(--primary);color:#fff;}
.btn-primary-stu:hover{background:var(--primary-dark);}
.btn-ghost-stu{background:#fff;color:var(--text-2);border-color:var(--border);}
.btn-ghost-stu:hover{border-color:var(--primary);color:var(--primary);}
.btn-sm{height:30px;padding:0 14px;font-size:12px;}
.btn-warning{background:var(--warning);color:#fff;}
.btn-warning:hover{background:#d97d00;}
.btn-danger{background:var(--danger);color:#fff;}

/* ===== Tag generic ===== */
.tag-stu{
  display:inline-flex;align-items:center;padding:3px 9px;border-radius:5px;
  font-size:11px;color:var(--text-2);background:#F1F4F8;font-weight:500;
}
.tag-solved{background:var(--success-bg);color:var(--success);}
.tag-unsolved{background:var(--warning-bg);color:var(--warning);}
.tag-assigned{background:linear-gradient(135deg,#FFD68F,#F29100);color:#fff;}
.tag-best{background:var(--success-bg);color:var(--success);}

/* ===== Toast ===== */
.toast{
  position:fixed;left:50%;top:24px;transform:translate(-50%,-20px);
  background:#1F2733;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;
  display:flex;align-items:center;gap:6px;box-shadow:var(--shadow-lg);
  opacity:0;pointer-events:none;transition:all .25s;z-index:9999;
  white-space:nowrap;
}
.toast.show{opacity:1;transform:translate(-50%,0);pointer-events:auto;}
.toast a{color:#7BC7F0;text-decoration:underline;cursor:pointer;}

/* ===== Modal ===== */
.modal-mask{
  position:fixed;inset:0;background:rgba(15,32,55,.4);
  backdrop-filter:blur(4px);display:none;
  align-items:center;justify-content:center;z-index:200;
}
.modal-mask.show{display:flex;}
.modal-stu{
  width:560px;max-width:96vw;max-height:92vh;
  background:#fff;border-radius:16px;box-shadow:var(--shadow-lg);
  display:flex;flex-direction:column;overflow:hidden;
}
.modal-stu .head{
  padding:18px 22px;border-bottom:1px solid var(--border-light);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.modal-stu .head h3{font-size:16px;font-weight:600;}
.modal-stu .body{padding:22px;overflow-y:auto;flex:1;}
.modal-stu .foot{
  padding:14px 22px;border-top:1px solid var(--border-light);
  display:flex;justify-content:flex-end;gap:10px;flex-shrink:0;
}
.close-btn{
  width:32px;height:32px;border-radius:8px;background:var(--bg);
  display:flex;align-items:center;justify-content:center;color:var(--text-2);
}
.close-btn:hover{background:var(--danger-bg);color:var(--danger);}

/* Misc */
.row-2-stu{display:grid;grid-template-columns:1.4fr 1fr;gap:14px;}


/* ===== Tab Count Badge ===== */
.tab-count{
  display:inline-flex;align-items:center;justify-content:center;
  background:rgba(15,32,55,.1);color:inherit;
  font-size:10px;min-width:15px;height:15px;
  border-radius:8px;padding:0 4px;margin-left:4px;font-weight:600;
}
.seg-item.active .tab-count{background:rgba(48,135,204,.2);}

/* ===== QA Segment Tabs ===== */
.qa-seg{
  display:flex;gap:2px;background:var(--bg);border-radius:10px;padding:3px;
}
.qa-seg .seg-item{
  padding:7px 20px;border-radius:8px;font-size:13px;color:var(--text-2);cursor:pointer;
  transition:all .15s;display:flex;align-items:center;gap:5px;font-weight:500;
}
.qa-seg .seg-item.active{background:#fff;color:var(--primary);box-shadow:var(--shadow-sm);}
.qa-seg .seg-item:hover:not(.active){background:rgba(255,255,255,.7);}

/* ===== QA Toolbar ===== */
.qa-toolbar{
  background:#fff;border-radius:12px;padding:12px 16px;margin-bottom:14px;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  border:1px solid var(--border-light);
}
.qa-toolbar select{
  height:34px;padding:0 10px;border-radius:8px;border:1px solid var(--border);
  font-size:13px;background:#fff;outline:none;font-family:inherit;color:var(--text-1);cursor:pointer;
}
.qa-toolbar select:focus{border-color:var(--primary);}
.qa-toolbar .spacer{flex:1;}

/* ===== QA Table ===== */
.qa-table-wrap{
  background:#fff;border-radius:14px;border:1px solid var(--border-light);
  overflow:hidden;margin-bottom:16px;
}
.qa-table{width:100%;border-collapse:collapse;}
.qa-table thead th{
  background:#F8FAFB;padding:10px 14px;font-size:12px;font-weight:600;color:var(--text-3);
  text-align:left;border-bottom:1px solid var(--border-light);white-space:nowrap;
}
.qa-table tbody tr{border-bottom:1px solid var(--border-light);transition:background .12s;}
.qa-table tbody tr:last-child{border-bottom:none;}
.qa-table tbody tr:hover{background:var(--primary-50);}
.qa-table td{padding:12px 14px;font-size:13px;vertical-align:middle;}
.qa-table .title-cell{max-width:320px;}
.qa-table .title-cell .title-text{
  font-size:13px;font-weight:500;color:var(--text-1);line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  cursor:pointer;
}
.qa-table .title-cell .title-text:hover{color:var(--primary);}
.qa-table .title-cell .tags-row{margin-top:5px;display:flex;gap:5px;flex-wrap:wrap;}
.qa-table .tag-subject{
  font-size:10px;padding:2px 7px;border-radius:4px;background:var(--primary-light);color:var(--primary);font-weight:500;
}
.qa-table .status-cell .tag-solved{font-size:11px;padding:3px 9px;border-radius:5px;background:var(--success-bg);color:var(--success);}
.qa-table .status-cell .tag-unsolved{font-size:11px;padding:3px 9px;border-radius:5px;background:var(--warning-bg);color:var(--warning);}
.qa-table .num-cell{color:var(--text-2);text-align:center;}
.qa-table .asker-cell{color:var(--text-3);font-size:12px;}
.qa-table .op-cell{display:flex;gap:5px;align-items:center;flex-wrap:nowrap;}

/* ===== Footer pagination ===== */
.qa-foot-stu{
  display:flex;align-items:center;gap:8px;padding:10px 16px;border-top:1px solid var(--border-light);
  font-size:12px;color:var(--text-3);
}
.qa-foot-stu .pg-info{flex:1;}
.qa-foot-stu .pg-btn{
  width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;
  background:var(--bg);color:var(--text-2);font-size:12px;cursor:pointer;border:1px solid var(--border-light);
  transition:all .12s;
}
.qa-foot-stu .pg-btn:hover{background:var(--primary-light);color:var(--primary);border-color:var(--primary);}
.qa-foot-stu .pg-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}

/* ===== Answer Card ===== */
.ans-card{
  border:1px solid var(--border-light);border-radius:12px;padding:14px;margin-bottom:10px;
  transition:all .15s;
}
.ans-card:hover{box-shadow:var(--shadow-sm);}
.ans-card.best{
  background:linear-gradient(135deg,#F0FDF4,#DCFCE7);border-color:var(--success-border);
}
.ans-card .ans-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.ans-card .ans-ava{
  width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#FFD68F,#F29100);
  color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;
}
.ans-card .ans-name{font-size:13px;font-weight:500;}
.ans-card .ans-time{font-size:11px;color:var(--text-3);margin-left:auto;}
.ans-card .ans-body{font-size:13px;color:var(--text-2);line-height:1.75;}
.ans-card .ans-foot{
  margin-top:10px;padding-top:10px;border-top:1px dashed rgba(0,0,0,.07);
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;
}

/* ===== Like Button ===== */
.like-btn{
  display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;
  font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border-light);
  background:#fff;color:var(--text-2);transition:all .15s;
}
.like-btn:hover{border-color:var(--danger);color:var(--danger);}
.like-btn.liked{background:var(--danger-bg);border-color:var(--danger-border);color:var(--danger);}
.like-btn svg{transition:transform .2s;}
.like-btn.liked svg{animation:heartPop .25s ease;}
@keyframes heartPop{0%{transform:scale(1);}50%{transform:scale(1.4);}100%{transform:scale(1);}}

.ans-action-btn{
  display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;
  font-size:12px;color:var(--text-3);cursor:pointer;border:1px solid transparent;
  background:none;transition:all .12s;
}
.ans-action-btn:hover{background:var(--bg);color:var(--text-1);}

/* ===== Upload Zone ===== */
.upload-zone{
  border:2px dashed var(--border);border-radius:10px;padding:14px 16px;
  display:flex;align-items:center;gap:10px;cursor:pointer;
  font-size:12px;color:var(--text-3);transition:all .15s;
  background:#FAFBFC;
}
.upload-zone:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-50);}

/* ===== Attach Chips ===== */
.attach-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.attach-chip{
  display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:6px;
  background:var(--primary-light);color:var(--primary-dark);font-size:12px;
  border:1px solid #BFDDF6;
}
.attach-chip .del{cursor:pointer;color:var(--text-3);margin-left:2px;font-size:14px;line-height:1;}
.attach-chip .del:hover{color:var(--danger);}

/* ===== Inline Form ===== */
.inline-form{
  border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:12px;
  background:#FAFBFC;
}
.inline-form h5{font-size:13px;font-weight:600;margin-bottom:12px;color:var(--text-1);}
.inline-form textarea{
  width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 12px;
  font-size:13px;font-family:inherit;color:var(--text-1);resize:vertical;outline:none;
  background:#fff;
}
.inline-form textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(48,135,204,.1);}
.inline-form .form-foot{display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap;}
.inline-form .form-foot .spacer{flex:1;}

/* ===== Notice Items ===== */
.notice-item{
  padding:12px 14px;border-radius:10px;border:1px solid var(--border-light);
  margin-bottom:8px;cursor:pointer;transition:all .12s;
  background:#fff;position:relative;
}
.notice-item:hover{border-color:var(--primary);box-shadow:var(--shadow-sm);}
.notice-item.unread{border-left:3px solid var(--primary);}
.notice-item .ni-head{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.notice-item .ni-icon{
  width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  background:var(--primary-light);color:var(--primary);flex-shrink:0;font-size:14px;
}
.notice-item .ni-title{font-size:13px;font-weight:500;flex:1;}
.notice-item .ni-time{font-size:11px;color:var(--text-3);}
.notice-item .ni-body{font-size:12px;color:var(--text-2);line-height:1.5;}

/* ===== Detail Modal Tabs ===== */
.detail-tabs{display:flex;gap:0;border-bottom:1px solid var(--border-light);margin-bottom:16px;}
.detail-tab{
  padding:10px 20px;font-size:13px;font-weight:500;color:var(--text-3);
  cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;
}
.detail-tab.active{color:var(--primary);border-bottom-color:var(--primary);}
.detail-tab-panel{display:none;}
.detail-tab-panel.active{display:block;}

/* ===== QA Section Head ===== */
.s-section-head{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;
}
.s-section-head h3{font-size:18px;font-weight:600;}
.s-section-head h3 small{font-size:12px;color:var(--text-3);font-weight:400;margin-left:8px;}

@media (max-width:1100px){
  .layout{grid-template-columns:1fr;}
  .s-sidebar{position:static;height:auto;}
  .row-2-stu{grid-template-columns:1fr;}
}

/* ===== Hot Volunteer Modal ===== */
.vol-list{display:flex;flex-direction:column;gap:10px;}
.vol-card{
  border:1px solid var(--border-light);border-radius:12px;overflow:hidden;
  transition:box-shadow .15s;cursor:pointer;
}
.vol-card:hover{box-shadow:var(--shadow-md);border-color:var(--primary);}
.vol-card-head{
  display:flex;align-items:center;gap:14px;padding:14px 16px;
  background:#fff;
}
.vol-rank{
  width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;flex-shrink:0;
  background:#F1F4F8;color:var(--text-3);
}
.vol-rank.top1{background:linear-gradient(135deg,#FFD700,#FFA500);color:#fff;}
.vol-rank.top2{background:linear-gradient(135deg,#C0C0C0,#A0A0A0);color:#fff;}
.vol-rank.top3{background:linear-gradient(135deg,#CD7F32,#A0522D);color:#fff;}
.vol-ava{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;

// Toast
function showToast(msg, link, linkText, linkAction) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.className = 'toast';
    document.body.appendChild(t);
  }
  let html = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg><span>${msg}</span>`;
  if (linkText && linkAction) {
    html += ` <a onclick="${linkAction}" style="cursor:pointer;">${linkText} →</a>`;
  }
  t.innerHTML = html;
  t.classList.add('show');
  t.style.pointerEvents = (linkText ? 'auto' : 'none');
  clearTimeout(window._tt);
  window._tt = setTimeout(() => t.classList.remove('show'), 3000);
}

// Modal
function openModal(id) {
  const m = document.getElementById(id);
  if (m) m.classList.add('show');
}
function closeModal(id) {
  const m = document.getElementById(id);
  if (m) m.classList.remove('show');
}

// ====================================================
//  Tab 切换
// ====================================================
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.qa-seg .seg-item').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tab);
  });
  renderTable();
  updateTabCounts();
}


// ====================================================
//  表格渲染
// ====================================================
function getFilteredData() {
  const status = document.getElementById('filterStatus').value;
  const subject = document.getElementById('filterSubject').value;
  let data = [...QA_DATA];
  if (currentTab === 'hot') data.sort((a, b) => b.likes - a.likes);
  else if (currentTab === 'new') data.sort((a, b) => b.id - a.id);
  else if (currentTab === 'myAnswers') data = data.filter(q =>
    q.answers.some(a => a.answerer === CURRENT_USER.name) || q.isAssigned
  );
  else if (currentTab === 'myQuestions') data = data.filter(q => q.askerId === CURRENT_USER.id);
  else if (currentTab === 'myFavorites') data = data.filter(q => bookmarkedIds.has(q.id));
  if (status) data = data.filter(q => q.status === status);
  if (subject) data = data.filter(q => q.subject === subject);
  return data;
}

function buildAnswerCards(q) {
  const isAuthor = q.askerId === CURRENT_USER.id;

  const ansCards = q.answers.length > 0 ? q.answers.map(ans => {
    const likeClass = ans.likedByMe ? 'liked' : '';
    const avaColor = ans.answerer === '王诗韵'
      ? 'linear-gradient(135deg,#FFD68F,#F29100)'
      : ans.answerer === '陈思远'
      ? 'linear-gradient(135deg,#9CBFDA,#3087CC)'
      : ans.answerer === '刘子轩'
      ? 'linear-gradient(135deg,#7DD3FC,#0EA5E9)'
      : ans.answerer === '张明辉'
      ? 'linear-gradient(135deg,#A7F3D0,#1BB975)'
      : 'linear-gradient(135deg,#B59CE5,#7C5BC1)';
    const starsHtml = '★'.repeat(ans.stars) + '☆'.repeat(4 - ans.stars);
    const safeAnsName = ans.answerer.replace(/'/g, '').replace(/"/g, '');

    return `
      <div class="ans-card ${ans.isBest ? 'best' : ''}" id="ans-card-${ans.id}">
        <div class="ans-head">
          <div class="ans-ava" style="background:${avaColor};">${ans.answerer[0]}</div>
          <span class="ans-name">${ans.answerer}</span>
          <span style="font-size:11px;color:var(--warning);">${starsHtml} 义工</span>
          ${ans.isBest ? '<span class="tag-stu tag-best" style="font-size:10px;">🏆 最佳回答</span>' : ''}
          ${ans.isAssigned ? '<span class="tag-stu tag-assigned" style="font-size:10px;">📋 组长指派</span>' : ''}
          <span class="ans-time">${ans.time}</span>
        </div>
        <div class="ans-body">${ans.content.replace(/\n/g, '<br/>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</div>
        ${ans.attachments && ans.attachments.length > 0 ? `<div class="attach-list" style="margin-top:8px;">${ans.attachments.map(a => `<div class="attach-chip"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>${a}</div>`).join('')}</div>` : ''}
        <div class="ans-foot">
          <button class="like-btn ${likeClass}" id="like-btn-${ans.id}" onclick="toggleLike(${q.id},${ans.id})">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="${ans.likedByMe ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3z"/></svg>
            <span id="like-count-${ans.id}">${ans.likes}</span>
          </button>
          ${isAuthor ? `<button class="ans-action-btn" onclick="toggleReplyForm(${q.id},${ans.id})">💬 追问</button>` : ''}
          <button class="ans-action-btn" style="color:var(--danger);" onclick="openComplaint('${safeAnsName} 的回答')">🚩 投诉</button>
        </div>
        <div id="reply-form-${ans.id}" style="display:none;">
          <div class="inline-form" style="margin-top:10px;">
            <h5>💬 追问 ${ans.answerer}</h5>

            <div class="upload-zone" style="margin-top:8px;" onclick="triggerUpload('rf-${ans.id}-files')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>

              <div class="spacer"></div>
              <button class="btn-stu btn-ghost-stu btn-sm" onclick="toggleReplyForm(${q.id},${ans.id})">取消</button>

            </div>

        </div>

    `;
  }).join('') : `
    <div style="text-align:center;padding:36px;color:var(--text-3);">
      <div style="font-size:40px;margin-bottom:12px;">💭</div>
      <p style="font-size:14px;">暂无回答，快来第一个回答吧！</p>

  `;

  const writeForm = canShowWriteAnswer(q) ? `
    <div id="writeAnswerForm" style="display:none;margin-top:12px;">
      <div class="inline-form">
        <h5>✏️ 写回答</h5>

        <div class="upload-zone" style="margin-top:8px;" onclick="triggerUpload('ansFiles')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          上传图片或附件辅助说明
        </div>
        <div class="attach-list" id="ansFileList"></div>

          <div class="spacer"></div>

          <button class="btn-stu btn-primary-stu btn-sm" onclick="submitAnswer(${q.id})">提交回答</button>
        </div>
      </div>
    </div>
  ` : '';

  return ansCards + writeForm;
}


function toggleAnswerForm() {
  const form = document.getElementById('writeAnswerForm');
  if (!form) return;
  const visible = form.style.display !== 'none';
  if (!visible) {
    if (CURRENT_USER.role !== 'volunteer') {
      showToast('仅辅学义工可以回答问题');
      return;
    }
    if (!currentDetail || !canShowWriteAnswer(currentDetail)) {
      showToast('当前无法在此问题下回答');
      return;
    }
  }
  form.style.display = visible ? 'none' : 'block';
  if (!visible) form.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function toggleFollowUpForm() {
  const form = document.getElementById('followUpForm');
  if (!form) return;
  form.style.display = form.style.display === 'none' ? 'block' : 'none';
}

function toggleReplyForm(qid, ansId) {
  const form = document.getElementById(`reply-form-${ansId}`);
  if (!form) return;
  form.style.display = form.style.display === 'none' ? 'block' : 'none';
}

// ====================================================
//  点赞
// ====================================================
function toggleLike(qid, ansId) {
  const q = QA_DATA.find(x => x.id === qid);
  if (!q) return;
  const ans = q.answers.find(a => a.id === ansId);
  if (!ans) return;
  ans.likedByMe = !ans.likedByMe;
  ans.likes += ans.likedByMe ? 1 : -1;

  const btn = document.getElementById(`like-btn-${ansId}`);
  const count = document.getElementById(`like-count-${ansId}`);
  if (btn && count) {
    if (ans.likedByMe) {
      btn.classList.add('liked');
      btn.querySelector('svg').setAttribute('fill', 'currentColor');
    } else {
      btn.classList.remove('liked');
      btn.querySelector('svg').setAttribute('fill', 'none');
    }
    count.textContent = ans.likes;
  }
}

// ====================================================
//  提交回答
// ====================================================
function submitAnswer(qid) {
  if (CURRENT_USER.role !== 'volunteer') {
    showToast('仅辅学义工可以回答问题');
    return;
  }
  const text = document.getElementById('answerText');
  if (!text || !text.value.trim()) {
    showToast('请输入回答内容');
    return;
  }
  const q = QA_DATA.find(x => x.id === qid);
  if (!q) return;
  if (!canShowWriteAnswer(q)) {
    showToast('当前无法提交回答');
    return;
  }
  const newAns = {
    id: Date.now(),
    answerer: CURRENT_USER.name,
    answererRole: 'volunteer',
    stars: 4,
    time: '刚刚',
    content: text.value.trim(),
    likes: 0,
    likedByMe: false,
    isBest: false,
    isAssigned: q.isAssigned,
    attachments: []
  };
  q.answers.push(newAns);
  q.status = 'answered';
  // 给提问者发通知
  NOTICES.unshift({
    id: Date.now(),
    type: 'answer',
    icon: '💬',
    title: '您的提问有了新回答',
    body: `${CURRENT_USER.name} 回答了"${q.title.substring(0, 20)}..."`,
    time: '刚刚',
    unread: true,
    questionId: qid,
    ansId: newAns.id
  });
  updateNoticeCount();
  renderDetailModal(q);
  setDetailModalFooter(q);
  showToast('回答已提交！');
  renderTable();
  updateTabCounts();
}

// ====================================================
//  提交追问（问题追问）
// ====================================================
function submitFollowUp(qid) {
  const text = document.getElementById('followUpText');
  if (!text || !text.value.trim()) {
    showToast('请输入追问内容');
    return;
  }
  const q = QA_DATA.find(x => x.id === qid);
  if (!q) return;
  q.followUps.push({
    author: CURRENT_USER.name,
    time: '刚刚',
    content: text.value.trim()
  });
  // 通知义工
  NOTICES.unshift({
    id: Date.now(),
    type: 'followup',
    icon: '🔁',
    title: '有新追问',
    body: `${CURRENT_USER.name} 对"${q.title.substring(0, 20)}..."发起了追问`,
    time: '刚刚',
    unread: true,
    questionId: qid,
    ansId: null
  });
  updateNoticeCount();
  showToast('追问已提交！');
  renderDetailModal(q);
  setDetailModalFooter(q);
}

// ====================================================
//  提交对回答的追问
// ====================================================
function submitReply(qid, ansId) {
  const text = document.getElementById(`reply-text-${ansId}`);
  if (!text || !text.value.trim()) {
    showToast('请输入追问内容');
    return;
  }
  const q = QA_DATA.find(x => x.id === qid);
  if (!q) return;
  // 通知义工
  NOTICES.unshift({
    id: Date.now(),
    type: 'followup',
    icon: '🔁',
    title: '有新追问',
    body: `${CURRENT_USER.name} 追问了您的回答`,
    time: '刚刚',
    unread: true,
    questionId: qid,
    ansId: ansId
  });
  updateNoticeCount();
  showToast('追问已提交，义工将收到通知！');
  toggleReplyForm(qid, ansId);
  if (text) text.value = '';
}

// ====================================================
//  提交新问题
// ====================================================
function submitNewQuestion() {
  const title = document.getElementById('nqTitle').value.trim();
  const subject = document.getElementById('nqSubject').value;
  const content = document.getElementById('nqContent').value.trim();
  if (!title) { showToast('请输入问题标题'); return; }
  if (!subject) { showToast('请选择所属学科'); return; }
  if (!content) { showToast('请填写问题详情'); return; }

  const newQ = {
    id: Date.now(),
    title,
    subject,
    status: 'unanswered',
    asker: CURRENT_USER.name,
    askerId: CURRENT_USER.id,
    time: '刚刚',
    fullTime: new Date().toLocaleString('zh-CN'),
    views: 0,
    likes: 0,
    favoriteCount: 0,
    shareCount: 0,
    isMine: true,
    course: subject + '相关',
    isAssigned: false,
    content,
    attachments: [],
    followUps: [],
    answers: []
  };
  QA_DATA.unshift(newQ);
  closeModal('newQuestion');
  clearNewQuestionForm();
  renderTable();
  showToast('提问已提交！', '查看', `openDetail(${newQ.id})`);
}

function clearNewQuestionForm() {
  document.getElementById('nqTitle').value = '';
  document.getElementById('nqSubject').value = '';
  document.getElementById('nqContent').value = '';
  document.getElementById('nqFileList').innerHTML = '';
}

// ====================================================
//  投诉
// ====================================================
function openComplaint(target) {
  document.getElementById('complaintTarget').value = target;
  document.getElementById('complaintType').value = '';
  document.getElementById('complaintDesc').value = '';
  document.getElementById('cpFileList').innerHTML = '';
  openModal('complaintModal');
}

function submitComplaint() {
  const type = document.getElementById('complaintType').value;
  const desc = document.getElementById('complaintDesc').value.trim();
  if (!type) { showToast('请选择投诉类型'); return; }
  if (!desc) { showToast('请填写投诉说明'); return; }
  closeModal('complaintModal');
  showToast('投诉已提交，等待管理员处理');
}

// ====================================================
//  通知系统
// ====================================================
function updateNoticeCount() {
  const unread = NOTICES.filter(n => n.unread).length;
  const tb = document.querySelector('.s-topbar');
  if (!tb) return;
  const btn = tb.querySelector('.icon-btn');
  if (!btn) return;
  const old = btn.querySelector('.badge-num') || btn.querySelector('.red-dot');
  if (old) old.remove();
  if (unread > 0) {
    const span = document.createElement('span');
    span.className = 'badge-num';
    span.textContent = unread;
    btn.insertBefore(span, btn.firstChild);
  } else {
    const dot = document.createElement('span');
    dot.className = 'red-dot';
    btn.insertBefore(dot, btn.firstChild);
  }
}

function openNoticeModal() {
  renderNoticeList();
  openModal('noticeModal');
}

function renderNoticeList() {
  const container = document.getElementById('noticeList');
  if (!container) return;
  if (NOTICES.length === 0) {
    container.innerHTML = '<p style="text-align:center;color:var(--text-3);padding:24px;">暂无通知</p>';
    return;
  }
  container.innerHTML = NOTICES.map(n => `
    <div class="notice-item ${n.unread ? 'unread' : ''}" onclick="handleNoticeClick(${n.id})" id="notice-${n.id}">
      <div class="ni-head">
        <div class="ni-icon">${n.icon}</div>
        <span class="ni-title">${n.title}</span>
        <span class="ni-time">${n.time}</span>
      </div>
      <div class="ni-body">${n.body}</div>
      ${n.questionId ? `<div style="margin-top:6px;"><button class="btn-stu btn-ghost-stu btn-sm" style="font-size:11px;height:26px;padding:0 10px;">查看详情 →</button></div>` : ''}
    </div>
  `).join('');
}

function handleNoticeClick(nid) {
  const n = NOTICES.find(x => x.id === nid);
  if (!n) return;
  // 标记已读
  n.unread = false;
  const el = document.getElementById(`notice-${nid}`);
  if (el) el.classList.remove('unread');
  updateNoticeCount();
  // 跳转
  if (n.questionId) {
    closeModal('noticeModal');
    openDetail(n.questionId);
  }
}

function markAllRead() {
  NOTICES.forEach(n => n.unread = false);
  renderNoticeList();
  updateNoticeCount();
  showToast('已全部标记已读');
}

// ====================================================
//  附件上传（虚拟）
// ====================================================
const FAKE_FILES = ['图片截图.png', '题目扫描.jpg', '习题集.pdf', '笔记整理.docx', '公式推导.pdf', '代码示例.zip'];
let _fileCounters = {};
function triggerUpload(listId) {
  _fileCounters[listId] = (_fileCounters[listId] || 0) + 1;
  const idx = Math.floor(Math.random() * FAKE_FILES.length);
  const fname = FAKE_FILES[idx];
  const listEl = document.getElementById(listId + '-list') || document.getElementById(listId);
  if (!listEl) return;
  const chip = document.createElement('div');
  chip.className = 'attach-chip';
  chip.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>${fname}<span class="del" onclick="this.parentElement.remove()">×</span>`;
  listEl.appendChild(chip);
  showToast(`已选择：${fname}`);
}

// ====================================================
//  Tab 计数
// ====================================================
function updateTabCounts() {
  const all = QA_DATA;
  const counts = {
    hot: all.length,
    new: all.length,
    myAnswers: all.filter(q => q.answers.some(a => a.answerer === CURRENT_USER.name) || q.isAssigned).length,
    myQuestions: all.filter(q => q.askerId === CURRENT_USER.id).length,
    myFavorites: bookmarkedIds.size
  };
  const labels = { hot: '🔥 热帖', new: '✨ 新帖', myAnswers: '我的回答', myQuestions: '我的提问', myFavorites: '我的收藏' };
  document.querySelectorAll('.qa-seg .seg-item').forEach(el => {
    const tab = el.dataset.tab;
    if (tab in counts) {
      el.innerHTML = `${labels[tab]}<span class="tab-count">${counts[tab]}</span>`;
    }
  });
}

// ====================================================
//  热门义工弹窗
// ====================================================
function openVolunteerList() {
  const body = document.getElementById('volListBody');
  if (!body) return;

  body.innerHTML = `<div class="vol-list">${VOLUNTEER_DATA.map((v, i) => `
    <div class="vol-card" onclick="openVolunteerDetail(${v.id})">
      <div class="vol-card-head">
        <div class="vol-rank ${rankClass(i)}">${i + 1}</div>
        <div class="vol-ava" style="background:${v.color}">${v.name[0]}</div>
        <div class="vol-info">
          <div class="vol-name">
            ${v.name}
            <span class="vol-meta-tag" style="background:var(--primary-light);color:var(--primary);">${v.type}</span>
            ${v.group ? `<span class="vol-meta-tag">${v.group}</span>` : ''}
          </div>
          <div class="vol-meta">
            <span class="vol-meta-tag">🏫 ${v.college}</span>
            <span class="vol-meta-tag">📚 ${v.major}</span>
            <span class="vol-meta-tag">📅 ${v.grade}</span>
            ${v.expertise.map(e => `<span class="vol-meta-tag" style="background:var(--success-bg);color:var(--success);">${e}</span>`).join('')}
          </div>
        </div>
        <div class="vol-stats">
          <div class="vol-stat"><span class="num">${v.answerCount}</span><span class="label">回答</span></div>
          <div class="vol-stat"><span class="num">${v.likeCount}</span><span class="label">获赞</span></div>
        </div>
      </div>
    </div>
  `).join('')}</div>`;

function openVolunteerDetail(vid) {
  const v = VOLUNTEER_DATA.find(x => x.id === vid);
  if (!v) return;
  closeModal('volunteerListModal');
  document.getElementById('volDetailTitle').textContent = `义工详情 · ${v.name}`;
  const records = getVolAnswers(v.name);

  const infoTabHtml = `
    <div class="vol-detail-header">
      <div class="vol-detail-ava" style="background:${v.color}">${v.name[0]}</div>
      <div class="vol-detail-info">
        <h2>${v.name}</h2>
        <div class="tags">
          <span class="vol-meta-tag" style="background:var(--primary-light);color:var(--primary);">${v.type}</span>
          ${v.group ? `<span class="vol-meta-tag" style="background:var(--warning-bg);color:var(--warning);">${v.group}</span>` : ''}
        </div>
        <div class="bio">${v.bio}</div>
      </div>
    </div>
    <div class="vol-detail-grid">
      <div class="gi"><div class="gl">所在学院</div><div class="gv">${v.college}</div></div>
      <div class="gi"><div class="gl">所在专业</div><div class="gv">${v.major}</div></div>
      <div class="gi"><div class="gl">年级</div><div class="gv">${v.grade}</div></div>
      <div class="gi"><div class="gl">义工类别</div><div class="gv">${v.type}</div></div>
      <div class="gi"><div class="gl">擅长领域</div><div class="gv">${v.expertise.join(' / ')}</div></div>
      <div class="gi"><div class="gl">累计回答</div><div class="gv">${v.answerCount} 题 &nbsp;·&nbsp; 获赞 ${v.likeCount}</div></div>
    </div>
  `;

  const recordTabHtml = records.length > 0
    ? `<div class="vol-ans-record">${records.map(r => `
        <div class="vol-ans-item" onclick="closeModal('volunteerDetailModal');openDetail(${r.question.id})">
          <div class="vai-title">${r.question.title}</div>
          <div class="vai-meta">
            <span class="tag-subject" style="font-size:10px;padding:1px 6px;">${r.question.subject}</span>
            <span>获赞 ${r.answer.likes}</span>
            <span>${r.answer.time}</span>
            ${r.answer.isBest ? '<span style="color:var(--success);font-weight:500;">🏆 最佳回答</span>' : ''}
            <span style="margin-left:auto;color:var(--primary);">查看详情 →</span>
          </div>
        </div>
      `).join('')}</div>`
    : `<div style="text-align:center;padding:36px;color:var(--text-3);">
        <div style="font-size:36px;margin-bottom:10px;">📭</div>
        <p>暂无解答记录</p>
      </div>`;

  document.getElementById('volDetailBody').innerHTML = `
    <div class="vol-tabs">
      <div class="vol-tab active" onclick="switchVolTab('info',this)">基本信息</div>

    </div>

    <div class="vol-tab-panel" id="volTabRecords">${recordTabHtml}</div>
  `;
  openModal('volunteerDetailModal');
}

function switchVolTab(tab, el) {
  document.querySelectorAll('#volDetailBody .vol-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('#volDetailBody .vol-tab-panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  const panel = document.getElementById(tab === 'info' ? 'volTabInfo' : 'volTabRecords');
  if (panel) panel.classList.add('active');
}

// ====================================================
//  收藏
// ====================================================
function toggleBookmark(qid) {
  const q = QA_DATA.find(x => x.id === qid);
  if (bookmarkedIds.has(qid)) {
    bookmarkedIds.delete(qid);
    if (q) q.favoriteCount = Math.max(0, (q.favoriteCount || 0) - 1);
    showToast('已取消收藏');
  } else {
    bookmarkedIds.add(qid);
    if (q) q.favoriteCount = (q.favoriteCount || 0) + 1;
    showToast('已收藏，可在「我的收藏」查看');
  }
  renderTable();
  updateTabCounts();
  refreshDetailFooterIfOpen();
}

// ====================================================
//  分享
// ====================================================
function openShare(qid) {
  currentShareQid = qid;
  const q = QA_DATA.find(x => x.id === qid);
  if (!q) return;
  const el = document.getElementById('shareQuestionTitle');
  if (el) el.textContent = q.title;
  openModal('shareModal');
}
function copyShareLink() {
  const q = QA_DATA.find(x => x.id === currentShareQid);
  const text = q ? `【学风建设】${q.title} - 即问即答 https://xuefeng.example.com/qa?id=${currentShareQid}` : '';
  navigator.clipboard.writeText(text).then(() => {
    if (q) {
      q.shareCount = (q.shareCount || 0) + 1;
      renderTable();
      refreshDetailFooterIfOpen();
    }
    showToast('链接已复制到剪贴板');
    closeModal('shareModal');
  }).catch(() => {
    showToast('复制失败，请手动复制');
  });
}
function shareTo(platform) {
  const q = QA_DATA.find(x => x.id === currentShareQid);
  if (q) {
    q.shareCount = (q.shareCount || 0) + 1;
    renderTable();
    refreshDetailFooterIfOpen();
  }
  closeModal('shareModal');
  showToast(`已跳转到 ${platform} 分享`);
}

  renderTable();
  updateTabCounts();

  // Modal 遮罩点击关闭
  document.querySelectorAll('.modal-mask').forEach(m => {
    m.addEventListener('click', e => {
      if (e.target === m) m.classList.remove('show');
    });
  });
});
