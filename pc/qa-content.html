<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>问答内容管理 · 学风建设系统</title>
<style>
:root{
  --primary:#3087CC;
  --primary-light:#E3F1F9;
  --primary-dark:#006DAD;
  --primary-50:#F4FAFE;
  --text-1:#3C444F;
  --text-2:#696F7D;
  --text-3:#9096A2;
  --text-4:#ABB0BA;
  --border:#E5E8EE;
  --border-light:#EFF1F5;
  --bg:#F4F6FA;
  --bg-card:#FFFFFF;
  --success:#1BB975;
  --success-bg:#E8FCF4;
  --success-border:#A7F3D0;
  --warning:#F29100;
  --warning-bg:#FFF5E5;
  --warning-border:#FFE0B3;
  --danger:#DF2027;
  --danger-bg:#FCE8EA;
  --danger-border:#F6BCBE;
  --shadow-sm:0 1px 3px rgba(15,32,55,.05);
  --shadow-md:0 4px 14px rgba(15,32,55,.06);
  --shadow-lg:0 12px 32px rgba(15,32,55,.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:"OPPOSans","PingFang SC","Microsoft YaHei",-apple-system,sans-serif;color:var(--text-1);background:var(--bg);-webkit-font-smoothing:antialiased;font-size:14px;}
body{min-height:100vh;display:flex;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
svg{display:block;flex-shrink:0;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:#D9DDE3;border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:#C0C5CD;}
::-webkit-scrollbar-track{background:transparent;}

/* ====== Sidebar ====== */
.sidebar{
  width:232px;flex-shrink:0;background:#fff;
  border-right:1px solid var(--border-light);
  height:100vh;position:sticky;top:0;display:flex;flex-direction:column;
}
.brand{
  padding:20px 20px 16px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid var(--border-light);
}
.brand-logo{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,#3087CC 0%,#006DAD 100%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 16px rgba(48,135,204,.28);
}
.brand-text{display:flex;flex-direction:column;line-height:1.1;}
.brand-text strong{font-size:14px;font-weight:600;}
.brand-text span{font-size:10px;color:var(--text-3);letter-spacing:.4px;margin-top:3px;}

.nav-group{padding:16px 12px 8px;flex:1;overflow-y:auto;}
.nav-group-title{
  padding:8px 12px 6px;font-size:11px;color:var(--text-3);
  text-transform:uppercase;letter-spacing:.6px;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:8px;color:var(--text-2);
  font-size:13px;cursor:pointer;transition:all .15s;
  margin-bottom:2px;
}
.nav-item:hover{background:var(--primary-50);color:var(--text-1);}
.nav-item.active{background:var(--primary-light);color:var(--primary);font-weight:500;}
.nav-item.active svg{color:var(--primary);}
.nav-item .badge{
  margin-left:auto;background:var(--danger);color:#fff;font-size:10px;
  padding:1px 6px;border-radius:8px;font-weight:500;
}
.nav-item.active .badge{background:var(--primary);}

.user-card{
  margin:12px;padding:12px;border-radius:10px;
  background:linear-gradient(135deg,#F4FAFE 0%,#E3F1F9 100%);
  display:flex;align-items:center;gap:10px;
}
.user-card .ava{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,#3087CC,#006DAD);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:600;font-size:13px;
}
.user-card .info{flex:1;min-width:0;}
.user-card .info h5{font-size:13px;font-weight:500;}
.user-card .info p{font-size:11px;color:var(--text-3);margin-top:2px;}

/* ====== Main ====== */
.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  height:60px;background:#fff;border-bottom:1px solid var(--border-light);
  padding:0 28px;display:flex;align-items:center;gap:18px;position:sticky;top:0;z-index:10;
}
.crumb{display:flex;align-items:center;gap:6px;color:var(--text-2);font-size:13px;}
.crumb svg{color:var(--text-4);}
.crumb a{color:var(--text-2);transition:color .15s;}
.crumb a:hover{color:var(--primary);}
.search{
  margin-left:24px;width:320px;height:36px;border-radius:8px;
  background:#F4F6FA;display:flex;align-items:center;padding:0 12px;gap:8px;
  border:1px solid transparent;transition:all .15s;
}
.search:focus-within{background:#fff;border-color:var(--primary);}
.search input{flex:1;border:none;outline:none;background:transparent;font-size:13px;color:var(--text-1);}
.search input::placeholder{color:var(--text-4);}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.icon-btn{
  width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  color:var(--text-2);transition:all .15s;position:relative;
}
.icon-btn:hover{background:#F4F6FA;color:var(--text-1);}
.icon-btn .red-dot{
  position:absolute;top:8px;right:8px;width:7px;height:7px;border-radius:50%;
  background:var(--danger);border:2px solid #fff;
}
.topbar-user{
  display:flex;align-items:center;gap:8px;padding:4px 10px 4px 4px;
  border-radius:999px;cursor:pointer;
}
.topbar-user:hover{background:#F4F6FA;}
.topbar-user .ava{
  width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,#3087CC,#006DAD);
  color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;
}
.topbar-user span{font-size:13px;color:var(--text-1);}

/* ====== Page Content ====== */
.page{flex:1;padding:24px 28px;overflow-y:auto;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.page-head h1{font-size:22px;font-weight:600;}
.page-head p{color:var(--text-3);font-size:13px;margin-top:6px;}
.page-actions{display:flex;gap:8px;}

.btn{
  display:inline-flex;align-items:center;gap:6px;
  height:36px;padding:0 14px;border-radius:8px;font-size:13px;font-weight:500;
  transition:all .15s;
}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-dark);box-shadow:0 4px 12px rgba(48,135,204,.28);}
.btn-secondary{background:#fff;color:var(--primary);border:1px solid var(--primary);}
.btn-secondary:hover{background:var(--primary-light);}
.btn-ghost{background:#fff;color:var(--text-2);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary);}
.btn-sm{height:30px;padding:0 10px;font-size:12px;}

/* ====== Stat Cards ====== */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px;}
.stats-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px;}
.stat-card{
  background:#fff;border-radius:14px;padding:20px 22px;
  position:relative;overflow:hidden;
  box-shadow:var(--shadow-sm);
}
.stat-card .blob{
  position:absolute;width:140px;height:140px;border-radius:50%;
  right:-40px;top:-40px;opacity:.35;
}
.stat-card .blob-1{background:radial-gradient(circle,#BFDDF6,transparent 65%);}
.stat-card .blob-2{background:radial-gradient(circle,#FFE0B3,transparent 65%);}
.stat-card .blob-3{background:radial-gradient(circle,#A7F3D0,transparent 65%);}
.stat-card .blob-4{background:radial-gradient(circle,#F6BCBE,transparent 65%);}
.stat-card .ic{
  width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  margin-bottom:14px;
}
.stat-card .label{font-size:13px;color:var(--text-2);}
.stat-card .num{
  font-size:28px;font-weight:700;margin-top:4px;letter-spacing:-.5px;
  display:flex;align-items:baseline;gap:6px;
}
.stat-card .num small{font-size:13px;color:var(--text-3);font-weight:400;}
.stat-card .delta{
  font-size:12px;margin-top:8px;display:flex;align-items:center;gap:4px;
}
.delta.up{color:var(--success);}
.delta.down{color:var(--danger);}
.delta.neutral{color:var(--text-3);}

/* ====== Layout grids ====== */
.row-2{display:grid;grid-template-columns:1.55fr 1fr;gap:16px;margin-bottom:20px;}
.row-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px;}

.panel{
  background:#fff;border-radius:14px;padding:22px 24px;
  box-shadow:var(--shadow-sm);
}
.panel-head{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;
}
.panel-head h3{font-size:16px;font-weight:600;}
.panel-head p{font-size:12px;color:var(--text-3);margin-top:2px;}
.panel-tabs{display:flex;gap:4px;background:#F4F6FA;border-radius:8px;padding:3px;}
.panel-tabs button{
  height:28px;padding:0 12px;border-radius:6px;font-size:12px;color:var(--text-2);transition:all .15s;
}
.panel-tabs button.active{background:#fff;color:var(--primary);font-weight:500;box-shadow:var(--shadow-sm);}

/* ====== Chart ====== */
.chart-wrap{height:280px;position:relative;}

/* ====== Approval list ====== */
.approval-list{display:flex;flex-direction:column;gap:10px;}
.approval-item{
  padding:14px;border:1px solid var(--border-light);border-radius:10px;
  display:flex;align-items:center;gap:12px;transition:all .15s;
}
.approval-item:hover{border-color:var(--primary);background:var(--primary-50);}
.approval-item .ava{
  width:40px;height:40px;border-radius:10px;
  background:linear-gradient(135deg,#9CBFDA,#3087CC);
  color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;
  flex-shrink:0;
}
.approval-item .text{flex:1;min-width:0;}
.approval-item .text h5{font-size:14px;font-weight:500;}
.approval-item .text p{font-size:12px;color:var(--text-3);margin-top:3px;}
.approval-item .actions{display:flex;gap:6px;}

/* ====== Tag ====== */
.tag{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:4px;font-size:12px;font-weight:500;
  background:var(--primary-light);color:var(--primary);border:1px solid #BFDDF6;
}
.tag-success{background:var(--success-bg);color:var(--success);border-color:var(--success-border);}
.tag-warning{background:var(--warning-bg);color:var(--warning);border-color:var(--warning-border);}
.tag-danger{background:var(--danger-bg);color:var(--danger);border-color:var(--danger-border);}
.tag-grey{background:#F1F2F3;color:var(--text-3);border-color:var(--border);}

/* ====== Star ====== */
.stars{display:inline-flex;gap:2px;}
.stars svg{width:14px;height:14px;color:#FFC53D;}
.stars.empty svg{color:#E5E8EE;}

/* ====== Filter Bar ====== */
.filterbar{
  background:#fff;border-radius:14px;padding:16px 20px;margin-bottom:16px;
  display:flex;flex-wrap:wrap;gap:12px;align-items:center;
  box-shadow:var(--shadow-sm);
}
.filterbar .field{display:flex;align-items:center;gap:6px;}
.filterbar label{font-size:13px;color:var(--text-2);}
.input,.select{
  height:34px;padding:0 12px;border:1px solid var(--border);border-radius:8px;
  font-size:13px;color:var(--text-1);background:#fff;outline:none;min-width:140px;
  transition:all .15s;font-family:inherit;
}
.input:focus,.select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(48,135,204,.12);}
.filterbar .spacer{flex:1;}

/* ====== Table ====== */
.table-wrap{
  background:#fff;border-radius:14px;overflow:hidden;
  box-shadow:var(--shadow-sm);
}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{
  background:#F8FAFC;color:var(--text-2);font-weight:500;
  text-align:left;padding:14px 16px;font-size:12px;
  border-bottom:1px solid var(--border-light);
}
tbody td{padding:14px 16px;border-bottom:1px solid var(--border-light);color:var(--text-1);}
tbody tr:hover{background:#FAFBFD;}
tbody tr:last-child td{border-bottom:none;}
.checkbox{width:14px;height:14px;border:1.5px solid var(--border);border-radius:3px;cursor:pointer;display:inline-block;vertical-align:middle;position:relative;}
.checkbox.checked{background:var(--primary);border-color:var(--primary);}
.checkbox.checked::after{
  content:"";position:absolute;left:3px;top:0;width:5px;height:9px;
  border:solid #fff;border-width:0 1.5px 1.5px 0;transform:rotate(45deg);
}
.row-action{display:inline-flex;gap:4px;align-items:center;}
.row-action button{
  width:28px;height:28px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;
  color:var(--text-2);transition:all .15s;
}
.row-action button:hover{background:var(--primary-light);color:var(--primary);}
.row-action button.danger:hover{background:var(--danger-bg);color:var(--danger);}

.table-foot{
  padding:14px 16px;display:flex;align-items:center;justify-content:space-between;
  border-top:1px solid var(--border-light);
}
.table-foot .count{color:var(--text-3);font-size:12px;}
.pager{display:flex;align-items:center;gap:4px;}
.pager button{
  min-width:30px;height:30px;padding:0 8px;border-radius:6px;font-size:12px;color:var(--text-2);
}
.pager button:hover:not(:disabled){background:#F4F6FA;color:var(--text-1);}
.pager button.active{background:var(--primary);color:#fff;}
.pager button:disabled{opacity:.4;cursor:not-allowed;}

/* ====== Tab nav inside page ====== */
.seg{
  display:inline-flex;background:#F4F6FA;border-radius:10px;padding:4px;margin-bottom:18px;flex-wrap:wrap;gap:4px;
}
.seg button{
  height:34px;padding:0 18px;border-radius:7px;font-size:13px;color:var(--text-2);font-weight:500;
  transition:all .15s;
}
.seg button.active{background:#fff;color:var(--primary);box-shadow:var(--shadow-sm);}

/* ====== Schedule cards ====== */
.sch-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.sch-card{
  background:#fff;border-radius:12px;padding:16px;border:1px solid var(--border-light);
  transition:all .2s;
}
.sch-card:hover{border-color:var(--primary);box-shadow:var(--shadow-md);}
.sch-card .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:10px;}
.sch-card h5{font-size:14px;font-weight:600;}
.sch-card .meta{font-size:12px;color:var(--text-3);margin-top:6px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.sch-card .meta span{display:inline-flex;align-items:center;gap:4px;}

/* ====== Group cards ====== */
.group-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.group-card{
  background:#fff;border-radius:14px;padding:20px;
  box-shadow:var(--shadow-sm);position:relative;overflow:hidden;
  transition:all .2s;cursor:pointer;
}
.group-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);}
.group-card::before{
  content:"";position:absolute;left:0;right:0;top:0;height:4px;
}
.group-card.math::before{background:linear-gradient(90deg,#3087CC,#9CBFDA);}
.group-card.physics::before{background:linear-gradient(90deg,#7C5BC1,#B59CE5);}
.group-card.chem::before{background:linear-gradient(90deg,#1BB975,#A7F3D0);}
.group-card.eng::before{background:linear-gradient(90deg,#F29100,#FFD68F);}
.group-card.mech::before{background:linear-gradient(90deg,#DF2027,#F6BCBE);}
.group-card.cs::before{background:linear-gradient(90deg,#0EA5E9,#7DD3FC);}
.group-card .group-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.group-card .gi{
  width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;
}
.group-card .gname{font-size:15px;font-weight:600;}
.group-card .gleader{font-size:12px;color:var(--text-3);margin-top:2px;}
.group-card .gstats{
  display:flex;justify-content:space-between;padding:12px 0;
  border-top:1px dashed var(--border-light);border-bottom:1px dashed var(--border-light);margin-bottom:12px;
}
.group-card .gstats div{text-align:center;flex:1;}
.group-card .gstats div strong{font-size:18px;display:block;}
.group-card .gstats div span{font-size:11px;color:var(--text-3);}
.group-card .gmembers{display:flex;align-items:center;}
.group-card .gmembers .ava{
  width:26px;height:26px;border-radius:50%;border:2px solid #fff;
  background:linear-gradient(135deg,#9CBFDA,#3087CC);
  color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;
  margin-left:-6px;
}
.group-card .gmembers .ava:first-child{margin-left:0;}
.group-card .gmembers .more{margin-left:8px;font-size:12px;color:var(--text-3);}

/* ====== Star milestone ====== */
.star-track{
  background:#fff;border-radius:14px;padding:24px;margin-bottom:20px;
  box-shadow:var(--shadow-sm);
}
.star-bar{position:relative;height:8px;background:#F1F2F3;border-radius:4px;margin:32px 0 24px;}
.star-bar .fill{
  position:absolute;left:0;top:0;height:100%;border-radius:4px;
  background:linear-gradient(90deg,#3087CC,#1BB975);
}
.star-bar .marker{
  position:absolute;top:-4px;width:16px;height:16px;border-radius:50%;background:#fff;
  border:3px solid #E5E8EE;transform:translateX(-50%);
}
.star-bar .marker.done{border-color:var(--primary);}
.star-bar .marker.current{border-color:var(--success);box-shadow:0 0 0 6px rgba(27,185,117,.18);}
.star-bar .marker .lbl{
  position:absolute;top:24px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--text-2);
  white-space:nowrap;
}
.star-bar .marker .lbl strong{display:block;font-size:13px;color:var(--text-1);font-weight:600;}

/* ====== Library cards ====== */
.lib-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.lib-card{
  background:#fff;border-radius:12px;padding:16px;border:1px solid var(--border-light);
  transition:all .2s;cursor:pointer;
}
.lib-card:hover{border-color:var(--primary);box-shadow:var(--shadow-md);transform:translateY(-2px);}
.lib-card .ftype{
  width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  margin-bottom:10px;font-size:11px;font-weight:600;color:#fff;
}
.ftype.pdf{background:linear-gradient(135deg,#DF2027,#FF6B6B);}
.ftype.ppt{background:linear-gradient(135deg,#F29100,#FFAA33);}
.ftype.doc{background:linear-gradient(135deg,#3087CC,#5BA8DE);}
.ftype.xls{background:linear-gradient(135deg,#1BB975,#34D399);}
.lib-card h5{font-size:13px;font-weight:500;margin-bottom:8px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.lib-card .meta{font-size:11px;color:var(--text-3);display:flex;justify-content:space-between;}
.lib-card .stats{
  margin-top:10px;padding-top:10px;border-top:1px dashed var(--border-light);
  display:flex;gap:12px;font-size:11px;color:var(--text-3);
}
.lib-card .stats span{display:inline-flex;align-items:center;gap:3px;}

/* ====== Modal ====== */
.modal-mask{
  position:fixed;inset:0;background:rgba(15,32,55,.42);z-index:100;
  display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;
  transition:opacity .2s;
}
.modal-mask.show{opacity:1;pointer-events:auto;}
.modal{
  background:#fff;border-radius:14px;width:680px;max-width:92vw;max-height:88vh;
  overflow:hidden;display:flex;flex-direction:column;
  transform:scale(.94);transition:transform .2s;
}
.modal-mask.show .modal{transform:scale(1);}
.modal-head{
  padding:18px 24px;border-bottom:1px solid var(--border-light);
  display:flex;align-items:center;justify-content:space-between;
}
.modal-head h3{font-size:16px;font-weight:600;}
.modal-body{padding:22px 24px;overflow-y:auto;flex:1;}
.modal-foot{
  padding:14px 24px;border-top:1px solid var(--border-light);
  display:flex;justify-content:flex-end;gap:8px;
}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:14px;}
.form-item{display:flex;flex-direction:column;}
.form-item label{font-size:12px;color:var(--text-2);margin-bottom:6px;}
.form-item label .req{color:var(--danger);}
.form-item .input,.form-item textarea,.form-item .select{width:100%;}
.form-item textarea{
  padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;
  font-family:inherit;outline:none;transition:all .15s;resize:vertical;
}
.form-item textarea:focus{border-color:var(--primary);}

/* ====== Toast ====== */
.toast{
  position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);
  background:#fff;border:1px solid var(--success-border);background:var(--success-bg);color:var(--success);
  padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;
  display:flex;align-items:center;gap:8px;z-index:200;
  opacity:0;pointer-events:none;transition:all .25s;
  box-shadow:var(--shadow-lg);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Donut ring */
.ring-row{display:flex;gap:18px;margin-top:16px;flex-wrap:wrap;}
.ring-item{
  flex:1;min-width:180px;background:#FAFBFD;border-radius:10px;padding:14px;
  display:flex;align-items:center;gap:12px;
}
.ring-item .label{font-size:12px;color:var(--text-2);}
.ring-item .val{font-size:18px;font-weight:600;margin-top:2px;}
.ring-item .val small{font-size:11px;color:var(--text-3);font-weight:400;margin-left:4px;}

/* Calendar */
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cal-day{
  aspect-ratio:1.1;background:#FAFBFD;border-radius:8px;padding:8px;
  display:flex;flex-direction:column;justify-content:space-between;
  transition:all .15s;cursor:pointer;border:1px solid transparent;
  position:relative;
}
.cal-day:hover{background:var(--primary-light);}
.cal-day .d{font-size:13px;font-weight:500;}
.cal-day .t{font-size:10px;color:var(--text-3);text-align:right;}
.cal-day.has-event::after{
  content:"";position:absolute;bottom:6px;right:6px;width:5px;height:5px;border-radius:50%;background:var(--primary);
}
.cal-day.today{background:var(--primary);color:#fff;}
.cal-day.today .t{color:rgba(255,255,255,.8);}
.cal-day.today.has-event::after{background:#fff;}
.cal-day.muted{opacity:.35;}

/* Approval timeline */
.timeline{padding:8px 0;}
.tl-item{display:flex;gap:14px;position:relative;padding-bottom:18px;}
.tl-item:last-child{padding-bottom:0;}
.tl-item::before{
  content:"";position:absolute;left:11px;top:24px;bottom:0;width:2px;background:var(--border-light);
}
.tl-item:last-child::before{display:none;}
.tl-item .dot{
  width:24px;height:24px;border-radius:50%;background:#fff;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;z-index:1;
}
.tl-item.done .dot{background:var(--success);border-color:var(--success);color:#fff;}
.tl-item.current .dot{background:#fff;border-color:var(--primary);}
.tl-item.current .dot::after{
  content:"";width:8px;height:8px;border-radius:50%;background:var(--primary);
  animation:pulse 1.5s infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.6;transform:scale(1.4);}}
.tl-item .tl-content{flex:1;}
.tl-item .tl-content h6{font-size:13px;font-weight:500;}
.tl-item .tl-content p{font-size:12px;color:var(--text-3);margin-top:3px;}

/* Charts inside */
.horiz-bar{margin-top:8px;}
.hb-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.hb-row .name{width:84px;font-size:12px;color:var(--text-2);}
.hb-row .track{flex:1;height:8px;background:#F1F2F3;border-radius:4px;overflow:hidden;position:relative;}
.hb-row .track .fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#3087CC,#5BA8DE);transition:width .8s ease;}
.hb-row .val{width:50px;text-align:right;font-size:12px;font-weight:600;color:var(--text-1);}

/* Star levels grid */
.star-levels{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:48px;}
.sl{border-radius:10px;padding:14px;text-align:center;}
.sl-1{background:#F4FAFE;border:1px solid #BFDDF6;}
.sl-2{background:#FFF8E6;border:1px solid #FFE0B3;}
.sl-3{background:#FFF5E5;border:1px solid #FFE0B3;}
.sl-4{background:#E8FCF4;border:1px solid #A7F3D0;}
.sl-5{background:linear-gradient(135deg,#FFE0B3,#FFD68F);border:1px solid #F29100;color:#fff;}
.sl strong{font-size:20px;font-weight:700;display:block;margin-top:6px;}
.sl span{font-size:11px;color:var(--text-3);}
.sl-5 strong, .sl-5 span{color:#fff;}
.sl-5 span{opacity:.85;}

@media(max-width:1280px){
  .stats{grid-template-columns:repeat(2,1fr);}
  .row-2{grid-template-columns:1fr;}
  .lib-grid{grid-template-columns:repeat(3,1fr);}
  .group-grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:980px){
  .lib-grid{grid-template-columns:repeat(2,1fr);}
  .group-grid{grid-template-columns:1fr;}
  .star-levels{grid-template-columns:repeat(5,1fr);}
}

</style>

// ============= Toast =============
function showToast(msg){
  let toast = document.getElementById('toast');
  if(!toast){
    toast = document.createElement('div');
    toast.id='toast';toast.className='toast';
    toast.innerHTML=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg><span></span>`;
    document.body.appendChild(toast);
  }
  toast.querySelector('span').textContent=msg;
  toast.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer=setTimeout(()=>toast.classList.remove('show'),2400);
}

// ============= Modal =============
function openModal(id){
  const mask=document.getElementById(id);if(mask)mask.classList.add('show');
}
function closeModal(id){
  const mask=document.getElementById(id);if(mask)mask.classList.remove('show');
}

document.addEventListener('click',e=>{

    e.target.classList.toggle('checked');
  }
});

document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('.seg, .panel-tabs').forEach(g=>{
    g.querySelectorAll('button').forEach(b=>{
      b.addEventListener('click',()=>{
        g.querySelectorAll('button').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
        // Show corresponding tab content if exists
        const tab=b.getAttribute('data-tab');
        if(tab){
          const wrap=g.closest('.panel,.page,.tab-wrap')||document;
          wrap.querySelectorAll('.tab-content').forEach(c=>c.style.display='none');
          const target=wrap.querySelector('.tab-content[data-tab="'+tab+'"]');
          if(target)target.style.display='';
        }
      });
    });
  });
  document.querySelectorAll('.modal-mask').forEach(m=>{
    m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('show');});
  });
});

  const stTagMap={'已回答':'tag-success','未回答':'tag-warning','已关闭':'tag-grey'};
  let _currentAssignId=null;

  function renderTable(){
    const fSub=(document.getElementById('fSub').value||'').trim();
    const fTitle=(document.getElementById('fTitle').value||'').toLowerCase().trim();
    const fAsker=(document.getElementById('fAsker').value||'').toLowerCase().trim();
    const fSpec=(document.getElementById('fSpec').value||'').toLowerCase().trim();
    const fStatus=(document.getElementById('fStatus').value||'').trim();
    const fComplaint=(document.getElementById('fComplaint').value||'').trim();
    const list=qaData.filter(d=>{
      if(fSub&&d.sub!==fSub)return false;
      if(fTitle&&!d.title.toLowerCase().includes(fTitle))return false;
      if(fAsker&&!d.asker.toLowerCase().includes(fAsker)&&!d.askerId.includes(fAsker))return false;
      if(fSpec&&d.spec!=='-'&&!d.spec.toLowerCase().includes(fSpec)&&!d.specId.includes(fSpec))return false;
      if(fStatus&&d.status!==fStatus)return false;
      if(fComplaint==='pending'&&(!d.complaint||d.complaint.status!=='待处理'))return false;
      if(fComplaint==='handled'&&(!d.complaint||d.complaint.status!=='已处理'))return false;
      if(fComplaint==='none'&&d.complaint)return false;
      return true;
    });
    document.getElementById('qaTable').innerHTML=list.map(d=>{
      const specHtml=d.spec!=='-'
        ?`<span style="white-space:nowrap;">${d.spec} <span style="color:var(--text-3);font-size:11px;">${d.specId}</span></span>`
        :'<span style="color:var(--text-4);">—</span>';
      const ansCnt=d.answers.length;
      return`<tr style="white-space:nowrap;">
        <td style="max-width:240px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
          <div style="font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:230px;cursor:pointer;color:var(--primary);" title="${d.title}" onclick="openQaDetail(${d.id})">${d.title}</div>
        </td>
        <td style="white-space:nowrap;font-size:13px;">${d.asker} <span style="color:var(--text-3);font-size:11px;">${d.askerId}</span></td>
        <td><span class="tag" style="font-size:11px;white-space:nowrap;">${d.sub}</span></td>
        <td style="font-size:13px;">${specHtml}</td>
        <td style="font-size:12px;color:var(--text-3);white-space:nowrap;">
          <span style="display:inline-flex;align-items:center;gap:3px;margin-right:8px;"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3z"/></svg>${d.like}</span>
          <span style="display:inline-flex;align-items:center;gap:3px;"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>${ansCnt}</span>
        </td>
        <td><span class="tag ${stTagMap[d.status]||'tag'}" style="font-size:11px;white-space:nowrap;">${d.status}</span></td>
        <td style="text-align:center;">
          ${d.complaint
            ?`<button onclick="openComplaintModal(${d.id})" style="display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 8px;border-radius:5px;background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-border);cursor:pointer;font-family:inherit;white-space:nowrap;">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                ${d.complaint.status==='待处理'?'待处理':'已处理'}
              </button>`
            :'<span style="color:var(--text-4);font-size:12px;">—</span>'}
        </td>
        <td style="white-space:nowrap;">
          <div style="display:flex;gap:5px;flex-wrap:nowrap;">
            <button onclick="openQaDetail(${d.id})" style="font-size:12px;padding:2px 8px;border-radius:5px;background:var(--primary-light);color:var(--primary);border:1px solid #BFDDF6;cursor:pointer;font-family:inherit;white-space:nowrap;">详情</button>
            <button onclick="openBlockModal(${d.id})" style="font-size:12px;padding:2px 8px;border-radius:5px;background:var(--warning-bg);color:var(--warning);border:1px solid var(--warning-border);cursor:pointer;font-family:inherit;white-space:nowrap;">屏蔽</button>
            <button onclick="if(confirm('确认删除？此操作不可撤销'))showToast('已删除')" style="font-size:12px;padding:2px 8px;border-radius:5px;background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-border);cursor:pointer;font-family:inherit;white-space:nowrap;">删除</button>
            <button onclick="openAssignModal(${d.id})" style="font-size:12px;padding:2px 8px;border-radius:5px;background:#F0FDF4;color:#15803d;border:1px solid #A7F3D0;cursor:pointer;font-family:inherit;white-space:nowrap;">指派义工</button>
          </div>
        </td>
      </tr>`;
    }).join('');
    document.querySelector('.table-foot .count').textContent='共 '+list.length+' 条问题记录';
  }

  function resetFilter(){
    ['fSub','fStatus','fComplaint'].forEach(id=>document.getElementById(id).value='');
    ['fTitle','fAsker','fSpec'].forEach(id=>document.getElementById(id).value='');
    renderTable();
  }

  /* ===== Detail & Reply System ===== */
  const avatarColors=['#3087CC','#F29100','#1BB975','#7C5BC1','#DF2027','#0EA5E9'];

  const fileIconCfg={
    pdf:{bg:'linear-gradient(135deg,#DF2027,#FF6B6B)',label:'PDF'},
    doc:{bg:'linear-gradient(135deg,#3087CC,#5BA8DE)',label:'DOC'},
    xls:{bg:'linear-gradient(135deg,#1BB975,#34D399)',label:'XLS'},
    ppt:{bg:'linear-gradient(135deg,#F29100,#FFAA33)',label:'PPT'},
    img:{bg:'linear-gradient(135deg,#7C5BC1,#B59CE5)',label:'IMG'},
    zip:{bg:'linear-gradient(135deg,#9096A2,#ABB0BA)',label:'ZIP'},
  };

  function renderAttachments(files){
    if(!files||files.length===0)return'';
    const cards=files.map(f=>{
      const cfg=fileIconCfg[f.type]||{bg:'linear-gradient(135deg,#9096A2,#C0C5CD)',label:'FILE'};
      return`<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;border:1px solid var(--border-light);border-radius:8px;background:#FAFBFD;min-width:180px;max-width:240px;flex:0 0 auto;">
        <div style="width:34px;height:34px;border-radius:8px;background:${cfg.bg};display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-weight:700;color:#fff;">${cfg.label}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-1);" title="${f.name}">${f.name}</div>
          <div style="font-size:11px;color:var(--text-3);margin-top:2px;">${f.size}</div>
        </div>
        <button onclick="showToast('附件预览功能开发中')" title="查看" style="width:26px;height:26px;border-radius:6px;background:var(--primary-light);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>`;
    }).join('');
    return`<div style="margin-top:10px;padding-top:10px;border-top:1px dashed var(--border-light);">
      <div style="font-size:12px;color:var(--text-3);margin-bottom:8px;display:flex;align-items:center;gap:5px;">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        附件（${files.length}）
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">${cards}</div>
    </div>`;
  }

  function openQaDetail(id){
    const d=qaData.find(x=>x.id===id);if(!d)return;
    _currentDetailId=id;
    document.getElementById('qaBody').innerHTML=renderDetailHTML(d);
    openModal('qaDetailModal');
  }

  function renderDetailHTML(d){
    return`
      <div style="background:linear-gradient(135deg,#F4FAFE,#E3F1F9);border-radius:12px;padding:16px 18px;margin-bottom:16px;border:1px solid #BFDDF6;">
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;">
          <span class="tag">${d.sub}</span>
          <span class="tag ${stTagMap[d.status]||'tag'}">${d.status}</span>
        </div>
        <h3 style="font-size:16px;font-weight:600;line-height:1.5;color:var(--text-1);">${d.title}</h3>
        <div style="margin-top:10px;padding-top:10px;border-top:1px dashed #BFDDF6;font-size:12px;color:var(--text-3);display:flex;gap:18px;flex-wrap:wrap;">
          <span>提问者：<strong style="color:var(--text-1);">${d.asker}</strong>（${d.askerId}）</span>
          <span>${d.time}</span>
          ${d.spec!=='-'?`<span>指定义工：<strong style="color:var(--text-1);">${d.spec}</strong>（${d.specId}）</span>`:''}
          <span>👍 ${d.like} 点赞</span>
        </div>
      </div>
      <div style="background:#fff;border:1px solid var(--border-light);border-radius:12px;padding:16px 18px;margin-bottom:16px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <h5 style="font-size:13px;font-weight:600;color:var(--text-2);">问题描述</h5>
          
        </div>
        <p style="font-size:14px;color:var(--text-1);line-height:1.8;">${d.body}</p>
        ${renderAttachments(d.attachments)}
      </div>
      <h4 style="font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px;">
        全部回答 <span style="font-size:12px;font-weight:400;color:var(--text-3);">共 ${d.answers.length} 条</span>
      </h4>
      ${d.answers.length===0
        ?'<div style="text-align:center;padding:28px 0;color:var(--text-3);font-size:13px;background:#FAFBFD;border-radius:10px;border:1px dashed var(--border);">暂无回答</div>'
        :d.answers.map((a,ai)=>renderAnswerCard(d.id,'m',ai,a)).join('')}
      ${d.followUps&&d.followUps.length>0
        ?d.followUps.map((fup,fi)=>renderFollowUpBlock(d,fup,fi)).join('')
        :''}
    `;
  }

  function renderFollowUpBlock(d,fup,fi){
    const ansSection=fup.answers&&fup.answers.length>0
      ?fup.answers.map((a,ai)=>renderAnswerCard(d.id,'f'+fi,ai,a)).join('')
      :'<div style="text-align:center;padding:16px 0;color:var(--text-3);font-size:13px;background:#FAFBFD;border-radius:8px;border:1px dashed var(--border);margin-bottom:12px;">暂无回答</div>';
    return`
    <div style="position:relative;margin:4px 0 0 0;">
      <!-- 连接线 -->
      <div style="display:flex;align-items:center;gap:10px;margin:12px 0 12px 14px;">
        <div style="width:2px;height:18px;background:var(--warning-border);border-radius:1px;flex-shrink:0;"></div>
        <span style="font-size:11px;color:var(--text-3);">提问者追问 · ${fup.time}</span>
      </div>
      <!-- 追问卡片 -->
      <div style="border:1px solid var(--warning-border);background:var(--warning-bg);border-radius:12px;padding:14px 16px;margin-bottom:12px;position:relative;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
          <div style="width:28px;height:28px;border-radius:50%;background:#F29100;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;">${d.asker[0]}</div>
          <div style="flex:1;">
            <span style="font-size:13px;font-weight:600;">${d.asker}</span>
            <span style="font-size:11px;color:var(--text-3);margin-left:6px;">${d.askerId}</span>
          </div>
          <span style="font-size:11px;padding:2px 8px;border-radius:4px;background:var(--warning);color:#fff;font-weight:500;">追问</span>
          <span style="font-size:11px;color:var(--text-3);">${fup.time}</span>
        </div>
        <p style="font-size:13px;color:var(--text-1);line-height:1.8;">${fup.content}</p>
        ${renderAttachments(fup.attachments)}
      </div>
      <!-- 追问的回答 -->
      <div style="padding-left:16px;border-left:2px dashed var(--border-light);">
        <div style="font-size:12px;color:var(--text-3);margin-bottom:10px;display:flex;align-items:center;gap:6px;">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          针对该追问的回答（${fup.answers?fup.answers.length:0} 条）
        </div>
        ${ansSection}
      </div>
    </div>`;
  }

  function renderAnswerCard(qid,scope,ai,a){
    const key=`${qid}-${scope}-${ai}`;
    const repCount=a.replies?a.replies.length:0;
    const repliesHTML=a.replies&&a.replies.length>0?a.replies.map((r,ri)=>`
      <div style="display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--border-light);" id="rep-${key}-${ri}">
        <div style="width:22px;height:22px;border-radius:50%;background:${avatarColors[(ai+ri+1)%avatarColors.length]};color:#fff;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;flex-shrink:0;">${r.name[0]}</div>
        <div style="flex:1;">
          <span style="font-size:12px;font-weight:600;">${r.name}</span>
          <span style="font-size:11px;color:var(--text-3);margin-left:6px;">${r.time}</span>
          <p style="font-size:13px;color:var(--text-1);margin-top:3px;line-height:1.6;">${r.content}</p>
        </div>
      </div>`).join(''):'';
    return`
    <div style="border:1px solid ${a.best?'var(--success-border)':'var(--border-light)'};background:${a.best?'var(--success-bg)':'#fff'};border-radius:12px;padding:14px;margin-bottom:12px;" id="ans-${key}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
        <div style="width:30px;height:30px;border-radius:50%;background:${avatarColors[ai%avatarColors.length]};color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;">${a.name[0]}</div>
        <div style="flex:1;">
          <span style="font-size:13px;font-weight:600;">${a.name}</span>
          <span style="font-size:11px;color:var(--text-3);margin-left:6px;">${a.sid}</span>
        </div>
        ${a.best?'<span style="font-size:11px;padding:2px 8px;border-radius:4px;background:var(--success);color:#fff;font-weight:500;">✓ 最佳回答</span>':''}
        <span style="font-size:11px;color:var(--text-3);">${a.time}</span>
      </div>
      <p style="font-size:13px;color:var(--text-1);line-height:1.8;margin-bottom:10px;">${a.content}</p>
      ${renderAttachments(a.attachments)}
      <div style="display:flex;align-items:center;gap:16px;border-top:1px solid ${a.best?'var(--success-border)':'var(--border-light)'};padding-top:8px;margin-top:10px;">
        <button onclick="toggleReplies('${key}')" style="font-size:12px;color:var(--text-3);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:4px;padding:0;font-family:inherit;transition:color .15s;" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-3)'">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          ${repCount>0?repCount+'条回复':'暂无回复'}
        </button>
      </div>
      <div id="replies-${key}" style="display:none;margin-top:10px;padding-top:8px;border-top:1px solid var(--border-light);">
        <div id="replist-${key}">${repliesHTML}</div>
      </div>
    </div>`;
  }

  function toggleReplies(key){
    const box=document.getElementById('replies-'+key);
    if(!box)return;
    box.style.display=box.style.display!=='none'?'none':'block';
  }

  /* ===== 投诉 & 屏蔽 ===== */
  let _currentComplaintQaId=null;
  let _currentBlockQaId=null;
  let _blockFiles=[];

  function openComplaintModal(id){
    const d=qaData.find(x=>x.id===id);
    if(!d||!d.complaint)return;
    _currentComplaintQaId=id;
    const c=d.complaint;
    document.getElementById('complaintQaTitle').textContent=d.title;
    const isHandled=c.status==='已处理';
    const handleBtn=document.getElementById('complaintHandleBtn');
    if(handleBtn){handleBtn.style.display=isHandled?'none':'';}
    document.getElementById('complaintBody').innerHTML=`
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
        <span style="font-size:12px;padding:3px 10px;border-radius:5px;background:${isHandled?'var(--success-bg)':'var(--danger-bg)'};color:${isHandled?'var(--success)':'var(--danger)'};border:1px solid ${isHandled?'var(--success-border)':'var(--danger-border)'};font-weight:500;">
          ${isHandled?'✓ 已处理':'● 待处理'}
        </span>
        <span style="font-size:12px;padding:3px 10px;border-radius:5px;background:var(--bg);color:var(--text-2);border:1px solid var(--border);">${c.type}</span>
      </div>
      <div style="background:var(--bg);border-radius:10px;padding:14px 16px;margin-bottom:14px;">
        <div style="font-size:12px;color:var(--text-3);margin-bottom:10px;display:flex;gap:20px;flex-wrap:wrap;">
          <span>投诉人：<strong style="color:var(--text-1);">${c.reporter}</strong>（${c.reporterId}）</span>
          <span>投诉时间：${c.time}</span>
        </div>
        <div style="font-size:13px;font-weight:500;color:var(--text-2);margin-bottom:6px;">投诉内容</div>
        <p style="font-size:14px;color:var(--text-1);line-height:1.8;">${c.reason}</p>
        ${renderAttachments(c.attachments)}
      </div>
      ${isHandled?`<div style="background:var(--success-bg);border:1px solid var(--success-border);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--success);display:flex;align-items:center;gap:8px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        该投诉已被管理员处理完毕
      </div>`:''}
    `;
    openModal('complaintModal');
  }

  function markComplaintHandled(){
    const d=qaData.find(x=>x.id===_currentComplaintQaId);
    if(!d||!d.complaint)return;
    d.complaint.status='已处理';
    closeModal('complaintModal');
    renderTable();
    showToast('已标记投诉为已处理');
  }

  function openBlockModal(id){
    const d=qaData.find(x=>x.id===id);if(!d)return;
    _currentBlockQaId=id;
    _blockFiles=[];
    document.getElementById('blockQaTitle').textContent=d.title.length>50?d.title.slice(0,50)+'…':d.title;
    document.getElementById('blockReason').value='';
    document.getElementById('blockFileList').innerHTML='';
    openModal('blockModal');
  }

  function openBlockModalFromDetail(){
    if(_currentDetailId) openBlockModal(_currentDetailId);
  }

  function handleBlockFileSelect(input){
    const files=Array.from(input.files);
    files.forEach(f=>{
      if(_blockFiles.find(x=>x.name===f.name))return;
      _blockFiles.push(f);
    });
    renderBlockFileList();
    input.value='';
  }

  function renderBlockFileList(){
    const typeMap={pdf:'pdf',doc:'doc',docx:'doc',jpg:'img',jpeg:'img',png:'img'};
    document.getElementById('blockFileList').innerHTML=_blockFiles.map((f,i)=>{
      const ext=(f.name.split('.').pop()||'').toLowerCase();
      const cfg=fileIconCfg[typeMap[ext]||'pdf']||{bg:'linear-gradient(135deg,#9096A2,#C0C5CD)',label:'FILE'};
      const sizeStr=f.size>1024*1024?(f.size/1024/1024).toFixed(1)+' MB':(f.size/1024).toFixed(0)+' KB';
      return`<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;border:1px solid var(--border-light);border-radius:8px;background:#fff;">
        <div style="width:30px;height:30px;border-radius:6px;background:${cfg.bg};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0;">${cfg.label}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${f.name}</div>
          <div style="font-size:11px;color:var(--text-3);">${sizeStr}</div>
        </div>
        <button onclick="removeBlockFile(${i})" style="width:22px;height:22px;border-radius:5px;border:none;background:var(--danger-bg);color:var(--danger);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>`;
    }).join('');
  }

  function removeBlockFile(i){
    _blockFiles.splice(i,1);
    renderBlockFileList();
  }

  function confirmBlock(){
    const reason=document.getElementById('blockReason').value.trim();
    if(!reason){
      const ta=document.getElementById('blockReason');
      ta.style.borderColor='var(--danger)';
      ta.focus();
      ta.placeholder='屏蔽原因为必填项，请填写后提交';
      setTimeout(()=>{ta.style.borderColor='var(--border)';},2000);
      return;
    }
    const d=qaData.find(x=>x.id===_currentBlockQaId);
    if(d){d.status='已关闭';}
    closeModal('blockModal');
    closeModal('qaDetailModal');
    renderTable();
    showToast('问题已屏蔽并关闭');
  }

  let _currentDetailId=null;

  function openAssignModal(id){
    const d=qaData.find(x=>x.id===id);if(!d)return;
    _currentAssignId=id;
    document.getElementById('assignQaTitle').textContent=d.title.length>40?d.title.slice(0,40)+'…':d.title;
    document.getElementById('assignSearch').value='';
    document.getElementById('assignSubFilter').value=d.sub||'';
    document.getElementById('selectedVolId').value='';
    renderVolList('');
    openModal('assignModal');
  }
  function renderVolList(kw){
    const sub=document.getElementById('assignSubFilter').value;
    const list=VOLUNTEERS.filter(v=>{
      if(sub&&v.sub!==sub)return false;
      if(kw&&!v.name.includes(kw)&&!v.sid.includes(kw))return false;
      return true;
    });
    document.getElementById('volList').innerHTML=list.length===0
      ?'<div style="text-align:center;padding:20px;color:var(--text-3);font-size:13px;">无匹配义工</div>'
      :list.map(v=>`
      <div class="approval-item" style="cursor:pointer;padding:10px 12px;transition:all .15s;" onclick="selectVol('${v.sid}',this)">
        <div class="ava" style="width:36px;height:36px;font-size:13px;">${v.name[0]}</div>
        <div class="text" style="flex:1;">
          <h5>${v.name} <span style="font-size:11px;color:var(--text-3);font-weight:400;">${v.sid}</span></h5>
          <p>${v.sub} · ${'★'.repeat(v.star)} · 已回答 ${v.ans} 条</p>
        </div>
        <span class="tag tag-success" style="font-size:11px;">可指派</span>
      </div>`).join('');
  }
  function searchVolunteer(kw){renderVolList(kw.trim());}
  function selectVol(sid,el){
    document.getElementById('selectedVolId').value=sid;
    document.querySelectorAll('#volList .approval-item').forEach(e=>{e.style.background='';e.style.borderColor='';});
    el.style.background='var(--primary-light)';el.style.borderColor='var(--primary)';
  }
  function confirmAssign(){
    const sid=document.getElementById('selectedVolId').value;
    if(!sid){showToast('请先选择一位义工');return;}
    const vol=VOLUNTEERS.find(v=>v.sid===sid);
    const d=qaData.find(x=>x.id===_currentAssignId);
    if(d&&vol){d.spec=vol.name;d.specId=vol.sid;}
    closeModal('assignModal');
    renderTable();
    showToast('已成功指派义工：'+vol.name);
  }

  renderTable();
</script>

</body>
</html>
