<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>成员管理</title>
<style>
:root{
  --primary:#3087CC;--primary-light:#E3F1F9;--primary-dark:#006DAD;--primary-50:#F4FAFE;
  --text-1:#3C444F;--text-2:#696F7D;--text-3:#9096A2;--text-4:#ABB0BA;
  --border:#E5E8EE;--border-light:#EFF1F5;--bg:#F4F6FA;
  --success:#1BB975;--success-bg:#E8FCF4;--success-border:#A7F3D0;
  --danger:#DF2027;--danger-bg:#FCE8EA;--danger-border:#F6BCBE;
  --shadow-sm:0 1px 3px rgba(15,32,55,.05);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  font-family:"OPPOSans","PingFang SC","Microsoft YaHei",-apple-system,sans-serif;
  color:var(--text-1);font-size:14px;-webkit-font-smoothing:antialiased;
  background:#fff;height:100%;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
svg{display:block;flex-shrink:0;}
input,select{font-family:inherit;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-thumb{background:#D9DDE3;border-radius:3px;}
::-webkit-scrollbar-track{background:transparent;}

.dlg{display:flex;flex-direction:column;height:100vh;}

/* Head */
.dlg-head{
  padding:14px 20px;border-bottom:1px solid var(--border-light);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.dlg-head-left{display:flex;align-items:center;gap:10px;}
.icon-wrap{
  width:28px;height:28px;border-radius:7px;
  background:var(--primary-light);color:var(--primary);
  display:flex;align-items:center;justify-content:center;
}
.dlg-head h3{font-size:15px;font-weight:600;}
.group-tag{
  font-size:11px;padding:2px 8px;border-radius:4px;
  background:var(--primary-light);color:var(--primary);font-weight:500;
}
.close-btn{
  width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;
  color:var(--text-3);transition:all .15s;
}
.close-btn:hover{background:#F4F6FA;color:var(--text-1);}

/* Toolbar */
.toolbar{
  padding:12px 20px;border-bottom:1px solid var(--border-light);
  display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0;
}
.search-box{
  height:32px;background:#F4F6FA;border-radius:7px;
  display:flex;align-items:center;padding:0 10px;gap:7px;
  border:1px solid transparent;transition:all .15s;width:220px;
}
.search-box:focus-within{background:#fff;border-color:var(--primary);}
.search-box input{flex:1;border:none;outline:none;background:transparent;font-size:12px;color:var(--text-1);}
.search-box input::placeholder{color:var(--text-4);}
.toolbar-right{display:flex;align-items:center;gap:8px;}
.count-badge{font-size:12px;color:var(--text-3);}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;gap:5px;
  height:30px;padding:0 12px;border-radius:7px;font-size:12px;font-weight:500;transition:all .15s;
}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-dark);}
.btn-ghost{background:#fff;color:var(--text-2);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary);}
.btn-lg{height:34px;padding:0 16px;font-size:13px;}

/* Table */
.dlg-body{flex:1;overflow-y:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{
  background:#F8FAFC;color:var(--text-2);font-weight:500;
  text-align:left;padding:11px 16px;font-size:12px;
  border-bottom:1px solid var(--border-light);position:sticky;top:0;z-index:2;
}
tbody td{padding:12px 16px;border-bottom:1px solid var(--border-light);color:var(--text-1);}
tbody tr:hover{background:#FAFBFD;}
tbody tr:last-child td{border-bottom:none;}

.ava{
  width:30px;height:30px;border-radius:8px;
  background:linear-gradient(135deg,#9CBFDA,#3087CC);
  color:#fff;display:inline-flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;flex-shrink:0;
}
.member-cell{display:flex;align-items:center;gap:10px;}
.member-name{font-weight:500;}
.member-id{font-size:11px;color:var(--text-3);margin-top:2px;}

.tag{
  display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;
  font-size:11px;font-weight:500;
  background:var(--primary-light);color:var(--primary);border:1px solid #BFDDF6;
}
.tag-success{background:var(--success-bg);color:var(--success);border-color:var(--success-border);}
.tag-grey{background:#F1F2F3;color:var(--text-2);border-color:var(--border);}

.act-remove{
  font-size:13px;color:var(--danger);cursor:pointer;font-weight:500;
  background:none;border:none;padding:0;font-family:inherit;transition:color .15s;
}
.act-remove:hover{color:#B81B21;text-decoration:underline;}

/* Confirm dialog */
.confirm-mask{
  position:fixed;inset:0;background:rgba(15,32,55,.38);z-index:80;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .18s;
}
.confirm-mask.show{opacity:1;pointer-events:auto;}
.confirm-box{
  background:#fff;border-radius:14px;width:380px;max-width:90vw;padding:28px 24px 20px;
  text-align:center;transform:scale(.92);transition:transform .18s;
  box-shadow:0 12px 32px rgba(15,32,55,.12);
}
.confirm-mask.show .confirm-box{transform:scale(1);}
.confirm-icon{
  width:52px;height:52px;border-radius:50%;background:var(--danger-bg);
  display:flex;align-items:center;justify-content:center;margin:0 auto 14px;color:var(--danger);
}
.confirm-box h4{font-size:16px;font-weight:600;margin-bottom:6px;}
.confirm-box p{font-size:13px;color:var(--text-2);line-height:1.6;margin-bottom:20px;}
.confirm-box p strong{color:var(--text-1);}
.confirm-btns{display:flex;gap:8px;justify-content:center;}
.confirm-btns .btn{height:34px;padding:0 20px;border-radius:8px;font-size:13px;font-weight:500;}
.btn-danger{background:var(--danger);color:#fff;}
.btn-danger:hover{background:#B81B21;}

/* Empty state */
.empty{padding:40px;text-align:center;color:var(--text-3);}
.empty svg{margin:0 auto 12px;}

/* Footer */
.dlg-foot{
  padding:12px 20px;border-top:1px solid var(--border-light);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.foot-info{font-size:12px;color:var(--text-3);}

/* Toast inside */
.inner-toast{
  position:fixed;top:12px;left:50%;transform:translateX(-50%) translateY(-10px);
  background:var(--success-bg);border:1px solid var(--success-border);color:var(--success);
  padding:8px 16px;border-radius:7px;font-size:12px;font-weight:500;
  display:flex;align-items:center;gap:6px;z-index:99;
  opacity:0;pointer-events:none;transition:all .22s;white-space:nowrap;
}
.inner-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="dlg">
  <div class="dlg-head">
    <div class="dlg-head-left">
      <div class="icon-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </div>
      <h3>成员管理</h3>
      <span class="group-tag" id="groupTag">加载中</span>
    </div>
    <button class="close-btn" onclick="dismiss()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <div class="toolbar">
    <div class="search-box">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-3);flex-shrink:0;"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input placeholder="搜索姓名 / 学号..." oninput="filterTable(this.value)" />
    </div>
    <div class="toolbar-right">
      <span class="count-badge" id="countBadge"></span>
    </div>
  </div>

  <div class="dlg-body">
    <table>
      <thead>
        <tr>
          <th>成员</th>
          <th>专业 / 年级</th>
          <th>加入时间</th>
          <th>累计时长</th>
          <th>组内角色</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="memberTable"></tbody>
    </table>
  </div>

  <div class="dlg-foot">
    <span class="foot-info" id="footInfo"></span>
    <button class="btn btn-ghost btn-lg" onclick="dismiss()">关闭</button>
  </div>
</div>

<!-- Confirm Remove Dialog -->
<div class="confirm-mask" id="confirmMask">
  <div class="confirm-box">
    <div class="confirm-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="17" y1="11" x2="23" y2="11"/></svg>
    </div>
    <h4>确认移出成员</h4>
    <p>确定要将 <strong id="confirmName"></strong> 从 <strong id="confirmGroup"></strong> 中移出吗？此操作不可撤销。</p>
    <div class="confirm-btns">
      <button class="btn btn-ghost" onclick="closeConfirm()">取消</button>
      <button class="btn btn-danger" onclick="confirmRemove()">确认移出</button>
    </div>
  </div>
</div>

<div class="inner-toast" id="innerToast">
  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="innerToastMsg"></span>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const groupName = params.get('name') || '未知分组';
document.getElementById('groupTag').textContent = groupName;

const DATA = {
  '数学组':[
    {name:'陈思远',id:'2022110023',major:'数学 2022',joined:'2023-09-01',hours:'62h',role:'组长'},
    {name:'林楠',id:'2024110078',major:'信息计算 2024',joined:'2024-09-10',hours:'18h',role:'成员'},
    {name:'王伟',id:'2023110089',major:'统计 2023',joined:'2023-09-15',hours:'40h',role:'副组长'},
    {name:'张力',id:'2022110115',major:'数学 2022',joined:'2022-10-08',hours:'56h',role:'成员'},
    {name:'李红',id:'2023110234',major:'数学 2023',joined:'2023-11-20',hours:'32h',role:'成员'},
  ],
  '物理组':[
    {name:'周泽宇',id:'2022120011',major:'物理 2022',joined:'2023-09-01',hours:'58h',role:'组长'},
    {name:'何芳',id:'2023120045',major:'物理 2023',joined:'2023-10-05',hours:'24h',role:'成员'},
    {name:'徐明',id:'2024120033',major:'物理 2024',joined:'2024-09-12',hours:'12h',role:'成员'},
  ],
  '化学组':[
    {name:'黄怡然',id:'2022130022',major:'化学 2022',joined:'2023-09-01',hours:'44h',role:'组长'},
    {name:'罗成',id:'2023130056',major:'化工 2023',joined:'2023-10-18',hours:'28h',role:'成员'},
  ],
  '英语组':[
    {name:'王诗韵',id:'2022140009',major:'英语 2022',joined:'2023-09-01',hours:'76h',role:'组长'},
    {name:'郑宇',id:'2023140072',major:'英语 2023',joined:'2023-09-20',hours:'34h',role:'副组长'},
    {name:'钱峰',id:'2024140018',major:'英语 2024',joined:'2024-09-08',hours:'16h',role:'成员'},
    {name:'孙丽',id:'2023140099',major:'翻译 2023',joined:'2023-11-01',hours:'22h',role:'成员'},
  ],
  '力学组':[
    {name:'吴鸿涛',id:'2022150031',major:'力学 2022',joined:'2023-09-01',hours:'38h',role:'组长'},
    {name:'许燕',id:'2023150067',major:'力学 2023',joined:'2023-10-22',hours:'20h',role:'成员'},
  ],
  '计算机组':[
    {name:'刘子轩',id:'2022160044',major:'计算机 2022',joined:'2023-09-01',hours:'54h',role:'组长'},
    {name:'高鑫',id:'2023160088',major:'软工 2023',joined:'2023-09-25',hours:'36h',role:'副组长'},
    {name:'朱敏',id:'2024160012',major:'计算机 2024',joined:'2024-09-06',hours:'14h',role:'成员'},
  ]
};

const roleColor = {
  '组长':'tag',
  '副组长':'tag-success',
  '成员':'tag-grey'
};

const avaColors = [
  'linear-gradient(135deg,#9CBFDA,#3087CC)',
  'linear-gradient(135deg,#A7F3D0,#1BB975)',
  'linear-gradient(135deg,#FFE0B3,#F29100)',
  'linear-gradient(135deg,#F6BCBE,#DF2027)',
  'linear-gradient(135deg,#B59CE5,#7C5BC1)',
  'linear-gradient(135deg,#7DD3FC,#0EA5E9)',
];

let members = DATA[groupName] || [];

function render(list) {
  const tbody = document.getElementById('memberTable');
  if(!list.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-4);"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>暂无成员</div></td></tr>`;
  } else {
    tbody.innerHTML = list.map((m,i)=>`
      <tr>
        <td>
          <div class="member-cell">
            <div class="ava" style="background:${avaColors[i%avaColors.length]}">${m.name[0]}</div>
            <div>
              <div class="member-name">${m.name}</div>
              <div class="member-id">${m.id}</div>
            </div>
          </div>
        </td>
        <td style="color:var(--text-2);">${m.major}</td>
        <td style="color:var(--text-3);">${m.joined}</td>
        <td style="font-weight:500;">${m.hours}</td>
        <td><span class="tag ${roleColor[m.role]||'tag-grey'}">${m.role}</span></td>
        <td>
          <button class="act-remove" onclick="askRemove(${i})">移出</button>
        </td>
      </tr>
    `).join('');
  }
  document.getElementById('countBadge').textContent = '共 ' + list.length + ' 人';
  document.getElementById('footInfo').textContent = groupName + ' · 共 ' + members.length + ' 名成员';
}

function filterTable(q) {
  if(!q.trim()) { render(members); return; }
  const keyword = q.toLowerCase();
  render(members.filter(m => m.name.includes(keyword) || m.id.includes(keyword)));
}

let _pendingRemoveIdx = -1;

function askRemove(idx) {
  _pendingRemoveIdx = idx;
  document.getElementById('confirmName').textContent = members[idx].name;
  document.getElementById('confirmGroup').textContent = groupName;
  document.getElementById('confirmMask').classList.add('show');
}

function closeConfirm() {
  document.getElementById('confirmMask').classList.remove('show');
  _pendingRemoveIdx = -1;
}

function confirmRemove() {
  if(_pendingRemoveIdx < 0) return;
  const name = members[_pendingRemoveIdx].name;
  members.splice(_pendingRemoveIdx, 1);
  closeConfirm();
  render(members);
  showInnerToast('已将「' + name + '」移出组');
}

document.getElementById('confirmMask').addEventListener('click', function(e) {
  if(e.target === this) closeConfirm();
});

function showInnerToast(msg) {
  const el = document.getElementById('innerToast');
  document.getElementById('innerToastMsg').textContent = msg;
  el.classList.add('show');
  clearTimeout(window._it);
  window._it = setTimeout(() => el.classList.remove('show'), 2200);
}

function dismiss() {
  if(window.parent && window.parent.closeIframeModal) window.parent.closeIframeModal();
}

render(members);
</script>

</body>
</html>
