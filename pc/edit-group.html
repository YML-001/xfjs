<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>编辑组信息</title>
<style>
:root{
  --primary:#3087CC;--primary-light:#E3F1F9;--primary-dark:#006DAD;
  --text-1:#3C444F;--text-2:#696F7D;--text-3:#9096A2;
  --border:#E5E8EE;--border-light:#EFF1F5;
  --warning:#F29100;--warning-bg:#FFF5E5;
  --danger:#DF2027;
  --shadow-sm:0 1px 3px rgba(15,32,55,.05);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  font-family:"OPPOSans","PingFang SC","Microsoft YaHei",-apple-system,sans-serif;
  color:var(--text-1);font-size:14px;-webkit-font-smoothing:antialiased;
  background:#fff;height:100%;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
svg{display:block;flex-shrink:0;}

.dlg{display:flex;flex-direction:column;height:100vh;}

.dlg-head{
  padding:16px 22px;border-bottom:1px solid var(--border-light);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.dlg-head h3{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;}
.dlg-head .icon-wrap{
  width:28px;height:28px;border-radius:7px;
  background:#FFF5E5;color:var(--warning);
  display:flex;align-items:center;justify-content:center;
}
.close-btn{
  width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;
  color:var(--text-3);transition:all .15s;
}
.close-btn:hover{background:#F4F6FA;color:var(--text-1);}

/* group tag badge */
.group-badge{
  display:inline-flex;align-items:center;gap:6px;padding:4px 10px;
  background:var(--primary-light);color:var(--primary);border-radius:6px;
  font-size:12px;font-weight:500;margin-bottom:18px;
}

.dlg-body{flex:1;padding:20px 22px;overflow-y:auto;}

.form-item{display:flex;flex-direction:column;margin-bottom:14px;}
.form-item label{font-size:12px;color:var(--text-2);margin-bottom:6px;font-weight:500;}
.form-item label .req{color:var(--danger);margin-left:2px;}
.input,.select{
  height:36px;padding:0 12px;border:1px solid var(--border);border-radius:8px;
  font-size:13px;color:var(--text-1);background:#fff;outline:none;
  transition:all .15s;font-family:inherit;width:100%;
}
.input:focus,.select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(48,135,204,.1);}
.input::placeholder{color:var(--text-3);}
textarea.input{height:auto;padding:10px 12px;resize:none;line-height:1.6;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.hint{font-size:12px;color:var(--text-3);margin-top:5px;}

/* Change log / warning */
.warn-tip{
  background:var(--warning-bg);border:1px solid #FFE0B3;border-radius:8px;
  padding:10px 14px;display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--warning);
  margin-bottom:16px;line-height:1.6;
}

.dlg-foot{
  padding:14px 22px;border-top:1px solid var(--border-light);
  display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;
}
.btn{
  display:inline-flex;align-items:center;gap:6px;
  height:34px;padding:0 16px;border-radius:8px;font-size:13px;font-weight:500;transition:all .15s;
}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-dark);box-shadow:0 4px 12px rgba(48,135,204,.28);}
.btn-ghost{background:#fff;color:var(--text-2);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary);}
</style>
</head>
<body>
<div class="dlg">
  <div class="dlg-head">
    <h3>
      <div class="icon-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4Z"/></svg>
      </div>
      编辑组信息
    </h3>
    <button class="close-btn" onclick="dismiss()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <div class="dlg-body">
    <div class="group-badge" id="groupBadge">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></svg>
      <span id="groupBadgeText">加载中...</span>
    </div>

    <div class="warn-tip">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      修改组名或学科后，该组所有关联课程、任务及统计数据标注将同步更新。
    </div>

    <div class="form-item">
      <label>组名<span class="req">*</span></label>
      <input class="input" id="groupName" placeholder="请输入组名" />
    </div>

    <div class="form-row">
      <div class="form-item">
        <label>学科分类<span class="req">*</span></label>
        <select class="select" id="groupSubject">
          <option>数学</option><option>物理</option><option>化学</option>
          <option>英语</option><option>力学</option><option>计算机</option><option>其他</option>
        </select>
      </div>
      <div class="form-item">
        <label>组长</label>
        <input class="input" id="groupLeader" placeholder="搜索义工姓名" />
      </div>
    </div>

    <div class="form-item" style="margin-bottom:0;">
      <label style="display:flex;align-items:center;justify-content:space-between;">备注说明</label>
      <textarea class="input" rows="3" id="groupRemark" placeholder="选填..."></textarea>
    </div>
  </div>

  <div class="dlg-foot">
    <button class="btn btn-ghost" onclick="dismiss()">取消</button>
    <button class="btn btn-primary" onclick="submit()">保存修改</button>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const groupName = params.get('name') || '未知分组';

  document.getElementById('groupBadgeText').textContent = groupName;
  document.getElementById('groupName').value = groupName;

  // Mock prefill based on group name
  const leaderMap = {'数学组':'陈思远','物理组':'周泽宇','化学组':'黄怡然','英语组':'王诗韵','力学组':'吴鸿涛','计算机组':'刘子轩'};
  const subjectMap = {'数学组':'数学','物理组':'物理','化学组':'化学','英语组':'英语','力学组':'力学','计算机组':'计算机'};
  if(leaderMap[groupName]) document.getElementById('groupLeader').value = leaderMap[groupName];
  const sel = document.getElementById('groupSubject');
  if(subjectMap[groupName]) {
    for(let opt of sel.options) {
      if(opt.text === subjectMap[groupName]) { opt.selected = true; break; }
    }
  }

  function dismiss() {
    if(window.parent && window.parent.closeIframeModal) window.parent.closeIframeModal();
  }

  function submit() {
    const name = document.getElementById('groupName').value.trim();
    if(!name) {
      document.getElementById('groupName').focus();
      document.getElementById('groupName').style.borderColor = '#DF2027';
      return;
    }
    if(window.parent && window.parent.closeIframeModal) {
      window.parent.closeIframeModal('「' + name + '」信息已更新');
    }
  }

  document.getElementById('groupName').addEventListener('input', function(){ this.style.borderColor = ''; });
</script>

</body>
</html>
