<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>资料分类管理 · 学风建设系统</title>
<style>
:root{
  --primary:#3087CC;
  --primary-light:#E3F1F9;
  --primary-dark:#006DAD;
  --primary-50:#F4FAFE;
  --text-1:#3C444F;
  --text-2:#696F7D;
  --text-3:#9096A2;
  --text-4:#ABB0BA;
  --border:#E5E8EE;
  --border-light:#EFF1F5;
  --bg:#F4F6FA;
  --bg-card:#FFFFFF;
  --success:#1BB975;
  --success-bg:#E8FCF4;
  --success-border:#A7F3D0;
  --warning:#F29100;
  --warning-bg:#FFF5E5;
  --warning-border:#FFE0B3;
  --danger:#DF2027;
  --danger-bg:#FCE8EA;
  --danger-border:#F6BCBE;
  --shadow-sm:0 1px 3px rgba(15,32,55,.05);
  --shadow-md:0 4px 14px rgba(15,32,55,.06);
  --shadow-lg:0 12px 32px rgba(15,32,55,.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:"OPPOSans","PingFang SC","Microsoft YaHei",-apple-system,sans-serif;color:var(--text-1);background:var(--bg);-webkit-font-smoothing:antialiased;font-size:14px;}
body{min-height:100vh;display:flex;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
svg{display:block;flex-shrink:0;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:#D9DDE3;border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:#C0C5CD;}
::-webkit-scrollbar-track{background:transparent;}

/* ====== Sidebar ====== */
.sidebar{
  width:232px;flex-shrink:0;background:#fff;
  border-right:1px solid var(--border-light);
  height:100vh;position:sticky;top:0;display:flex;flex-direction:column;
}
.brand{
  padding:20px 20px 16px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid var(--border-light);
}
.brand-logo{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,#3087CC 0%,#006DAD 100%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 16px rgba(48,135,204,.28);
}
.brand-text{display:flex;flex-direction:column;line-height:1.1;}
.brand-text strong{font-size:14px;font-weight:600;}
.brand-text span{font-size:10px;color:var(--text-3);letter-spacing:.4px;margin-top:3px;}

.nav-group{padding:16px 12px 8px;flex:1;overflow-y:auto;}
.nav-group-title{
  padding:8px 12px 6px;font-size:11px;color:var(--text-3);
  text-transform:uppercase;letter-spacing:.6px;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:8px;color:var(--text-2);
  font-size:13px;cursor:pointer;transition:all .15s;
  margin-bottom:2px;
}
.nav-item:hover{background:var(--primary-50);color:var(--text-1);}
.nav-item.active{background:var(--primary-light);color:var(--primary);font-weight:500;}
.nav-item.active svg{color:var(--primary);}
.nav-item .badge{
  margin-left:auto;background:var(--danger);color:#fff;font-size:10px;
  padding:1px 6px;border-radius:8px;font-weight:500;
}
.nav-item.active .badge{background:var(--primary);}

.user-card{
  margin:12px;padding:12px;border-radius:10px;
  background:linear-gradient(135deg,#F4FAFE 0%,#E3F1F9 100%);
  display:flex;align-items:center;gap:10px;
}
.user-card .ava{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,#3087CC,#006DAD);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:600;font-size:13px;
}
.user-card .info{flex:1;min-width:0;}
.user-card .info h5{font-size:13px;font-weight:500;}
.user-card .info p{font-size:11px;color:var(--text-3);margin-top:2px;}

/* ====== Main ====== */
.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  height:60px;background:#fff;border-bottom:1px solid var(--border-light);
  padding:0 28px;display:flex;align-items:center;gap:18px;position:sticky;top:0;z-index:10;
}
.crumb{display:flex;align-items:center;gap:6px;color:var(--text-2);font-size:13px;}
.crumb svg{color:var(--text-4);}
.crumb a{color:var(--text-2);transition:color .15s;}
.crumb a:hover{color:var(--primary);}
.search{
  margin-left:24px;width:320px;height:36px;border-radius:8px;
  background:#F4F6FA;display:flex;align-items:center;padding:0 12px;gap:8px;
  border:1px solid transparent;transition:all .15s;
}
.search:focus-within{background:#fff;border-color:var(--primary);}
.search input{flex:1;border:none;outline:none;background:transparent;font-size:13px;color:var(--text-1);}
.search input::placeholder{color:var(--text-4);}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.icon-btn{
  width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  color:var(--text-2);transition:all .15s;position:relative;
}
.icon-btn:hover{background:#F4F6FA;color:var(--text-1);}
.icon-btn .red-dot{
  position:absolute;top:8px;right:8px;width:7px;height:7px;border-radius:50%;
  background:var(--danger);border:2px solid #fff;
}
.topbar-user{
  display:flex;align-items:center;gap:8px;padding:4px 10px 4px 4px;
  border-radius:999px;cursor:pointer;
}
.topbar-user:hover{background:#F4F6FA;}
.topbar-user .ava{
  width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,#3087CC,#006DAD);
  color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;
}
.topbar-user span{font-size:13px;color:var(--text-1);}

/* ====== Page Content ====== */
.page{flex:1;padding:24px 28px;overflow-y:auto;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.page-head h1{font-size:22px;font-weight:600;}
.page-head p{color:var(--text-3);font-size:13px;margin-top:6px;}
.page-actions{display:flex;gap:8px;}

.btn{
  display:inline-flex;align-items:center;gap:6px;
  height:36px;padding:0 14px;border-radius:8px;font-size:13px;font-weight:500;
  transition:all .15s;
}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-dark);box-shadow:0 4px 12px rgba(48,135,204,.28);}
.btn-secondary{background:#fff;color:var(--primary);border:1px solid var(--primary);}
.btn-secondary:hover{background:var(--primary-light);}
.btn-ghost{background:#fff;color:var(--text-2);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary);}
.btn-sm{height:30px;padding:0 10px;font-size:12px;}

/* ====== Layout grids ====== */
.row-2{display:grid;grid-template-columns:1.55fr 1fr;gap:16px;margin-bottom:20px;}

.panel{
  background:#fff;border-radius:14px;padding:22px 24px;
  box-shadow:var(--shadow-sm);
}
.panel-head{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;
}
.panel-head h3{font-size:16px;font-weight:600;}
.panel-head p{font-size:12px;color:var(--text-3);margin-top:2px;}

/* ====== Table ====== */
.table-wrap{
  background:#fff;border-radius:14px;overflow:hidden;
  box-shadow:var(--shadow-sm);
}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{
  background:#F8FAFC;color:var(--text-2);font-weight:500;
  text-align:left;padding:14px 16px;font-size:12px;
  border-bottom:1px solid var(--border-light);
}
tbody td{padding:14px 16px;border-bottom:1px solid var(--border-light);color:var(--text-1);}
tbody tr:hover{background:#FAFBFD;}
tbody tr:last-child td{border-bottom:none;}

/* ====== Category Row ====== */
.cat-tree{display:flex;flex-direction:column;gap:6px;}
.cat-row{
  background:#fff;border:1px solid var(--border-light);border-radius:12px;padding:14px;
  display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;cursor:pointer;
  transition: all .2s;
}
.cat-row:hover{box-shadow:var(--shadow-md);border-color:var(--primary);}
.cat-row.selected{border-color:var(--primary);background:var(--primary-50);box-shadow:0 0 0 2px rgba(48,135,204,0.1);}
.cat-row .cat-bg{
  position:absolute;width:160px;height:160px;border-radius:50%;
  right:-60px;top:-50px;opacity:.06;
}
.cat-ic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cat-text{flex:1;min-width:0;}
.cat-text h6{font-size:14px;font-weight:600;}
.cat-text p{font-size:11px;color:var(--text-3);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cat-meta{font-size:11px;color:var(--text-3);margin-right:8px;}
.cat-actions{display:flex;gap:4px;}

.lib-sub-act{font-size:12px;color:var(--primary);cursor:pointer;}
.lib-sub-act:hover{text-decoration:underline;}
.lib-sub-act.danger{color:var(--danger);}

/* ====== Modal ====== */
.modal-mask{
  position:fixed;inset:0;background:rgba(15,32,55,.42);z-index:100;
  display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;
  transition:opacity .2s;
}
.modal-mask.show{opacity:1;pointer-events:auto;}
.modal{
  background:#fff;border-radius:14px;width:600px;max-width:92vw;
  overflow:hidden;display:flex;flex-direction:column;
  transform:scale(.94);transition:transform .2s;
}
.modal-mask.show .modal{transform:scale(1);}
.modal-head{
  padding:18px 24px;border-bottom:1px solid var(--border-light);
  display:flex;align-items:center;justify-content:space-between;
}
.modal-head h3{font-size:16px;font-weight:600;}
.modal-body{padding:22px 24px;overflow-y:auto;}
.modal-foot{
  padding:14px 24px;border-top:1px solid var(--border-light);
  display:flex;justify-content:flex-end;gap:8px;
}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:14px;}
.form-item{display:flex;flex-direction:column;margin-bottom:14px;}
.form-item label{font-size:12px;color:var(--text-2);margin-bottom:6px;}
.form-item label .req{color:var(--danger);}
.input,.select,textarea{
  width:100%;height:36px;padding:0 12px;border:1px solid var(--border);border-radius:8px;
  font-size:13px;color:var(--text-1);outline:none;transition:all .15s;font-family:inherit;
}
textarea{height:auto;padding:10px 12px;}
.input:focus,.select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(48,135,204,.12);}

/* ====== Toast ====== */
.toast{
  position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);
  background:var(--success-bg);color:var(--success);border:1px solid var(--success-border);
  padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;
  display:flex;align-items:center;gap:8px;z-index:200;
  opacity:0;pointer-events:none;transition:all .25s;
  box-shadow:var(--shadow-lg);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

</style>
</head>
<body>
<aside class="sidebar"></aside>
<main class="main">
  <header class="topbar"></header>
  <div class="page">
    <div class="page-head">
      <div>
        <h1>资料分类管理</h1>
        <p>主分类：课程科目类 / 学涯规划类等；支持子分类动态管理</p>
      </div>
      <div class="page-actions">
        <button class="btn btn-primary" onclick="openAddModal('main')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          新增主分类
        </button>
      </div>
    </div>

    <div class="row-2">
      <div class="panel">
        <div class="panel-head">
          <div><h3>主分类树</h3><p id="mainCatStats">加载中...</p></div>
        </div>
        <div id="mainCatTree" class="cat-tree"></div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <div><h3>子分类</h3><p id="subCatHeader">当前选中：—</p></div>
          <button class="btn btn-primary btn-sm" onclick="openAddModal('sub')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            新增子分类
          </button>
        </div>
        <div class="table-wrap" style="box-shadow:none;border:1px solid var(--border-light);">
          <table>
            <thead>
              <tr>
                <th>子分类名称</th>
                <th>说明</th>
                <th style="width:80px;">资料数</th>
                <th style="width:100px;">操作</th>
              </tr>
            </thead>
            <tbody id="subCatTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- Add/Edit Modal -->
<div class="modal-mask" id="catModal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalTitle">新增分类</h3>
      <button class="icon-btn" onclick="closeModal('catModal')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-item">
          <label>分类层级</label>
          <select class="select" id="catLevel" onchange="onLevelChange()">
            <option value="main">主分类</option>
            <option value="sub">子分类</option>
          </select>
        </div>
        <div class="form-item" id="parentSelectWrap">
          <label>归属主分类</label>
          <select class="select" id="catParent"></select>
        </div>
      </div>
      <div class="form-item">
        <label>分类名称 <span class="req">*</span></label>
        <input class="input" id="catName" placeholder="请输入分类名称" />
      </div>
      <div class="form-item">
        <label>说明</label>
        <textarea id="catDesc" rows="3" placeholder="可选说明..."></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('catModal')">取消</button>
      <button class="btn btn-primary" onclick="saveCategory()">确定</button>
    </div>
  </div>
</div>

  ]}
];

      <div class="brand-logo"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 3 6v6c0 5 4 9 9 10 5-1 9-5 9-10V6l-9-4Z"/><path d="m9 12 2 2 4-4"/></svg></div>

    <nav class="nav-group">${PC_NAV.map((g,i)=>`
      <div class="nav-group-title" ${i>0?'style="margin-top:14px;"':''}>${g.group}</div>
      ${g.items.map(it=>`
        <a class="nav-item ${it.id===activeId?'active':''}" href="${it.href}">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${it.icon}</svg>

  `;
}

function renderTopbar(crumb){
  const tb = document.querySelector('.topbar');
  if(!tb) return;
  tb.innerHTML = `
    <div class="crumb">
      <a href="dashboard.html">首页</a>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      <span>${crumb}</span>
    </div>
    <div class="topbar-right">
      <div class="topbar-user"><div class="ava">王</div><span>王老师</span></div>
    </div>
  `;
}

function showToast(msg){
  let toast = document.getElementById('toast');
  if(!toast){
    toast = document.createElement('div');
    toast.id='toast';toast.className='toast';
    toast.innerHTML=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg><span></span>`;
    document.body.appendChild(toast);
  }
  toast.querySelector('span').textContent=msg;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),2000);
}

function openModal(id){ document.getElementById(id).classList.add('show'); }
function closeModal(id){ document.getElementById(id).classList.remove('show'); }

// ====== Category Management Logic ======
let categories = [
  {id: 1, name: '课程科目类', desc: '立足知新馆辅学义工开设的公共科目', icon: 'book', children: [
    {id: 101, name: '课件 PPT', desc: '各课程精品 PPT', count: 68},
    {id: 102, name: '笔记讲义', desc: '义工整理的讲义', count: 72},
    {id: 103, name: '往年真题', desc: '历年期末真题汇编', count: 52}
  ]},
  {id: 2, name: '学涯规划类', desc: '横向纵向为大学生学涯发展提供专业指南', icon: 'target', children: [
    {id: 201, name: '学年发展篇', desc: '大一至大四规划指导', count: 32},
    {id: 202, name: '资源获取篇', desc: '校园学习资源指南', count: 28}
  ]}
];

let selectedMainId = 1;
let currentEditId = null; // null for add, {mainId, subId} for edit

function init(){
  renderSidebar('library-categories');
  renderTopbar('资料分类管理');
  renderMainTree();
  renderSubTable();
}

function renderMainTree(){
  const container = document.getElementById('mainCatTree');
  const stats = document.getElementById('mainCatStats');
  let subCount = 0;
  
  container.innerHTML = categories.map(cat => {
    subCount += cat.children.length;
    const isSelected = cat.id === selectedMainId;
    return `
      <div class="cat-row ${isSelected ? 'selected' : ''}" onclick="selectMain(${cat.id})">
        <div class="cat-bg" style="background:linear-gradient(135deg,#3087CC,#5BA8DE);"></div>
        <div class="cat-ic" style="background:var(--primary-light);color:var(--primary);">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        </div>
        <div class="cat-text">
          <h6>${cat.name}</h6>
          <p>${cat.desc}</p>
        </div>
        <div class="cat-meta">${cat.children.length} 子类</div>
        <div class="cat-actions">
          <button class="icon-btn btn-sm" onclick="event.stopPropagation();openEditModal(${cat.id})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
          <button class="icon-btn btn-sm" onclick="event.stopPropagation();deleteCategory(${cat.id})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/></svg></button>
        </div>
      </div>
    `;
  }).join('');
  
  stats.textContent = `一级分类 ${categories.length} 个 / 二级分类 ${subCount} 个`;
}

function renderSubTable(){
  const container = document.getElementById('subCatTableBody');
  const header = document.getElementById('subCatHeader');
  const main = categories.find(c => c.id === selectedMainId);
  
  if(!main){
    header.textContent = '当前选中：—';
    container.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:40px;color:var(--text-4);">暂无选中的主分类</td></tr>';
    return;
  }
  
  header.textContent = `当前选中：${main.name}`;
  container.innerHTML = main.children.map(sub => `
    <tr>
      <td><strong>${sub.name}</strong></td>
      <td>${sub.desc}</td>
      <td>${sub.count}</td>
      <td>
        <div class="cat-actions">
          <button class="lib-sub-act" onclick="openEditModal(${main.id}, ${sub.id})">编辑</button>
          <button class="lib-sub-act danger" onclick="deleteCategory(${main.id}, ${sub.id})">删除</button>
        </div>
      </td>
    </tr>
  `).join('') || '<tr><td colspan="4" style="text-align:center;padding:40px;color:var(--text-4);">暂无子分类</td></tr>';
}

function selectMain(id){
  selectedMainId = id;
  renderMainTree();
  renderSubTable();
}

function onLevelChange(){
  const level = document.getElementById('catLevel').value;
  document.getElementById('parentSelectWrap').style.display = level === 'sub' ? 'block' : 'none';
}

function openAddModal(level = 'main'){
  currentEditId = null;
  document.getElementById('modalTitle').textContent = level === 'main' ? '新增主分类' : '新增子分类';
  document.getElementById('catLevel').value = level;
  document.getElementById('catName').value = '';
  document.getElementById('catDesc').value = '';
  
  const parentSel = document.getElementById('catParent');
  parentSel.innerHTML = categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  parentSel.value = selectedMainId;
  
  onLevelChange();
  openModal('catModal');
}

function openEditModal(mainId, subId = null){
  currentEditId = {mainId, subId};
  const main = categories.find(c => c.id === mainId);
  const target = subId ? main.children.find(s => s.id === subId) : main;
  
  document.getElementById('modalTitle').textContent = subId ? '编辑子分类' : '编辑主分类';
  document.getElementById('catLevel').value = subId ? 'sub' : 'main';
  document.getElementById('catName').value = target.name;
  document.getElementById('catDesc').value = target.desc;
  
  const parentSel = document.getElementById('catParent');
  parentSel.innerHTML = categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  parentSel.value = mainId;
  
  onLevelChange();
  openModal('catModal');
}

function saveCategory(){
  const level = document.getElementById('catLevel').value;
  const name = document.getElementById('catName').value.trim();
  const desc = document.getElementById('catDesc').value.trim();
  const parentId = parseInt(document.getElementById('catParent').value);
  
  if(!name){ showToast('请输入分类名称'); return; }
  
  if(currentEditId){
    // Edit
    if(currentEditId.subId){
      const main = categories.find(c => c.id === currentEditId.mainId);
      const sub = main.children.find(s => s.id === currentEditId.subId);
      sub.name = name;
      sub.desc = desc;
      // Handle parent change if needed (optional)
      if(currentEditId.mainId !== parentId){
        main.children = main.children.filter(s => s.id !== sub.id);
        const newMain = categories.find(c => c.id === parentId);
        newMain.children.push(sub);
      }
    } else {
      const main = categories.find(c => c.id === currentEditId.mainId);
      main.name = name;
      main.desc = desc;
    }
    showToast('修改成功');
  } else {
    // Add
    if(level === 'main'){
      const newId = categories.length ? Math.max(...categories.map(c=>c.id)) + 1 : 1;
      categories.push({id: newId, name, desc, children: []});
      selectedMainId = newId;
    } else {
      const main = categories.find(c => c.id === parentId);
      const newId = Date.now(); // Simple unique ID
      main.children.push({id: newId, name, desc, count: 0});
      selectedMainId = parentId;
    }
    showToast('添加成功');
  }
  
  closeModal('catModal');
  renderMainTree();
  renderSubTable();
}

function deleteCategory(mainId, subId = null){
  if(!confirm('确定要删除该分类吗？')) return;
  
  if(subId){
    const main = categories.find(c => c.id === mainId);
    main.children = main.children.filter(s => s.id !== subId);
    showToast('子分类已删除');
  } else {
    categories = categories.filter(c => c.id !== mainId);
    if(selectedMainId === mainId){
      selectedMainId = categories.length ? categories[0].id : null;
    }
    showToast('主分类已删除');
  }
  
  renderMainTree();
  renderSubTable();
}

document.addEventListener('DOMContentLoaded', init);
</script>
