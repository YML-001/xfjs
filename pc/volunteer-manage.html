<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>义工管理 · 学风建设系统</title>
<style>
:root{
  --primary:#3087CC;
  --primary-light:#E3F1F9;
  --primary-dark:#006DAD;
  --primary-50:#F4FAFE;
  --text-1:#3C444F;
  --text-2:#696F7D;
  --text-3:#9096A2;
  --text-4:#ABB0BA;
  --border:#E5E8EE;
  --border-light:#EFF1F5;
  --bg:#F4F6FA;
  --bg-card:#FFFFFF;
  --success:#1BB975;
  --success-bg:#E8FCF4;
  --success-border:#A7F3D0;
  --warning:#F29100;
  --warning-bg:#FFF5E5;
  --warning-border:#FFE0B3;
  --danger:#DF2027;
  --danger-bg:#FCE8EA;
  --danger-border:#F6BCBE;
  --shadow-sm:0 1px 3px rgba(15,32,55,.05);
  --shadow-md:0 4px 14px rgba(15,32,55,.06);
  --shadow-lg:0 12px 32px rgba(15,32,55,.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:"OPPOSans","PingFang SC","Microsoft YaHei",-apple-system,sans-serif;color:var(--text-1);background:var(--bg);-webkit-font-smoothing:antialiased;font-size:14px;}
body{min-height:100vh;display:flex;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
svg{display:block;flex-shrink:0;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:#D9DDE3;border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:#C0C5CD;}
::-webkit-scrollbar-track{background:transparent;}

.sidebar{
  width:232px;flex-shrink:0;background:#fff;
  border-right:1px solid var(--border-light);
  height:100vh;position:sticky;top:0;display:flex;flex-direction:column;
}
.brand{
  padding:20px 20px 16px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid var(--border-light);
}
.brand-logo{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,#3087CC 0%,#006DAD 100%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 16px rgba(48,135,204,.28);
}
.brand-text{display:flex;flex-direction:column;line-height:1.1;}
.brand-text strong{font-size:14px;font-weight:600;}
.brand-text span{font-size:10px;color:var(--text-3);letter-spacing:.4px;margin-top:3px;}

.nav-group{padding:16px 12px 8px;flex:1;overflow-y:auto;}
.nav-group-title{
  padding:8px 12px 6px;font-size:11px;color:var(--text-3);
  text-transform:uppercase;letter-spacing:.6px;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:8px;color:var(--text-2);
  font-size:13px;cursor:pointer;transition:all .15s;
  margin-bottom:2px;
}
.nav-item:hover{background:var(--primary-50);color:var(--text-1);}
.nav-item.active{background:var(--primary-light);color:var(--primary);font-weight:500;}
.nav-item.active svg{color:var(--primary);}
.nav-item .badge{
  margin-left:auto;background:var(--danger);color:#fff;font-size:10px;
  padding:1px 6px;border-radius:8px;font-weight:500;
}
.nav-item.active .badge{background:var(--primary);}

.user-card{
  margin:12px;padding:12px;border-radius:10px;
  background:linear-gradient(135deg,#F4FAFE 0%,#E3F1F9 100%);
  display:flex;align-items:center;gap:10px;
}
.user-card .ava{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,#3087CC,#006DAD);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:600;font-size:13px;
}
.user-card .info{flex:1;min-width:0;}
.user-card .info h5{font-size:13px;font-weight:500;}
.user-card .info p{font-size:11px;color:var(--text-3);margin-top:2px;}

.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  height:60px;background:#fff;border-bottom:1px solid var(--border-light);
  padding:0 28px;display:flex;align-items:center;gap:18px;position:sticky;top:0;z-index:10;
}
.crumb{display:flex;align-items:center;gap:6px;color:var(--text-2);font-size:13px;}
.crumb svg{color:var(--text-4);}
.crumb a{color:var(--text-2);transition:color .15s;}
.crumb a:hover{color:var(--primary);}
.search{
  margin-left:24px;width:320px;height:36px;border-radius:8px;
  background:#F4F6FA;display:flex;align-items:center;padding:0 12px;gap:8px;
  border:1px solid transparent;transition:all .15s;
}
.search:focus-within{background:#fff;border-color:var(--primary);}
.search input{flex:1;border:none;outline:none;background:transparent;font-size:13px;color:var(--text-1);}
.search input::placeholder{color:var(--text-4);}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.icon-btn{
  width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  color:var(--text-2);transition:all .15s;position:relative;
}
.icon-btn:hover{background:#F4F6FA;color:var(--text-1);}
.icon-btn .red-dot{
  position:absolute;top:8px;right:8px;width:7px;height:7px;border-radius:50%;
  background:var(--danger);border:2px solid #fff;
}
.topbar-user{
  display:flex;align-items:center;gap:8px;padding:4px 10px 4px 4px;
  border-radius:999px;cursor:pointer;
}
.topbar-user:hover{background:#F4F6FA;}
.topbar-user .ava{
  width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,#3087CC,#006DAD);
  color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;
}
.topbar-user span{font-size:13px;color:var(--text-1);}

.page{flex:1;padding:24px 28px;overflow-y:auto;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.page-head h1{font-size:22px;font-weight:600;}
.page-head p{color:var(--text-3);font-size:13px;margin-top:6px;}
.page-actions{display:flex;gap:8px;}

.btn{
  display:inline-flex;align-items:center;gap:6px;
  height:36px;padding:0 14px;border-radius:8px;font-size:13px;font-weight:500;
  transition:all .15s;
}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-dark);box-shadow:0 4px 12px rgba(48,135,204,.28);}
.btn-ghost{background:#fff;color:var(--text-2);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary);}
.btn-sm{height:30px;padding:0 10px;font-size:12px;}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px;}
.stat-card{
  background:#fff;border-radius:14px;padding:20px 22px;
  position:relative;overflow:hidden;
  box-shadow:var(--shadow-sm);
}
.stat-card .blob{
  position:absolute;width:140px;height:140px;border-radius:50%;
  right:-40px;top:-40px;opacity:.35;
}
.stat-card .blob-1{background:radial-gradient(circle,#BFDDF6,transparent 65%);}
.stat-card .blob-2{background:radial-gradient(circle,#FFE0B3,transparent 65%);}
.stat-card .blob-3{background:radial-gradient(circle,#A7F3D0,transparent 65%);}
.stat-card .blob-4{background:radial-gradient(circle,#F6BCBE,transparent 65%);}
.stat-card .ic{
  width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  margin-bottom:14px;
}
.stat-card .label{font-size:13px;color:var(--text-2);}
.stat-card .num{
  font-size:28px;font-weight:700;margin-top:4px;letter-spacing:-.5px;
  display:flex;align-items:baseline;gap:6px;
}
.stat-card .num small{font-size:13px;color:var(--text-3);font-weight:400;}

.tag{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:4px;font-size:12px;font-weight:500;
  background:var(--primary-light);color:var(--primary);border:1px solid #BFDDF6;
}
.tag-success{background:var(--success-bg);color:var(--success);border-color:var(--success-border);}
.tag-warning{background:var(--warning-bg);color:var(--warning);border-color:var(--warning-border);}
.tag-danger{background:var(--danger-bg);color:var(--danger);border-color:var(--danger-border);}
.tag-grey{background:#F1F2F3;color:var(--text-3);border-color:var(--border);}

.filterbar{
  background:#fff;border-radius:14px;padding:16px 20px;margin-bottom:16px;
  display:flex;flex-wrap:nowrap;gap:12px;align-items:center;
  box-shadow:var(--shadow-sm);
}
.filterbar .field{display:flex;align-items:center;gap:6px;}
.filterbar label{font-size:13px;color:var(--text-2);white-space:nowrap;}
.input,.select{
  height:34px;padding:0 12px;border:1px solid var(--border);border-radius:8px;
  font-size:13px;color:var(--text-1);background:#fff;outline:none;min-width:0;
  transition:all .15s;font-family:inherit;
}
.input:focus,.select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(48,135,204,.12);}
.filterbar .spacer{flex:1;}

.table-wrap{
  background:#fff;border-radius:14px;overflow:hidden;
  box-shadow:var(--shadow-sm);
}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{
  background:#F8FAFC;color:var(--text-2);font-weight:500;
  text-align:left;padding:14px 16px;font-size:12px;
  border-bottom:1px solid var(--border-light);white-space:nowrap;
}
tbody td{padding:14px 16px;border-bottom:1px solid var(--border-light);color:var(--text-1);white-space:nowrap;}
tbody tr:hover{background:#FAFBFD;}
tbody tr:last-child td{border-bottom:none;}
.table-scroll{overflow-x:auto;}

.table-foot{
  padding:14px 16px;display:flex;align-items:center;justify-content:space-between;
  border-top:1px solid var(--border-light);
}
.table-foot .count{color:var(--text-3);font-size:12px;}
.pager{display:flex;align-items:center;gap:4px;}
.pager button{
  min-width:30px;height:30px;padding:0 8px;border-radius:6px;font-size:12px;color:var(--text-2);
}
.pager button:hover:not(:disabled){background:#F4F6FA;color:var(--text-1);}
.pager button.active{background:var(--primary);color:#fff;}
.pager button:disabled{opacity:.4;cursor:not-allowed;}

.modal-mask{
  position:fixed;inset:0;background:rgba(15,32,55,.42);z-index:100;
  display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;
  transition:opacity .2s;
}
.modal-mask.show{opacity:1;pointer-events:auto;}
.modal{
  background:#fff;border-radius:14px;width:960px;max-width:94vw;max-height:90vh;
  overflow:hidden;display:flex;flex-direction:column;
  transform:scale(.94);transition:transform .2s;
}
.modal-mask.show .modal{transform:scale(1);}
.modal-head{
  padding:18px 24px;border-bottom:1px solid var(--border-light);
  display:flex;align-items:center;justify-content:space-between;
}
.modal-head h3{font-size:16px;font-weight:600;}
.modal-body{padding:22px 24px;overflow-y:auto;flex:1;}
.modal-foot{
  padding:14px 24px;border-top:1px solid var(--border-light);
  display:flex;justify-content:flex-end;gap:8px;
}

.detail-banner{
  background:linear-gradient(135deg,#3087CC,#006DAD);color:#fff;
  padding:24px 28px 20px;border-radius:12px;margin-bottom:20px;position:relative;overflow:hidden;
}
.detail-banner::before{
  content:"";position:absolute;width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.12),transparent 65%);right:-40px;top:-60px;
}
.detail-banner h2{font-size:20px;font-weight:700;position:relative;}
.detail-banner .sub{font-size:13px;opacity:.85;margin-top:4px;position:relative;}
.detail-banner .meta-row{
  display:flex;flex-wrap:nowrap;gap:14px;margin-top:16px;position:relative;
}
.detail-banner .meta-row .item{flex:1;min-width:0;}
.detail-banner .meta-row .item{font-size:12px;}
.detail-banner .meta-row .item .lbl{opacity:.7;margin-bottom:2px;}
.detail-banner .meta-row .item .val{font-weight:600;font-size:14px;}

.detail-tabs{
  display:flex;background:#F4F6FA;border-radius:10px;padding:4px;margin-bottom:20px;gap:4px;
}
.detail-tabs button{
  height:34px;padding:0 18px;border-radius:7px;font-size:13px;color:var(--text-2);font-weight:500;
  transition:all .15s;
}
.detail-tabs button.active{background:#fff;color:var(--primary);box-shadow:var(--shadow-sm);}

.detail-panel{display:none;}
.detail-panel.active{display:block;}

.detail-section{margin-bottom:20px;}
.detail-section h4{
  font-size:14px;font-weight:600;margin-bottom:12px;padding-bottom:8px;
  border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:8px;
}
.detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px 24px;}
.detail-item{display:flex;gap:8px;font-size:13px;}
.detail-item .dt{color:var(--text-3);min-width:70px;flex-shrink:0;}
.detail-item .dd{color:var(--text-1);word-break:break-all;}

.inner-table{width:100%;border-collapse:collapse;font-size:13px;border:1px solid var(--border-light);border-radius:8px;overflow:hidden;}
.inner-table thead th{background:#F8FAFC;color:var(--text-2);font-weight:500;text-align:left;padding:10px 14px;font-size:12px;border-bottom:1px solid var(--border-light);}
.inner-table tbody td{padding:10px 14px;border-bottom:1px solid var(--border-light);color:var(--text-1);}
.inner-table tbody tr:last-child td{border-bottom:none;}
.inner-table tbody tr:hover{background:#FAFBFD;}

.empty-state{text-align:center;padding:40px 20px;color:var(--text-4);font-size:13px;}

.toast{
  position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);
  background:#fff;border:1px solid var(--success-border);background:var(--success-bg);color:var(--success);
  padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;
  display:flex;align-items:center;gap:8px;z-index:200;
  opacity:0;pointer-events:none;transition:all .25s;
  box-shadow:var(--shadow-lg);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.stars-display{display:inline-flex;gap:2px;}
.stars-display svg{width:14px;height:14px;}

.checkbox{width:16px;height:16px;border:1.5px solid var(--border);border-radius:4px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;position:relative;transition:all .15s;flex-shrink:0;}
.checkbox:hover{border-color:var(--primary);}
.checkbox.checked{background:var(--primary);border-color:var(--primary);}
.checkbox.checked::after{
  content:"";width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-2px;
}

.sub-detail-mask{
  position:fixed;inset:0;background:rgba(15,32,55,.5);z-index:150;
  display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;
  transition:opacity .2s;
}
.preview-mask{
  position:fixed;inset:0;background:rgba(15,32,55,.55);z-index:200;
  display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;
  transition:opacity .2s;
}
.preview-mask.show{opacity:1;pointer-events:auto;}
.preview-modal{
  background:#fff;border-radius:14px;width:900px;max-width:96vw;max-height:90vh;
  overflow:hidden;display:flex;flex-direction:column;
  transform:scale(.94);transition:transform .2s;
}
.preview-mask.show .preview-modal{transform:scale(1);}
.preview-head{
  padding:16px 24px;border-bottom:1px solid var(--border-light);
  display:flex;align-items:center;justify-content:space-between;
}
.preview-head h3{font-size:16px;font-weight:600;}
.preview-body{flex:1;overflow-y:auto;padding:0;background:#E8EAED;}
.preview-foot{padding:14px 24px;border-top:1px solid var(--border-light);display:flex;justify-content:flex-end;gap:8px;}
.sub-detail-mask.show{opacity:1;pointer-events:auto;}
.sub-detail{
  background:#fff;border-radius:14px;width:720px;max-width:92vw;max-height:85vh;
  overflow:hidden;display:flex;flex-direction:column;
  transform:scale(.94);transition:transform .2s;
}
.sub-detail-mask.show .sub-detail{transform:scale(1);}
.sub-detail-head{
  padding:18px 24px;border-bottom:1px solid var(--border-light);
  display:flex;align-items:center;justify-content:space-between;
}
.sub-detail-head h3{font-size:16px;font-weight:600;}
.sub-detail-body{padding:22px 24px;overflow-y:auto;flex:1;}
.sub-detail-foot{
  padding:14px 24px;border-top:1px solid var(--border-light);
  display:flex;justify-content:flex-end;gap:8px;
}

.info-hero{
  background:linear-gradient(135deg,#3087CC,#006DAD);color:#fff;
  border-radius:12px;padding:20px 24px;margin-bottom:18px;position:relative;overflow:hidden;
}
.info-hero::before{
  content:"";position:absolute;width:180px;height:180px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.12),transparent 65%);right:-30px;top:-50px;
}
.info-hero h4{font-size:16px;font-weight:600;position:relative;}
.info-hero .sub{font-size:12px;opacity:.85;margin-top:4px;position:relative;}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 24px;margin-bottom:16px;}
.info-grid .fi{display:flex;flex-direction:column;}
.info-grid .fi .fl{font-size:12px;color:var(--text-3);margin-bottom:3px;}
.info-grid .fi .fv{font-size:13px;color:var(--text-1);font-weight:500;}
.info-grid .fi.full{grid-column:1/-1;}

.info-block{background:var(--bg);border-radius:10px;padding:14px 16px;font-size:13px;line-height:1.8;color:var(--text-1);margin-bottom:14px;}

.act-link{color:var(--primary);font-weight:500;cursor:pointer;font-size:12px;}
.act-link:hover{text-decoration:underline;color:var(--primary-dark);}

.detail-tab-btn{
  height:34px;padding:0 18px;border-radius:7px;font-size:13px;color:var(--text-2);font-weight:500;
  transition:all .15s;background:none;border:none;cursor:pointer;
}
.detail-tab-btn.active{background:#fff;color:var(--primary);box-shadow:var(--shadow-sm);}
</style>
</head>
<body>

<aside class="sidebar"></aside>

<div class="main">
  <header class="topbar">
    <div class="crumb">
      <a href="dashboard.html">首页</a>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
      <span>辅学义工</span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
      <span style="color:var(--text-1);font-weight:500;">义工管理</span>
    </div>
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="搜索义工姓名、学号…" />
    </div>
    <div class="topbar-right">
      <button class="icon-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="red-dot"></span>
      </button>
      <div class="topbar-user">
        <div class="ava">王</div>
        <span>王老师</span>
      </div>
    </div>
  </header>

  <div class="page">
    <div class="page-head">
      <div>
        <h1>义工管理</h1>
        <p>查看所有辅学义工的综合信息，包括上课记录、回答问题情况、上传资料情况</p>
      </div>
      <div class="page-actions">
        <button class="btn btn-primary" id="btnExportSelected" onclick="exportSelected()" style="display:none;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          导出选中 (<span id="selectedCount">0</span>)
        </button>
        <button class="btn btn-ghost" onclick="showToast('正在导出全部…')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          全部导出
        </button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="blob blob-1"></div>
        <div class="ic" style="background:var(--primary-light);color:var(--primary);">

function calcTotalPoints(d){
  if(!d.pointsLog) return 0;
  const earned = d.pointsLog.reduce((s,x)=>s+x.points, 0);
  const deducted = (d.pointsDeductions||[]).reduce((s,x)=>s+x.amount, 0);
  return earned - deducted;
}

let currentData = [...volunteerData];
let selectedIds = new Set();

function renderStars(n){
  let html = '<span class="stars-display">';
  for(let i=0;i<5;i++){
    html += `<svg viewBox="0 0 24 24" fill="${i<n?'#FFC53D':'#E5E8EE'}" stroke="none"><polygon points="12 2 15 8.5 22 9.3 17 14 18.5 21 12 17.7 5.5 21 7 14 2 9.3 9 8.5"/></svg>`;
  }
  return html+'</span>';
}

function getStatusTag(s){
  if(s==='在任') return '<span class="tag tag-success">在任</span>';
  return '<span class="tag tag-grey">离任</span>';
}

function resetFilter(){
  document.getElementById('fCat').value='';
  document.getElementById('fStar').value='';
  document.getElementById('fStatus').value='';
  document.getElementById('fKw').value='';
  renderTable();
}

function toggleCheck(id){
  if(selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  updateCheckboxUI();
}

function toggleAll(){
  const allEl = document.getElementById('checkAll');
  if(selectedIds.size === currentData.length){
    selectedIds.clear();
  } else {
    currentData.forEach(d=>selectedIds.add(d.id));
  }
  updateCheckboxUI();
}

function updateCheckboxUI(){
  const count = selectedIds.size;
  document.querySelectorAll('#tableBody .checkbox').forEach(cb=>{
    const id = cb.dataset.id;
    cb.classList.toggle('checked', selectedIds.has(id));
  });
  const allEl = document.getElementById('checkAll');
  allEl.classList.toggle('checked', count>0 && count===currentData.length);
  document.getElementById('footSelected').textContent = count;
  document.getElementById('selectedCount').textContent = count;
  document.getElementById('btnExportSelected').style.display = count>0?'inline-flex':'none';
}

function exportSelected(){
  showToast(`已导出 ${selectedIds.size} 条义工数据`);
}

function renderTable(){
  const cat = document.getElementById('fCat').value;
  const star = document.getElementById('fStar').value;
  const status = document.getElementById('fStatus').value;
  const kw = document.getElementById('fKw').value.trim().toLowerCase();

  currentData = volunteerData.filter(d=>{
    if(cat && d.category!==cat) return false;
    if(star && d.star!==parseInt(star)) return false;
    if(status && d.status!==status) return false;
    if(kw && !d.name.toLowerCase().includes(kw) && !d.sid.includes(kw)) return false;
    return true;
  });

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = currentData.map(d=>`
    <tr>
      <td><span class="checkbox ${selectedIds.has(d.id)?'checked':''}" data-id="${d.id}" onclick="toggleCheck('${d.id}')"></span></td>
      <td style="font-weight:500;">${d.name}</td>
      <td style="color:var(--text-2);">${d.sid}</td>
      <td>${d.college} / ${d.major}</td>
      <td><span class="tag">${d.category}</span></td>
      <td>${renderStars(d.star)}</td>
      <td style="font-weight:500;">${d.hours}<small style="color:var(--text-3);font-weight:400;"> h</small></td>
      <td style="font-weight:500;">${d.qaCount}<small style="color:var(--text-3);font-weight:400;"> 次</small></td>
      <td style="font-weight:500;">${d.uploadCount}<small style="color:var(--text-3);font-weight:400;"> 份</small></td>
      <td style="font-weight:500;">${d.category==='知新馆辅学义工'?`${calcTotalPoints(d)}<small style="color:var(--text-3);font-weight:400;"> 分</small>`:'<span style="color:var(--text-4);">—</span>'}</td>
      <td>${getStatusTag(d.status)}</td>
      <td style="display:flex;align-items:center;gap:14px;">
        <a href="javascript:void(0)" onclick="openDetail('${d.id}')" style="color:var(--primary);font-weight:500;">详情</a>
        ${d.status==='在任'?`<a href="javascript:void(0)" onclick="vmRemove('${d.id}')" style="color:var(--danger);font-weight:500;">移出</a>`:''}
        ${d.status==='离任'?`<a href="javascript:void(0)" onclick="vmRestore('${d.id}')" style="color:var(--success);font-weight:500;">恢复</a>`:''}
      </td>
    </tr>
  `).join('');

  document.getElementById('tableCount').innerHTML = `共 ${currentData.length} 条，已选择 <strong id="footSelected">${selectedIds.size}</strong> 条`;
  updateCheckboxUI();
}

let _currentDetailId = '';

function openDetail(id){
  const d = volunteerData.find(x=>x.id===id);
  if(!d) return;
  _currentDetailId = id;

function switchDetailTab(tab){
  document.querySelectorAll('#detailTabs button').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.detail-panel').forEach(p=>p.classList.remove('active'));
  const btn = [...document.querySelectorAll('#detailTabs button')]
    .find(b=>b.getAttribute('onclick')===`switchDetailTab('${tab}')`);
  if(btn) btn.classList.add('active');
  const panel = document.getElementById('panel-'+tab);
  if(panel) panel.classList.add('active');
}

function closeModal(){
  document.getElementById('detailModal').classList.remove('show');
}

function closeSubDetail(){
  document.getElementById('subDetailModal').classList.remove('show');
}

let _classDetailTab = 'info';

function deductPoints(volId){
  const d = volunteerData.find(x=>x.id===volId);
  if(!d) return;
  const amountEl = document.getElementById('deductAmount');
  const reasonEl = document.getElementById('deductReason');
  const amount = parseInt(amountEl.value);
  const reason = (reasonEl.value||'').trim();
  const current = calcTotalPoints(d);
  if(!amount || amount <= 0){ showToast('请输入有效的扣除数量'); return; }
  if(amount > current){ showToast('扣除积分不能超过当前可兑换积分（'+current+' 分）'); return; }
  if(!reason){ showToast('请填写扣除说明'); return; }
  const today = new Date().toISOString().slice(0,10);
  const remaining = current - amount;
  d.pointsDeductions.push({date:today, amount, reason, remaining});
  amountEl.value = '';
  reasonEl.value = '';
  // 刷新积分汇总数值
  const newTotal = calcTotalPoints(d);
  const summaryEl = document.getElementById('pointsSummary');
  if(summaryEl) summaryEl.textContent = newTotal;
  const bannerEl = document.getElementById('bannerPoints');
  if(bannerEl) bannerEl.textContent = newTotal + ' 分';
  // 刷新扣除记录区域
  const histEl = document.getElementById('deductHistory');
  if(histEl){
    if(d.pointsDeductions.length){
      histEl.innerHTML = `<div style="font-size:13px;font-weight:600;color:var(--text-1);margin-bottom:8px;">扣除记录</div>
      <table class="inner-table">
        <thead><tr><th>日期</th><th>扣除积分</th><th>说明</th><th>剩余积分</th></tr></thead>
        <tbody>${d.pointsDeductions.map(x=>`
          <tr>
            <td>${x.date}</td>
            <td style="color:var(--danger);font-weight:600;">-${x.amount}</td>
            <td>${x.reason}</td>
            <td style="font-weight:600;">${x.remaining}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
    }
  }
  // 刷新列表行
  renderTable();
  showToast('已扣除 '+amount+' 积分，剩余 '+remaining+' 分');
}

function getUploadMeta(r, d){
  const courseMap = {
    'PDF': {major:'课程科目类',minor:'复习资料 PDF',course:'高等数学A',keywords:['高数','期末','复习'],intro:'系统梳理课程重点知识，涵盖核心公式推导与典型例题解析，适合期末复习使用。'},
    'PPT': {major:'课程科目类',minor:'课件 PPT',course:'大学英语六级',keywords:['六级','写作','模版'],intro:'六级写作结构与常用句式模版，附真题范文解析。'},
    'DOC': {major:'学习方法类',minor:'笔记文档 DOC',course:'线性代数',keywords:['线代','笔记','总结'],intro:'课堂笔记精编，包含知识框架、定理证明及典型题型归纳。'},
    'XLS': {major:'工具资源类',minor:'数据表格 XLS',course:'概率论与数理统计',keywords:['概率','公式','速查'],intro:'概率论常用公式与分布表速查，方便考试复习与日常查阅。'},
  };
  const meta = courseMap[r.type] || {major:'其他资料',minor:r.type+' 文档',course:'通识课程',keywords:['学习','资料'],intro:'辅学义工整理的学习参考资料。'};
  const roleLabel = d.category || '知新馆辅学义工';
  const srcGroup = d.college ? d.college.replace('学院','组') : '知新馆学习组';
  return {
    major: meta.major,
    minor: meta.minor,
    course: meta.course,
    role: roleLabel,
    time: '14:05',
    source: srcGroup,
    version: 'v2026.03',
    keywords: meta.keywords,
    intro: meta.intro,
    likes: Math.floor(r.downloads * 0.21 + 10),
  };
}

function openUploadPreview(volId, idx){
  const d = volunteerData.find(x=>x.id===volId);
  if(!d) return;
  const r = d.uploadRecords[idx];
  if(!r) return;
  const meta = getUploadMeta(r, d);
  const fileName = r.title + '.' + r.type.toLowerCase();

  document.getElementById('uploadPreviewTitle').textContent = '资料预览';
  document.getElementById('uploadPreviewBody').innerHTML = `
    <div style="padding:20px;max-height:72vh;overflow-y:auto;background:#E8EAED;">
      <div style="max-width:720px;margin:0 auto;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.1);border-radius:6px;padding:40px 44px;min-height:380px;">
        <div style="font-size:11px;color:#888;margin-bottom:18px;">${fileName} · ${meta.version} · ${r.size}</div>
        <h1 style="font-size:18px;font-weight:600;margin:0 0 12px;line-height:1.45;color:#1a1a1a;">${r.title}</h1>
        <p style="font-size:12px;color:#64748b;margin:0 0 20px;">当前预览文件：<strong style="color:#1a1a1a;">${fileName}</strong></p>
        <div style="font-size:14px;line-height:1.9;color:#333;white-space:pre-wrap;">${meta.intro}</div>
        <div style="margin-top:28px;padding:14px;background:#F8FAFC;border-radius:8px;font-size:13px;color:#475569;">
          <strong>资料信息：</strong>所属课程「${meta.course}」，分类「${meta.major} / ${meta.minor}」，由 ${d.name}（${meta.role}）上传于 ${r.date}。
          共获得 ${meta.likes} 个点赞，${r.downloads} 次下载。
        </div>
        <div style="margin-top:32px;padding-top:20px;border-top:1px dashed #ddd;font-size:13px;color:#64748b;">
          <p style="margin:0;line-height:1.65;">（演示）此处为「${fileName}」的在线预览占位。正式环境可对接 PDF.js、Word 在线预览或对象存储直链。</p>
          <p style="margin:12px 0 0;">当前文件格式：${r.type} · 上传者：${d.name} · ${meta.role}</p>
        </div>
      </div>
    </div>
  `;
  document.getElementById('uploadPreviewModal').classList.add('show');
}

function closeUploadPreview(){
  document.getElementById('uploadPreviewModal').classList.remove('show');
}

function showToast(msg){
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ===== 移出 / 恢复 =====
const vmRemovalRecords = {};

function openVmModal(id){ document.getElementById(id).classList.add('show'); }
function closeVmModal(id){ document.getElementById(id).classList.remove('show'); }

function vmRemove(id){
  const d = volunteerData.find(x=>x.id===id);
  if(!d) return;
  document.getElementById('vmRemoveId').value = id;
  document.getElementById('vmRemoveName').textContent = d.name + '（' + d.sid + '）';
  document.getElementById('vmRemoveReason').value = '';
  document.getElementById('vmRemoveRemark').value = '';
  openVmModal('vmRemoveModal');
}

function confirmVmRemove(){
  const id = document.getElementById('vmRemoveId').value;
  const reason = document.getElementById('vmRemoveReason').value;
  const remark = document.getElementById('vmRemoveRemark').value.trim();
  if(!reason){ showToast('请选择移出原因'); return; }
  const d = volunteerData.find(x=>x.id===id);
  if(d){
    d.status = '离任';
    vmRemovalRecords[id] = {reason, remark: remark||'无', date: new Date().toISOString().slice(0,10), operator:'管理员'};
  }
  closeVmModal('vmRemoveModal');
  showToast('已移出该义工');
  renderTable();
}

function vmRestore(id){
  const d = volunteerData.find(x=>x.id===id);
  if(!d) return;
  const rec = vmRemovalRecords[id] || {reason:'长期未活跃', remark:'由系统自动标记为离任', date:'2026-03-01', operator:'系统'};
  document.getElementById('vmRestoreId').value = id;
  document.getElementById('vmRestoreName').textContent = d.name + '（' + d.sid + '）';
  document.getElementById('vmRestoreReason').textContent = rec.reason;
  document.getElementById('vmRestoreRemark').textContent = rec.remark;
  document.getElementById('vmRestoreDate').textContent = rec.date;
  document.getElementById('vmRestoreOperator').textContent = rec.operator;

  openVmModal('vmRestoreModal');
}

function confirmVmRestore(){
  const id = document.getElementById('vmRestoreId').value;
  const d = volunteerData.find(x=>x.id===id);
  if(d){ d.status = '在任'; }
  closeVmModal('vmRestoreModal');
  showToast('义工身份已恢复，相关权限已开启');
  renderTable();
}

renderSidebar('volunteer-manage');
renderTable();
</script>
