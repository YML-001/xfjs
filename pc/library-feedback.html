<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>资料征集与需求池 · 学风建设系统</title>
<style>
:root{
  --primary:#3087CC;
  --primary-light:#E3F1F9;
  --primary-dark:#006DAD;
  --primary-50:#F4FAFE;
  --text-1:#3C444F;
  --text-2:#696F7D;
  --text-3:#9096A2;
  --text-4:#ABB0BA;
  --border:#E5E8EE;
  --border-light:#EFF1F5;
  --bg:#F4F6FA;
  --bg-card:#FFFFFF;
  --success:#1BB975;
  --success-bg:#E8FCF4;
  --success-border:#A7F3D0;
  --warning:#F29100;
  --warning-bg:#FFF5E5;
  --warning-border:#FFE0B3;
  --danger:#DF2027;
  --danger-bg:#FCE8EA;
  --danger-border:#F6BCBE;
  --shadow-sm:0 1px 3px rgba(15,32,55,.05);
  --shadow-md:0 4px 14px rgba(15,32,55,.06);
  --shadow-lg:0 12px 32px rgba(15,32,55,.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:"OPPOSans","PingFang SC","Microsoft YaHei",-apple-system,sans-serif;color:var(--text-1);background:var(--bg);-webkit-font-smoothing:antialiased;font-size:14px;}
body{min-height:100vh;display:flex;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
svg{display:block;flex-shrink:0;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:#D9DDE3;border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:#C0C5CD;}
::-webkit-scrollbar-track{background:transparent;}

/* ====== Sidebar ====== */
.sidebar{
  width:232px;flex-shrink:0;background:#fff;
  border-right:1px solid var(--border-light);
  height:100vh;position:sticky;top:0;display:flex;flex-direction:column;
}
.brand{
  padding:20px 20px 16px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid var(--border-light);
}
.brand-logo{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,#3087CC 0%,#006DAD 100%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 16px rgba(48,135,204,.28);
}
.brand-text{display:flex;flex-direction:column;line-height:1.1;}
.brand-text strong{font-size:14px;font-weight:600;}
.brand-text span{font-size:10px;color:var(--text-3);letter-spacing:.4px;margin-top:3px;}

.nav-group{padding:16px 12px 8px;flex:1;overflow-y:auto;}
.nav-group-title{
  padding:8px 12px 6px;font-size:11px;color:var(--text-3);
  text-transform:uppercase;letter-spacing:.6px;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:8px;color:var(--text-2);
  font-size:13px;cursor:pointer;transition:all .15s;
  margin-bottom:2px;
}
.nav-item:hover{background:var(--primary-50);color:var(--text-1);}
.nav-item.active{background:var(--primary-light);color:var(--primary);font-weight:500;}
.nav-item.active svg{color:var(--primary);}
.nav-item .badge{
  margin-left:auto;background:var(--danger);color:#fff;font-size:10px;
  padding:1px 6px;border-radius:8px;font-weight:500;
}
.nav-item.active .badge{background:var(--primary);}

.user-card{
  margin:12px;padding:12px;border-radius:10px;
  background:linear-gradient(135deg,#F4FAFE 0%,#E3F1F9 100%);
  display:flex;align-items:center;gap:10px;
}
.user-card .ava{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,#3087CC,#006DAD);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:600;font-size:13px;
}
.user-card .info{flex:1;min-width:0;}
.user-card .info h5{font-size:13px;font-weight:500;}
.user-card .info p{font-size:11px;color:var(--text-3);margin-top:2px;}

/* ====== Main ====== */
.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  height:60px;background:#fff;border-bottom:1px solid var(--border-light);
  padding:0 28px;display:flex;align-items:center;gap:18px;position:sticky;top:0;z-index:10;
}
.crumb{display:flex;align-items:center;gap:6px;color:var(--text-2);font-size:13px;}
.crumb svg{color:var(--text-4);}
.crumb a{color:var(--text-2);transition:color .15s;}
.crumb a:hover{color:var(--primary);}
.search{
  margin-left:24px;width:320px;height:36px;border-radius:8px;
  background:#F4F6FA;display:flex;align-items:center;padding:0 12px;gap:8px;
  border:1px solid transparent;transition:all .15s;
}
.search:focus-within{background:#fff;border-color:var(--primary);}
.search input{flex:1;border:none;outline:none;background:transparent;font-size:13px;color:var(--text-1);}
.search input::placeholder{color:var(--text-4);}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.icon-btn{
  width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  color:var(--text-2);transition:all .15s;position:relative;
}
.icon-btn:hover{background:#F4F6FA;color:var(--text-1);}
.icon-btn .red-dot{
  position:absolute;top:8px;right:8px;width:7px;height:7px;border-radius:50%;
  background:var(--danger);border:2px solid #fff;
}
.topbar-user{
  display:flex;align-items:center;gap:8px;padding:4px 10px 4px 4px;
  border-radius:999px;cursor:pointer;
}
.topbar-user:hover{background:#F4F6FA;}
.topbar-user .ava{
  width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,#3087CC,#006DAD);
  color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;
}
.topbar-user span{font-size:13px;color:var(--text-1);}

/* ====== Page Content ====== */
.page{flex:1;padding:24px 28px;overflow-y:auto;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.page-head h1{font-size:22px;font-weight:600;}
.page-head p{color:var(--text-3);font-size:13px;margin-top:6px;}
.page-actions{display:flex;gap:8px;}

.btn{
  display:inline-flex;align-items:center;gap:6px;
  height:36px;padding:0 14px;border-radius:8px;font-size:13px;font-weight:500;
  transition:all .15s;
}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-dark);box-shadow:0 4px 12px rgba(48,135,204,.28);}
.btn-secondary{background:#fff;color:var(--primary);border:1px solid var(--primary);}
.btn-secondary:hover{background:var(--primary-light);}
.btn-ghost{background:#fff;color:var(--text-2);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary);}
.btn-sm{height:30px;padding:0 10px;font-size:12px;}

/* ====== Stat Cards ====== */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px;}
.stats-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px;}
.stat-card{
  background:#fff;border-radius:14px;padding:20px 22px;
  position:relative;overflow:hidden;
  box-shadow:var(--shadow-sm);
}
.stat-card .blob{
  position:absolute;width:140px;height:140px;border-radius:50%;
  right:-40px;top:-40px;opacity:.35;
}
.stat-card .blob-1{background:radial-gradient(circle,#BFDDF6,transparent 65%);}
.stat-card .blob-2{background:radial-gradient(circle,#FFE0B3,transparent 65%);}
.stat-card .blob-3{background:radial-gradient(circle,#A7F3D0,transparent 65%);}
.stat-card .blob-4{background:radial-gradient(circle,#F6BCBE,transparent 65%);}
.stat-card .ic{
  width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  margin-bottom:14px;
}
.stat-card .label{font-size:13px;color:var(--text-2);}
.stat-card .num{
  font-size:28px;font-weight:700;margin-top:4px;letter-spacing:-.5px;
  display:flex;align-items:baseline;gap:6px;
}
.stat-card .num small{font-size:13px;color:var(--text-3);font-weight:400;}
.stat-card .delta{
  font-size:12px;margin-top:8px;display:flex;align-items:center;gap:4px;
}
.delta.up{color:var(--success);}
.delta.down{color:var(--danger);}
.delta.neutral{color:var(--text-3);}

/* ====== Layout grids ====== */
.row-2{display:grid;grid-template-columns:1.55fr 1fr;gap:16px;margin-bottom:20px;}
.row-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px;}

.panel{
  background:#fff;border-radius:14px;padding:22px 24px;
  box-shadow:var(--shadow-sm);
}
.panel-head{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;
}
.panel-head h3{font-size:16px;font-weight:600;}
.panel-head p{font-size:12px;color:var(--text-3);margin-top:2px;}
.panel-tabs{display:flex;gap:4px;background:#F4F6FA;border-radius:8px;padding:3px;}
.panel-tabs button{
  height:28px;padding:0 12px;border-radius:6px;font-size:12px;color:var(--text-2);transition:all .15s;
}
.panel-tabs button.active{background:#fff;color:var(--primary);font-weight:500;box-shadow:var(--shadow-sm);}

/* ====== Chart ====== */
.chart-wrap{height:280px;position:relative;}

/* ====== Approval list ====== */
.approval-list{display:flex;flex-direction:column;gap:10px;}
.approval-item{
  padding:14px;border:1px solid var(--border-light);border-radius:10px;
  display:flex;align-items:center;gap:12px;transition:all .15s;
}
.approval-item:hover{border-color:var(--primary);background:var(--primary-50);}
.approval-item .ava{
  width:40px;height:40px;border-radius:10px;
  background:linear-gradient(135deg,#9CBFDA,#3087CC);
  color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;
  flex-shrink:0;
}
.approval-item .text{flex:1;min-width:0;}
.approval-item .text h5{font-size:14px;font-weight:500;}
.approval-item .text p{font-size:12px;color:var(--text-3);margin-top:3px;}
.approval-item .actions{display:flex;gap:6px;}

/* ====== Tag ====== */
.tag{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:4px;font-size:12px;font-weight:500;
  background:var(--primary-light);color:var(--primary);border:1px solid #BFDDF6;
}
.tag-success{background:var(--success-bg);color:var(--success);border-color:var(--success-border);}
.tag-warning{background:var(--warning-bg);color:var(--warning);border-color:var(--warning-border);}
.tag-danger{background:var(--danger-bg);color:var(--danger);border-color:var(--danger-border);}
.tag-grey{background:#F1F2F3;color:var(--text-3);border-color:var(--border);}

/* ====== Star ====== */
.stars{display:inline-flex;gap:2px;}
.stars svg{width:14px;height:14px;color:#FFC53D;}
.stars.empty svg{color:#E5E8EE;}

/* ====== Filter Bar ====== */
.filterbar{
  background:#fff;border-radius:14px;padding:16px 20px;margin-bottom:16px;
  display:flex;flex-wrap:wrap;gap:12px;align-items:center;
  box-shadow:var(--shadow-sm);
}
.filterbar .field{display:flex;align-items:center;gap:6px;}
.filterbar label{font-size:13px;color:var(--text-2);}
.input,.select{
  height:34px;padding:0 12px;border:1px solid var(--border);border-radius:8px;
  font-size:13px;color:var(--text-1);background:#fff;outline:none;min-width:140px;
  transition:all .15s;font-family:inherit;
}
.input:focus,.select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(48,135,204,.12);}
.filterbar .spacer{flex:1;}

/* ====== Table ====== */
.table-wrap{
  background:#fff;border-radius:14px;overflow:hidden;
  box-shadow:var(--shadow-sm);
}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{
  background:#F8FAFC;color:var(--text-2);font-weight:500;
  text-align:left;padding:14px 16px;font-size:12px;
  border-bottom:1px solid var(--border-light);
}
tbody td{padding:14px 16px;border-bottom:1px solid var(--border-light);color:var(--text-1);}
tbody tr:hover{background:#FAFBFD;}
tbody tr:last-child td{border-bottom:none;}
.checkbox{width:14px;height:14px;border:1.5px solid var(--border);border-radius:3px;cursor:pointer;display:inline-block;vertical-align:middle;position:relative;}
.checkbox.checked{background:var(--primary);border-color:var(--primary);}
.checkbox.checked::after{
  content:"";position:absolute;left:3px;top:0;width:5px;height:9px;
  border:solid #fff;border-width:0 1.5px 1.5px 0;transform:rotate(45deg);
}
.row-action{display:inline-flex;gap:4px;align-items:center;}
.row-action button{
  width:28px;height:28px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;
  color:var(--text-2);transition:all .15s;
}
.row-action button:hover{background:var(--primary-light);color:var(--primary);}
.row-action button.danger:hover{background:var(--danger-bg);color:var(--danger);}

.table-foot{
  padding:14px 16px;display:flex;align-items:center;justify-content:space-between;
  border-top:1px solid var(--border-light);
}
.table-foot .count{color:var(--text-3);font-size:12px;}
.pager{display:flex;align-items:center;gap:4px;}
.pager button{
  min-width:30px;height:30px;padding:0 8px;border-radius:6px;font-size:12px;color:var(--text-2);
}
.pager button:hover:not(:disabled){background:#F4F6FA;color:var(--text-1);}
.pager button.active{background:var(--primary);color:#fff;}
.pager button:disabled{opacity:.4;cursor:not-allowed;}

/* ====== Tab nav inside page ====== */
.seg{
  display:inline-flex;background:#F4F6FA;border-radius:10px;padding:4px;margin-bottom:18px;flex-wrap:wrap;gap:4px;
}
.seg button{
  height:34px;padding:0 18px;border-radius:7px;font-size:13px;color:var(--text-2);font-weight:500;
  transition:all .15s;
}
.seg button.active{background:#fff;color:var(--primary);box-shadow:var(--shadow-sm);}

/* ====== Schedule cards ====== */
.sch-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.sch-card{
  background:#fff;border-radius:12px;padding:16px;border:1px solid var(--border-light);
  transition:all .2s;
}
.sch-card:hover{border-color:var(--primary);box-shadow:var(--shadow-md);}
.sch-card .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:10px;}
.sch-card h5{font-size:14px;font-weight:600;}
.sch-card .meta{font-size:12px;color:var(--text-3);margin-top:6px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.sch-card .meta span{display:inline-flex;align-items:center;gap:4px;}

/* ====== Group cards ====== */
.group-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.group-card{
  background:#fff;border-radius:14px;padding:20px;
  box-shadow:var(--shadow-sm);position:relative;overflow:hidden;
  transition:all .2s;cursor:pointer;
}
.group-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);}
.group-card::before{
  content:"";position:absolute;left:0;right:0;top:0;height:4px;
}
.group-card.math::before{background:linear-gradient(90deg,#3087CC,#9CBFDA);}
.group-card.physics::before{background:linear-gradient(90deg,#7C5BC1,#B59CE5);}
.group-card.chem::before{background:linear-gradient(90deg,#1BB975,#A7F3D0);}
.group-card.eng::before{background:linear-gradient(90deg,#F29100,#FFD68F);}
.group-card.mech::before{background:linear-gradient(90deg,#DF2027,#F6BCBE);}
.group-card.cs::before{background:linear-gradient(90deg,#0EA5E9,#7DD3FC);}
.group-card .group-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.group-card .gi{
  width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;
}
.group-card .gname{font-size:15px;font-weight:600;}
.group-card .gleader{font-size:12px;color:var(--text-3);margin-top:2px;}
.group-card .gstats{
  display:flex;justify-content:space-between;padding:12px 0;
  border-top:1px dashed var(--border-light);border-bottom:1px dashed var(--border-light);margin-bottom:12px;
}
.group-card .gstats div{text-align:center;flex:1;}
.group-card .gstats div strong{font-size:18px;display:block;}
.group-card .gstats div span{font-size:11px;color:var(--text-3);}
.group-card .gmembers{display:flex;align-items:center;}
.group-card .gmembers .ava{
  width:26px;height:26px;border-radius:50%;border:2px solid #fff;
  background:linear-gradient(135deg,#9CBFDA,#3087CC);
  color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;
  margin-left:-6px;
}
.group-card .gmembers .ava:first-child{margin-left:0;}
.group-card .gmembers .more{margin-left:8px;font-size:12px;color:var(--text-3);}

/* ====== Star milestone ====== */
.star-track{
  background:#fff;border-radius:14px;padding:24px;margin-bottom:20px;
  box-shadow:var(--shadow-sm);
}
.star-bar{position:relative;height:8px;background:#F1F2F3;border-radius:4px;margin:32px 0 24px;}
.star-bar .fill{
  position:absolute;left:0;top:0;height:100%;border-radius:4px;
  background:linear-gradient(90deg,#3087CC,#1BB975);
}
.star-bar .marker{
  position:absolute;top:-4px;width:16px;height:16px;border-radius:50%;background:#fff;
  border:3px solid #E5E8EE;transform:translateX(-50%);
}
.star-bar .marker.done{border-color:var(--primary);}
.star-bar .marker.current{border-color:var(--success);box-shadow:0 0 0 6px rgba(27,185,117,.18);}
.star-bar .marker .lbl{
  position:absolute;top:24px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--text-2);
  white-space:nowrap;
}
.star-bar .marker .lbl strong{display:block;font-size:13px;color:var(--text-1);font-weight:600;}

/* ====== Library cards ====== */
.lib-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.lib-card{
  background:#fff;border-radius:12px;padding:16px;border:1px solid var(--border-light);
  transition:all .2s;cursor:pointer;
}
.lib-card:hover{border-color:var(--primary);box-shadow:var(--shadow-md);transform:translateY(-2px);}
.lib-card .ftype{
  width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  margin-bottom:10px;font-size:11px;font-weight:600;color:#fff;
}
.ftype.pdf{background:linear-gradient(135deg,#DF2027,#FF6B6B);}
.ftype.ppt{background:linear-gradient(135deg,#F29100,#FFAA33);}
.ftype.doc{background:linear-gradient(135deg,#3087CC,#5BA8DE);}
.ftype.xls{background:linear-gradient(135deg,#1BB975,#34D399);}
.lib-card h5{font-size:13px;font-weight:500;margin-bottom:8px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.lib-card .meta{font-size:11px;color:var(--text-3);display:flex;justify-content:space-between;}
.lib-card .stats{
  margin-top:10px;padding-top:10px;border-top:1px dashed var(--border-light);
  display:flex;gap:12px;font-size:11px;color:var(--text-3);
}
.lib-card .stats span{display:inline-flex;align-items:center;gap:3px;}

/* ====== Modal ====== */
.modal-mask{
  position:fixed;inset:0;background:rgba(15,32,55,.42);z-index:100;
  display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;
  transition:opacity .2s;
}
.modal-mask.show{opacity:1;pointer-events:auto;}
.modal{
  background:#fff;border-radius:14px;width:680px;max-width:92vw;max-height:88vh;
  overflow:hidden;display:flex;flex-direction:column;
  transform:scale(.94);transition:transform .2s;
}
.modal-mask.show .modal{transform:scale(1);}
.modal-head{
  padding:18px 24px;border-bottom:1px solid var(--border-light);
  display:flex;align-items:center;justify-content:space-between;
}
.modal-head h3{font-size:16px;font-weight:600;}
.modal-body{padding:22px 24px;overflow-y:auto;flex:1;}
.modal-foot{
  padding:14px 24px;border-top:1px solid var(--border-light);
  display:flex;justify-content:flex-end;gap:8px;
}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:14px;}
.form-item{display:flex;flex-direction:column;}
.form-item label{font-size:12px;color:var(--text-2);margin-bottom:6px;}
.form-item label .req{color:var(--danger);}
.form-item .input,.form-item textarea,.form-item .select{width:100%;}
.form-item textarea{
  padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;
  font-family:inherit;outline:none;transition:all .15s;resize:vertical;
}
.form-item textarea:focus{border-color:var(--primary);}

/* ====== Toast ====== */
.toast{
  position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);
  background:#fff;border:1px solid var(--success-border);background:var(--success-bg);color:var(--success);
  padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;
  display:flex;align-items:center;gap:8px;z-index:200;
  opacity:0;pointer-events:none;transition:all .25s;
  box-shadow:var(--shadow-lg);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Donut ring */
.ring-row{display:flex;gap:18px;margin-top:16px;flex-wrap:wrap;}
.ring-item{
  flex:1;min-width:180px;background:#FAFBFD;border-radius:10px;padding:14px;
  display:flex;align-items:center;gap:12px;
}
.ring-item .label{font-size:12px;color:var(--text-2);}
.ring-item .val{font-size:18px;font-weight:600;margin-top:2px;}
.ring-item .val small{font-size:11px;color:var(--text-3);font-weight:400;margin-left:4px;}

/* Calendar */
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cal-day{
  aspect-ratio:1.1;background:#FAFBFD;border-radius:8px;padding:8px;
  display:flex;flex-direction:column;justify-content:space-between;
  transition:all .15s;cursor:pointer;border:1px solid transparent;
  position:relative;
}
.cal-day:hover{background:var(--primary-light);}
.cal-day .d{font-size:13px;font-weight:500;}
.cal-day .t{font-size:10px;color:var(--text-3);text-align:right;}
.cal-day.has-event::after{
  content:"";position:absolute;bottom:6px;right:6px;width:5px;height:5px;border-radius:50%;background:var(--primary);
}
.cal-day.today{background:var(--primary);color:#fff;}
.cal-day.today .t{color:rgba(255,255,255,.8);}
.cal-day.today.has-event::after{background:#fff;}
.cal-day.muted{opacity:.35;}

/* Approval timeline */
.timeline{padding:8px 0;}
.tl-item{display:flex;gap:14px;position:relative;padding-bottom:18px;}
.tl-item:last-child{padding-bottom:0;}
.tl-item::before{
  content:"";position:absolute;left:11px;top:24px;bottom:0;width:2px;background:var(--border-light);
}
.tl-item:last-child::before{display:none;}
.tl-item .dot{
  width:24px;height:24px;border-radius:50%;background:#fff;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;z-index:1;
}
.tl-item.done .dot{background:var(--success);border-color:var(--success);color:#fff;}
.tl-item.current .dot{background:#fff;border-color:var(--primary);}
.tl-item.current .dot::after{
  content:"";width:8px;height:8px;border-radius:50%;background:var(--primary);
  animation:pulse 1.5s infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.6;transform:scale(1.4);}}
.tl-item .tl-content{flex:1;}
.tl-item .tl-content h6{font-size:13px;font-weight:500;}
.tl-item .tl-content p{font-size:12px;color:var(--text-3);margin-top:3px;}

/* Charts inside */
.horiz-bar{margin-top:8px;}
.hb-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.hb-row .name{width:84px;font-size:12px;color:var(--text-2);}
.hb-row .track{flex:1;height:8px;background:#F1F2F3;border-radius:4px;overflow:hidden;position:relative;}
.hb-row .track .fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#3087CC,#5BA8DE);transition:width .8s ease;}
.hb-row .val{width:50px;text-align:right;font-size:12px;font-weight:600;color:var(--text-1);}

/* Star levels grid */
.star-levels{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:48px;}
.sl{border-radius:10px;padding:14px;text-align:center;}
.sl-1{background:#F4FAFE;border:1px solid #BFDDF6;}
.sl-2{background:#FFF8E6;border:1px solid #FFE0B3;}
.sl-3{background:#FFF5E5;border:1px solid #FFE0B3;}
.sl-4{background:#E8FCF4;border:1px solid #A7F3D0;}
.sl-5{background:linear-gradient(135deg,#FFE0B3,#FFD68F);border:1px solid #F29100;color:#fff;}
.sl strong{font-size:20px;font-weight:700;display:block;margin-top:6px;}
.sl span{font-size:11px;color:var(--text-3);}
.sl-5 strong, .sl-5 span{color:#fff;}
.sl-5 span{opacity:.85;}

@media(max-width:1280px){
  .stats{grid-template-columns:repeat(2,1fr);}
  .row-2{grid-template-columns:1fr;}
  .lib-grid{grid-template-columns:repeat(3,1fr);}
  .group-grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:980px){
  .lib-grid{grid-template-columns:repeat(2,1fr);}
  .group-grid{grid-template-columns:1fr;}
  .star-levels{grid-template-columns:repeat(5,1fr);}
}

</style>

<aside class="sidebar"></aside>
<main class="main">

// ============= Toast =============
function showToast(msg){
  let toast = document.getElementById('toast');
  if(!toast){
    toast = document.createElement('div');
    toast.id='toast';toast.className='toast';
    toast.innerHTML=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg><span></span>`;
    document.body.appendChild(toast);
  }
  toast.querySelector('span').textContent=msg;
  toast.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer=setTimeout(()=>toast.classList.remove('show'),2400);
}

// ============= Modal =============
function openModal(id){
  const mask=document.getElementById(id);if(mask)mask.classList.add('show');
}
function closeModal(id){
  const mask=document.getElementById(id);if(mask)mask.classList.remove('show');
}

// ============= Checkbox =============
document.addEventListener('click',e=>{
  if(e.target.classList && e.target.classList.contains('checkbox')){
    e.target.classList.toggle('checked');
  }
});

// ============= Segments / Panel tabs =============
document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('.seg, .panel-tabs').forEach(g=>{
    g.querySelectorAll('button').forEach(b=>{
      b.addEventListener('click',()=>{
        g.querySelectorAll('button').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
        // Show corresponding tab content if exists
        const tab=b.getAttribute('data-tab');
        if(tab){
          const wrap=g.closest('.panel,.page,.tab-wrap')||document;
          wrap.querySelectorAll('.tab-content').forEach(c=>c.style.display='none');
          const target=wrap.querySelector('.tab-content[data-tab="'+tab+'"]');
          if(target)target.style.display='';
        }
      });
    });
  });
  document.querySelectorAll('.modal-mask').forEach(m=>{
    m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('show');});
  });
});

    const d=demData.find(x=>x.id===id);if(!d)return;
    const colInfo=d.colId?colData.find(x=>x.id===d.colId):null;
    const progressHTML=colInfo?`
      <div style="border-top:1px solid var(--border-light);padding-top:16px;margin-top:16px;">
        <div style="font-size:14px;font-weight:600;margin-bottom:10px;">关联征集通知</div>
        <div style="display:flex;align-items:center;gap:12px;padding:14px;background:var(--success-bg);border:1px solid var(--success-border);border-radius:10px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          <div style="flex:1;"><strong>${colInfo.topic}</strong><div style="font-size:12px;color:var(--text-3);margin-top:2px;">进度：${colInfo.collected} / ${colInfo.target} · ${colInfo.st}</div></div>
          <a style="color:var(--primary);cursor:pointer;font-size:13px;font-weight:500;" onclick="closeModal('colDetailModal');openColDetail(${colInfo.id})">查看详情</a>
        </div>
      </div>`:'';

    document.getElementById('colDtlTitle').textContent='需求详情 · '+d.topic;
    document.getElementById('colDtlBody').innerHTML=`
      <div style="padding:24px 28px;">
        <div style="display:flex;gap:32px;margin-bottom:20px;flex-wrap:wrap;">
          <div><div style="font-size:12px;color:var(--text-3);margin-bottom:4px;">所属分类</div><div style="font-size:14px;">${d.cat}</div></div>
          <div><div style="font-size:12px;color:var(--text-3);margin-bottom:4px;">发布人</div><div style="font-size:14px;font-weight:500;">${d.publisher}</div></div>
          <div><div style="font-size:12px;color:var(--text-3);margin-bottom:4px;">提交时间</div><div style="font-size:14px;">${d.time}</div></div>
          <div><div style="font-size:12px;color:var(--text-3);margin-bottom:4px;">进度</div><div style="font-size:14px;font-weight:500;">${d.progress}</div></div>
          <div><div style="font-size:12px;color:var(--text-3);margin-bottom:4px;">状态</div><span class="tag ${DEM_STATUS_TAG[d.st]||''}">${d.st}</span></div>
        </div>
        <div style="font-size:12px;color:var(--text-3);margin-bottom:4px;">需求描述</div>
        <div style="font-size:13px;color:var(--text-1);line-height:1.8;background:var(--bg);padding:12px 16px;border-radius:8px;">学生希望获取「${d.topic}」相关资料。</div>
        ${progressHTML}
      </div>
    `;
    openModal('colDetailModal');
  }

  function publishFromDem(id){
    const d=demData.find(x=>x.id===id);if(!d)return;
    if(!confirm('确认将「'+d.topic+'」发布为资料征集通知？'))return;
    const newId=Date.now();
    colData.unshift({id:newId,topic:d.topic,src:'学生需求',publisher:'王老师',pubTime:new Date().toISOString().slice(0,10),deadline:'2026-06-30',collected:0,target:10,st:'进行中',desc:'来源：需求池，由 '+d.publisher+' 发起。',files:[]});
    d.progress='0 / 10';
    d.st='已发布征集';
    d.colId=newId;
    renderDemTable();
    renderColTable();
    showToast('已发布征集通知「'+d.topic+'」');
  }

  function ignoreDem(id){
    const d=demData.find(x=>x.id===id);if(!d)return;
    d.st='已忽略';
    renderDemTable();
    showToast('已忽略该需求');
  }
</script>
</body>
</html>
