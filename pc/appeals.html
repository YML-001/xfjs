<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>意见反馈 · 学风建设系统</title>
<style>
:root{
  --primary:#3087CC;
  --primary-light:#E3F1F9;
  --primary-dark:#006DAD;
  --primary-50:#F4FAFE;
  --text-1:#3C444F;
  --text-2:#696F7D;
  --text-3:#9096A2;
  --text-4:#ABB0BA;
  --border:#E5E8EE;
  --border-light:#EFF1F5;
  --bg:#F4F6FA;
  --bg-card:#FFFFFF;
  --success:#1BB975;
  --success-bg:#E8FCF4;
  --success-border:#A7F3D0;
  --warning:#F29100;
  --warning-bg:#FFF5E5;
  --warning-border:#FFE0B3;
  --danger:#DF2027;
  --danger-bg:#FCE8EA;
  --danger-border:#F6BCBE;
  --shadow-sm:0 1px 3px rgba(15,32,55,.05);
  --shadow-md:0 4px 14px rgba(15,32,55,.06);
  --shadow-lg:0 12px 32px rgba(15,32,55,.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:"OPPOSans","PingFang SC","Microsoft YaHei",-apple-system,sans-serif;color:var(--text-1);background:var(--bg);-webkit-font-smoothing:antialiased;font-size:14px;}
body{min-height:100vh;display:flex;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
svg{display:block;flex-shrink:0;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:#D9DDE3;border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:#C0C5CD;}
::-webkit-scrollbar-track{background:transparent;}

/* ====== Sidebar ====== */
.sidebar{
  width:232px;flex-shrink:0;background:#fff;
  border-right:1px solid var(--border-light);
  height:100vh;position:sticky;top:0;display:flex;flex-direction:column;
}
.brand{
  padding:20px 20px 16px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid var(--border-light);
}
.brand-logo{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,#3087CC 0%,#006DAD 100%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 16px rgba(48,135,204,.28);
}
.brand-text{display:flex;flex-direction:column;line-height:1.1;}
.brand-text strong{font-size:14px;font-weight:600;}
.brand-text span{font-size:10px;color:var(--text-3);letter-spacing:.4px;margin-top:3px;}

.nav-group{padding:16px 12px 8px;flex:1;overflow-y:auto;}
.nav-group-title{
  padding:8px 12px 6px;font-size:11px;color:var(--text-3);
  text-transform:uppercase;letter-spacing:.6px;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:8px;color:var(--text-2);
  font-size:13px;cursor:pointer;transition:all .15s;
  margin-bottom:2px;
}
.nav-item:hover{background:var(--primary-50);color:var(--text-1);}
.nav-item.active{background:var(--primary-light);color:var(--primary);font-weight:500;}
.nav-item.active svg{color:var(--primary);}
.nav-item .badge{
  margin-left:auto;background:var(--danger);color:#fff;font-size:10px;
  padding:1px 6px;border-radius:8px;font-weight:500;
}
.nav-item.active .badge{background:var(--primary);}

.user-card{
  margin:12px;padding:12px;border-radius:10px;
  background:linear-gradient(135deg,#F4FAFE 0%,#E3F1F9 100%);
  display:flex;align-items:center;gap:10px;
}
.user-card .ava{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,#3087CC,#006DAD);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:600;font-size:13px;
}
.user-card .info{flex:1;min-width:0;}
.user-card .info h5{font-size:13px;font-weight:500;}
.user-card .info p{font-size:11px;color:var(--text-3);margin-top:2px;}

/* ====== Main ====== */
.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  height:60px;background:#fff;border-bottom:1px solid var(--border-light);
  padding:0 28px;display:flex;align-items:center;gap:18px;position:sticky;top:0;z-index:10;
}
.crumb{display:flex;align-items:center;gap:6px;color:var(--text-2);font-size:13px;}
.crumb svg{color:var(--text-4);}
.crumb a{color:var(--text-2);transition:color .15s;}
.crumb a:hover{color:var(--primary);}
.search{
  margin-left:24px;width:320px;height:36px;border-radius:8px;
  background:#F4F6FA;display:flex;align-items:center;padding:0 12px;gap:8px;
  border:1px solid transparent;transition:all .15s;
}
.search:focus-within{background:#fff;border-color:var(--primary);}
.search input{flex:1;border:none;outline:none;background:transparent;font-size:13px;color:var(--text-1);}
.search input::placeholder{color:var(--text-4);}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.icon-btn{
  width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  color:var(--text-2);transition:all .15s;position:relative;
}
.icon-btn:hover{background:#F4F6FA;color:var(--text-1);}
.icon-btn .red-dot{
  position:absolute;top:8px;right:8px;width:7px;height:7px;border-radius:50%;
  background:var(--danger);border:2px solid #fff;
}
.topbar-user{
  display:flex;align-items:center;gap:8px;padding:4px 10px 4px 4px;
  border-radius:999px;cursor:pointer;
}
.topbar-user:hover{background:#F4F6FA;}
.topbar-user .ava{
  width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,#3087CC,#006DAD);
  color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;
}
.topbar-user span{font-size:13px;color:var(--text-1);}

/* ====== Page Content ====== */
.page{flex:1;padding:24px 28px;overflow-y:auto;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.page-head h1{font-size:22px;font-weight:600;}
.page-head p{color:var(--text-3);font-size:13px;margin-top:6px;}
.page-actions{display:flex;gap:8px;}

.btn{
  display:inline-flex;align-items:center;gap:6px;
  height:36px;padding:0 14px;border-radius:8px;font-size:13px;font-weight:500;
  transition:all .15s;
}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-dark);box-shadow:0 4px 12px rgba(48,135,204,.28);}
.btn-ghost{background:#fff;color:var(--text-2);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary);}
.btn-sm{height:30px;padding:0 10px;font-size:12px;}

/* ====== Stat Cards ====== */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px;}
.stat-card{
  background:#fff;border-radius:14px;padding:20px 22px;
  position:relative;overflow:hidden;
  box-shadow:var(--shadow-sm);
}
.stat-card .blob{
  position:absolute;width:140px;height:140px;border-radius:50%;
  right:-40px;top:-40px;opacity:.35;
}
.stat-card .blob-1{background:radial-gradient(circle,#BFDDF6,transparent 65%);}
.stat-card .blob-2{background:radial-gradient(circle,#FFE0B3,transparent 65%);}
.stat-card .blob-3{background:radial-gradient(circle,#A7F3D0,transparent 65%);}
.stat-card .blob-4{background:radial-gradient(circle,#F6BCBE,transparent 65%);}
.stat-card .ic{
  width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  margin-bottom:14px;
}
.stat-card .label{font-size:13px;color:var(--text-2);}
.stat-card .num{
  font-size:28px;font-weight:700;margin-top:4px;letter-spacing:-.5px;
  display:flex;align-items:baseline;gap:6px;
}
.stat-card .num small{font-size:13px;color:var(--text-3);font-weight:400;}

/* ====== Tag ====== */
.tag{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:4px;font-size:12px;font-weight:500;
  background:var(--primary-light);color:var(--primary);border:1px solid #BFDDF6;
}
.tag-success{background:var(--success-bg);color:var(--success);border-color:var(--success-border);}
.tag-warning{background:var(--warning-bg);color:var(--warning);border-color:var(--warning-border);}
.tag-danger{background:var(--danger-bg);color:var(--danger);border-color:var(--danger-border);}
.tag-grey{background:#F1F2F3;color:var(--text-3);border-color:var(--border);}

/* ====== Filter Bar ====== */
.filterbar{
  background:#fff;border-radius:14px;padding:16px 20px;margin-bottom:16px;
  display:flex;flex-wrap:nowrap;gap:12px;align-items:center;
  box-shadow:var(--shadow-sm);
}
.filterbar .field{display:flex;align-items:center;gap:6px;}
.filterbar label{font-size:13px;color:var(--text-2);white-space:nowrap;}
.input,.select{
  height:34px;padding:0 12px;border:1px solid var(--border);border-radius:8px;
  font-size:13px;color:var(--text-1);background:#fff;outline:none;min-width:0;
  transition:all .15s;font-family:inherit;
}
.input:focus,.select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(48,135,204,.12);}
.filterbar .spacer{flex:1;}

/* ====== Table ====== */
.table-wrap{
  background:#fff;border-radius:14px;overflow:hidden;
  box-shadow:var(--shadow-sm);
}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{
  background:#F8FAFC;color:var(--text-2);font-weight:500;
  text-align:left;padding:14px 16px;font-size:12px;
  border-bottom:1px solid var(--border-light);
}
tbody td{padding:14px 16px;border-bottom:1px solid var(--border-light);color:var(--text-1);}
tbody tr:hover{background:#FAFBFD;}
tbody tr:last-child td{border-bottom:none;}

.table-foot{
  padding:14px 16px;display:flex;align-items:center;justify-content:space-between;
  border-top:1px solid var(--border-light);
}
.table-foot .count{color:var(--text-3);font-size:12px;}
.pager{display:flex;align-items:center;gap:4px;}
.pager button{
  min-width:30px;height:30px;padding:0 8px;border-radius:6px;font-size:12px;color:var(--text-2);
}
.pager button:hover:not(:disabled){background:#F4F6FA;color:var(--text-1);}
.pager button.active{background:var(--primary);color:#fff;}
.pager button:disabled{opacity:.4;cursor:not-allowed;}

/* ====== Seg Tab ====== */
.seg{
  display:inline-flex;background:#F4F6FA;border-radius:10px;padding:4px;margin-bottom:18px;flex-wrap:wrap;gap:4px;
}
.seg button{
  height:34px;padding:0 18px;border-radius:7px;font-size:13px;color:var(--text-2);font-weight:500;
  transition:all .15s;
}
.seg button.active{background:#fff;color:var(--primary);box-shadow:var(--shadow-sm);}
.seg button .seg-cnt{opacity:.65;margin-left:4px;font-size:12px;}

/* ====== Modal ====== */
.modal-mask{
  position:fixed;inset:0;background:rgba(15,32,55,.42);z-index:100;
  display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;
  transition:opacity .2s;
}
.modal-mask.show{opacity:1;pointer-events:auto;}
.modal{
  background:#fff;border-radius:14px;width:720px;max-width:92vw;max-height:88vh;
  overflow:hidden;display:flex;flex-direction:column;
  transform:scale(.94);transition:transform .2s;
}
.modal-mask.show .modal{transform:scale(1);}
.modal-head{
  padding:18px 24px;border-bottom:1px solid var(--border-light);
  display:flex;align-items:center;justify-content:space-between;
}
.modal-head h3{font-size:16px;font-weight:600;}
.modal-body{padding:22px 24px;overflow-y:auto;flex:1;}
.modal-foot{
  padding:14px 24px;border-top:1px solid var(--border-light);
  display:flex;justify-content:flex-end;gap:8px;
}

/* ====== Detail Section ====== */
.detail-section{margin-bottom:20px;background:#fff;border:1px solid var(--border-light);border-radius:12px;padding:18px 20px;}
.ds-head{
  display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;
  border-bottom:2px solid var(--primary);
}
.ds-ic{
  width:28px;height:28px;border-radius:8px;background:var(--primary-light);color:var(--primary);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.ds-head h4{font-size:15px;font-weight:700;color:var(--text-1);margin:0;}
.detail-section h4{font-size:14px;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border-light);}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 24px;}
.detail-item{display:flex;gap:8px;font-size:13px;}
.detail-item .dt{color:var(--text-3);min-width:70px;flex-shrink:0;}
.detail-item .dd{color:var(--text-1);word-break:break-all;}
.detail-full{grid-column:1/-1;}

/* ====== Timeline ====== */
.timeline{position:relative;padding-left:20px;}
.timeline::before{content:"";position:absolute;left:5px;top:4px;bottom:4px;width:2px;background:var(--border-light);}
.tl-item{position:relative;padding-bottom:16px;}
.tl-item:last-child{padding-bottom:0;}
.tl-dot{
  position:absolute;left:-20px;top:3px;width:12px;height:12px;border-radius:50%;
  background:var(--border);border:2px solid #fff;box-shadow:0 0 0 2px var(--border-light);
}
.tl-item.active .tl-dot{background:var(--primary);box-shadow:0 0 0 2px var(--primary-light);}
.tl-item.done .tl-dot{background:var(--success);box-shadow:0 0 0 2px var(--success-bg);}
.tl-item.rejected .tl-dot{background:var(--danger);box-shadow:0 0 0 2px var(--danger-bg);}
.tl-content{font-size:13px;color:var(--text-1);}
.tl-content .tl-time{font-size:12px;color:var(--text-3);margin-top:2px;}
.tl-content .tl-op{font-weight:500;color:var(--primary);}

/* ====== Reply Box ====== */
.reply-box{margin-top:16px;padding:16px;background:var(--bg);border-radius:10px;}
.reply-box textarea{
  width:100%;height:80px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;
  font-size:13px;font-family:inherit;outline:none;resize:vertical;transition:all .15s;
}
.reply-box textarea:focus{border-color:var(--primary);}
.reply-box .reply-actions{display:flex;gap:8px;margin-top:10px;justify-content:flex-end;}

/* ====== Toast ====== */
.toast{
  position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);
  background:#fff;border:1px solid var(--success-border);background:var(--success-bg);color:var(--success);
  padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;
  display:flex;align-items:center;gap:8px;z-index:200;
  opacity:0;pointer-events:none;transition:all .25s;
  box-shadow:var(--shadow-lg);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- ====== Sidebar ====== -->
<aside class="sidebar"></aside>

<!-- ====== Main ====== -->
<div class="main">
  <!-- Topbar -->
  <header class="topbar">
    <div class="crumb">
      <a href="dashboard.html">首页</a>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
      <span>辅学义工</span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
      <span style="color:var(--text-1);font-weight:500;">意见反馈</span>
    </div>
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="搜索反馈…" />
    </div>
    <div class="topbar-right">
      <button class="icon-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="red-dot"></span>
      </button>
      <div class="topbar-user">
        <div class="ava">王</div>
        <span>王老师</span>
      </div>
    </div>
  </header>

  <!-- Page -->
  <div class="page">
    <!-- Page Head -->
    <div class="page-head">
      <div>
        <h1>意见反馈</h1>
        <p>受理辅学义工提出的时长异议、积分异议、星级异议等各类意见反馈</p>
      </div>
      <div class="page-actions">
        <button class="btn btn-ghost" onclick="exportData()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          导出
        </button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="blob blob-1"></div>
        <div class="ic" style="background:var(--primary-light);color:var(--primary);">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </div>
        <div class="label">反馈总数</div>
        <div class="num">28</div>
      </div>
      <div class="stat-card">
        <div class="blob blob-2"></div>
        <div class="ic" style="background:var(--warning-bg);color:var(--warning);">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        </div>
        <div class="label">待处理</div>
        <div class="num">8</div>
      </div>
      <div class="stat-card">
        <div class="blob blob-3"></div>
        <div class="ic" style="background:var(--success-bg);color:var(--success);">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </div>
        <div class="label">已通过</div>
        <div class="num">14</div>
      </div>
      <div class="stat-card">
        <div class="blob blob-4"></div>
        <div class="ic" style="background:var(--danger-bg);color:var(--danger);">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        </div>
        <div class="label">已驳回</div>
        <div class="num">6</div>
      </div>
    </div>

    <!-- Seg Tabs -->
    <div class="seg" id="segTabs">
      <button class="active" data-tab="all" onclick="switchTab('all')">全部<span class="seg-cnt">28</span></button>
      <button data-tab="pending" onclick="switchTab('pending')">待处理<span class="seg-cnt">8</span></button>
      <button data-tab="processing" onclick="switchTab('processing')">处理中<span class="seg-cnt">3</span></button>
      <button data-tab="resolved" onclick="switchTab('resolved')">已通过<span class="seg-cnt">14</span></button>
      <button data-tab="rejected" onclick="switchTab('rejected')">已驳回<span class="seg-cnt">6</span></button>
    </div>

    <!-- Filter Bar -->
    <div class="filterbar">
      <div class="field">
        <label>反馈类型</label>
        <select class="select" id="fType" style="width:120px;" onchange="renderTable()">
          <option value="">全部</option>
          <option value="时长异议">时长异议</option>
          <option value="积分异议">积分异议</option>
          <option value="星级异议">星级异议</option>
          <option value="考勤异议">考勤异议</option>
          <option value="其他">其他</option>
        </select>
      </div>
      <div class="field">
        <label>提交时间</label>
        <input type="date" class="input" id="fDateFrom" style="width:140px;" onchange="renderTable()">
        <span style="color:var(--text-3);">—</span>
        <input type="date" class="input" id="fDateTo" style="width:140px;" onchange="renderTable()">
      </div>
      <div class="field">
        <label>关键字</label>
        <input type="text" class="input" id="fKw" placeholder="姓名、学号" style="width:160px;" oninput="renderTable()">
      </div>
      <div class="spacer"></div>
      <div style="display:flex;gap:8px;flex-shrink:0;">
        <button class="btn btn-ghost btn-sm" onclick="resetFilter()">重置</button>
        <button class="btn btn-primary btn-sm" onclick="renderTable()">查询</button>

let currentTab = 'all';

function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('#segTabs button').forEach(b=>{
    b.classList.toggle('active',b.dataset.tab===tab);
  });
  renderTable();
}

function resetFilter(){
  document.getElementById('fType').value='';
  document.getElementById('fDateFrom').value='';
  document.getElementById('fDateTo').value='';
  document.getElementById('fKw').value='';
  renderTable();
}

function getStatusTag(s){
  const map = {
    '待处理':'tag-warning',
    '处理中':'tag',
    '已通过':'tag-success',
    '已驳回':'tag-danger'
  };
  return `<span class="tag ${map[s]||'tag-grey'}">${s}</span>`;
}

function renderTable(){
  const type = document.getElementById('fType').value;
  const dateFrom = document.getElementById('fDateFrom').value;
  const dateTo = document.getElementById('fDateTo').value;
  const kw = document.getElementById('fKw').value.trim().toLowerCase();

  let data = feedbackData.filter(d=>{
    if(currentTab==='pending' && d.status!=='待处理') return false;
    if(currentTab==='processing' && d.status!=='处理中') return false;
    if(currentTab==='resolved' && d.status!=='已通过') return false;
    if(currentTab==='rejected' && d.status!=='已驳回') return false;
    if(type && d.type!==type) return false;
    if(dateFrom && d.submitTime<dateFrom) return false;
    if(dateTo && d.submitTime<dateTo+'T99') ;
    if(kw && !d.name.toLowerCase().includes(kw) && !d.sid.includes(kw)) return false;
    return true;
  });

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = data.map(d=>`
    <tr>
      <td style="color:var(--primary);font-weight:500;">${d.id}</td>
      <td>${d.name}<br><span style="color:var(--text-3);font-size:12px;">${d.sid}</span></td>
      <td><span class="tag ${d.type==='时长异议'?'tag':d.type==='积分异议'?'tag-warning':d.type==='星级异议'?'tag-success':d.type==='考勤异议'?'tag-danger':'tag-grey'}">${d.type}</span></td>
      <td style="max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${d.summary}</td>
      <td style="color:var(--text-2);font-size:12px;">${d.submitTime}</td>
      <td>${getStatusTag(d.status)}</td>
      <td style="color:var(--text-2);">${d.handler}</td>
      <td style="white-space:nowrap;">
        <a href="javascript:void(0)" onclick="openDetail('${d.id}')" style="color:var(--primary);font-weight:500;margin-right:8px;">详情</a>
        ${d.status==='待处理'||d.status==='处理中'?`<a href="javascript:void(0)" onclick="showToast('请前往代办业务进行处理')" style="color:var(--warning);font-weight:500;">去处理</a>`:''}
      </td>
    </tr>
  `).join('');

  document.getElementById('tableCount').textContent = `共 ${data.length} 条`;
}

        <div class="detail-item detail-full"><span class="dt">证据材料</span><span class="dd">${d.evidence.map(e=>`
          <span style="display:inline-flex;align-items:center;gap:6px;background:var(--primary-light);color:var(--primary);border-radius:5px;padding:3px 10px;font-size:12px;margin-right:8px;">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            ${e}
          </span>`).join('')}</span></div>
      </div>
    </div>

    ${d.result?`
    <div class="detail-section">
      <div class="ds-head">
        <div class="ds-ic" style="background:${d.status==='已通过'?'var(--success-bg)':'var(--danger-bg)'};color:${d.status==='已通过'?'var(--success)':'var(--danger)'};"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div>
        <h4>处理结果</h4>
      </div>
      <div style="padding:12px 16px;background:${d.status==='已通过'?'var(--success-bg)':'var(--danger-bg)'};border-radius:8px;font-size:13px;color:${d.status==='已通过'?'var(--success)':'var(--danger)'};">
        ${d.result}
      </div>
    </div>`:''}

    <div class="detail-section">
      <div class="ds-head">
        <div class="ds-ic" style="background:var(--success-bg);color:var(--success);"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
        <h4>处理进度</h4>
      </div>
      <div class="timeline">${timelineHTML}</div>
    </div>

    ${d.status==='待处理'||d.status==='处理中'?`
    <div class="reply-box">
      <div style="font-size:13px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        处理回复
      </div>
      <textarea id="replyText" placeholder="请输入处理意见…"></textarea>
    </div>`:''}
  `;

  if(d.status==='待处理'||d.status==='处理中'){
    foot.innerHTML = `
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="handleFeedback('${d.id}')">保存</button>`;
  } else {
    foot.innerHTML = `<button class="btn btn-ghost" onclick="closeModal()">关闭</button>`;
  }

  document.getElementById('detailModal').classList.add('show');
}

function handleFeedback(id){
  const reply = document.getElementById('replyText');
  if(!reply || !reply.value.trim()){
    showToast('请填写处理意见');
    return;
  }
  const d = feedbackData.find(x=>x.id===id);
  if(d){
    d.handler = '王老师';
    d.result = reply.value.trim();
    d.timeline.push({
      time: new Date().toLocaleString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).replace(/\//g,'-'),
      op: '王老师',
      action: '处理意见已保存：'+d.result,
      status: 'done'
    });
  }
  closeModal();
  renderTable();
  showToast('处理意见已保存');
}

function closeModal(){
  document.getElementById('detailModal').classList.remove('show');
}

function showToast(msg){
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function exportData(){
  showToast('导出成功，文件已下载');
}

renderSidebar('appeals');
renderTable();
</script>
</body>
</html>
