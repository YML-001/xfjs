<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>添加分组</title>
<style>
:root{
  --primary:#3087CC;--primary-light:#E3F1F9;--primary-dark:#006DAD;
  --text-1:#3C444F;--text-2:#696F7D;--text-3:#9096A2;
  --border:#E5E8EE;--border-light:#EFF1F5;--bg:#F4F6FA;
  --danger:#DF2027;--success:#1BB975;
  --shadow-sm:0 1px 3px rgba(15,32,55,.05);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  font-family:"OPPOSans","PingFang SC","Microsoft YaHei",-apple-system,sans-serif;
  color:var(--text-1);font-size:14px;-webkit-font-smoothing:antialiased;
  background:#fff;height:100%;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
svg{display:block;flex-shrink:0;}

.dlg{display:flex;flex-direction:column;height:100vh;}

/* Head */
.dlg-head{
  padding:16px 22px;border-bottom:1px solid var(--border-light);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.dlg-head h3{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;}
.dlg-head .icon-wrap{
  width:28px;height:28px;border-radius:7px;
  background:var(--primary-light);color:var(--primary);
  display:flex;align-items:center;justify-content:center;
}
.close-btn{
  width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;
  color:var(--text-3);transition:all .15s;
}
.close-btn:hover{background:#F4F6FA;color:var(--text-1);}

/* Body */
.dlg-body{flex:1;padding:20px 22px;overflow-y:auto;}

.form-item{display:flex;flex-direction:column;margin-bottom:14px;}
.form-item label{font-size:12px;color:var(--text-2);margin-bottom:6px;font-weight:500;}
.form-item label .req{color:var(--danger);margin-left:2px;}
.input,.select{
  height:36px;padding:0 12px;border:1px solid var(--border);border-radius:8px;
  font-size:13px;color:var(--text-1);background:#fff;outline:none;
  transition:all .15s;font-family:inherit;width:100%;
}
.input:focus,.select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(48,135,204,.1);}
.input::placeholder{color:var(--text-3);}
textarea.input{
  height:auto;padding:10px 12px;resize:none;line-height:1.6;
}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

/* Hint text */
.hint{font-size:12px;color:var(--text-3);margin-top:5px;}

/* Color picker row */
.color-row{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap;}
.color-dot{
  width:26px;height:26px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:all .15s;
  display:flex;align-items:center;justify-content:center;
}
.color-dot.selected{border-color:#fff;box-shadow:0 0 0 2px var(--primary);}
.color-dot svg{opacity:0;transition:opacity .12s;}
.color-dot.selected svg{opacity:1;}

/* Footer */
.dlg-foot{
  padding:14px 22px;border-top:1px solid var(--border-light);
  display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;
}
.btn{
  display:inline-flex;align-items:center;gap:6px;
  height:34px;padding:0 16px;border-radius:8px;font-size:13px;font-weight:500;
  transition:all .15s;
}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-dark);box-shadow:0 4px 12px rgba(48,135,204,.28);}
.btn-ghost{background:#fff;color:var(--text-2);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary);}
</style>
</head>
<body>
<div class="dlg">
  <div class="dlg-head">
    <h3>
      <div class="icon-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </div>
      添加分组
    </h3>
    <button class="close-btn" onclick="dismiss()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <div class="dlg-body">
    <div class="form-item">
      <label>组名<span class="req">*</span></label>
      <input class="input" id="groupName" placeholder="请输入组名，如：生物组" />
    </div>

    <div class="form-row">
      <div class="form-item">
        <label>学科分类<span class="req">*</span></label>
        <select class="select" id="groupSubject">
          <option value="">请选择</option>
          <option>数学</option><option>物理</option><option>化学</option>
          <option>英语</option><option>力学</option><option>计算机</option><option>其他</option>
        </select>
      </div>
      <div class="form-item">
        <label>初始组长</label>
        <input class="input" placeholder="搜索义工姓名" />
      </div>
    </div>

    <div class="form-item">
      <label>主题色</label>
      <div class="color-row" id="colorRow">
        <div class="color-dot selected" style="background:#3087CC;" data-color="#3087CC" onclick="pickColor(this)">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="color-dot" style="background:#7C5BC1;" data-color="#7C5BC1" onclick="pickColor(this)">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="color-dot" style="background:#1BB975;" data-color="#1BB975" onclick="pickColor(this)">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="color-dot" style="background:#F29100;" data-color="#F29100" onclick="pickColor(this)">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="color-dot" style="background:#DF2027;" data-color="#DF2027" onclick="pickColor(this)">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="color-dot" style="background:#0EA5E9;" data-color="#0EA5E9" onclick="pickColor(this)">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
      </div>
    </div>

    <div class="form-item" style="margin-bottom:0;">
      <label style="display:flex;align-items:center;justify-content:space-between;">备注说明</label>
      <textarea class="input" rows="3" id="groupRemark" placeholder="选填，简要描述分组用途..."></textarea>
      <span class="hint">建议简洁描述该组的辅学方向与职责</span>
    </div>
  </div>

  <div class="dlg-foot">
    <button class="btn btn-ghost" onclick="dismiss()">取消</button>
    <button class="btn btn-primary" onclick="submit()">确认创建</button>
  </div>
</div>

<script>
  function dismiss() {
    if(window.parent && window.parent.closeIframeModal) {
      window.parent.closeIframeModal();
    }
  }

  function submit() {
    const name = document.getElementById('groupName').value.trim();
    if(!name) {
      document.getElementById('groupName').focus();
      document.getElementById('groupName').style.borderColor = '#DF2027';
      return;
    }
    if(window.parent && window.parent.closeIframeModal) {
      window.parent.closeIframeModal('分组「' + name + '」创建成功');
    }
  }

  function pickColor(el) {
    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
    el.classList.add('selected');
  }

  document.getElementById('groupName').addEventListener('input', function(){
    this.style.borderColor = '';
  });
</script>

</body>
</html>
